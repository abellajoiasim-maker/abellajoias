<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Produtos | Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; padding-bottom: 60px; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .gold-bg { background: #caa85c; }
        #bannerProgressoAtacado { background: #1a1a1a; border-bottom: 2px solid #caa85c; padding: 12px; text-align: center; position: sticky; top: 0; z-index: 60; display: none; }
        .card-prod { background:#141414; border-radius:15px; border:1px solid #2a2a2a; transition:.3s; display:flex; flex-direction:column; height:100%; overflow:hidden; position: relative; }
        .tag-atacado-flash { position: absolute; top: 8px; right: 8px; background: linear-gradient(45deg, #caa85c, #f1d592); color: #000; font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 6px; z-index: 20; animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100; align-items:center; justify-content:center; padding: 20px; }
        .modal.active { display:flex; }
        .grid-variacoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        input[type="number"] { background: #000; border: 1px solid #333; color: #fff; text-align: center; width: 100%; border-radius: 6px; padding: 5px; }
    </style>
</head>
<body>

<div id="bannerProgressoAtacado">
    <div class="max-w-xl mx-auto">
        <p id="msgAtacadoTopo" class="text-[10px] font-bold gold-text uppercase mb-1"></p>
        <div class="w-full bg-[#333] h-1.5 rounded-full overflow-hidden">
            <div id="barraProgressoTopo" class="gold-bg h-full transition-all duration-500" style="width: 0%"></div>
        </div>
    </div>
</div>

<header class="bg-black/90 p-6 text-center border-b border-[#222]">
    <h1 class="serif text-3xl gold-text uppercase" id="nomeLoja">Abella Joias</h1>
    <div class="flex gap-3 justify-center mt-4">
        <a href="index.html" class="px-4 py-1 border border-[#caa85c] gold-text text-[10px] font-bold rounded-full">VOLTAR</a>
        <a href="carrinho.html" class="gold-bg text-black px-4 py-1 rounded-full font-bold text-[10px] flex items-center gap-2">
            CARRINHO: <span id="contadorCarrinho">R$ 0,00</span>
        </a>
    </div>
</header>

<main class="max-w-7xl mx-auto p-4">
    <div id="gridProdutos" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
</main>

<div id="modalQtd" class="modal">
    <div class="bg-[#141414] p-6 rounded-2xl w-full max-w-sm border border-[#2a2a2a] text-center">
        <h3 id="modalNomeProd" class="gold-text font-bold mb-4">Produto</h3>
        <div id="containerOpcoes"></div>
        <div class="flex gap-2 mt-6">
            <button onclick="document.getElementById('modalQtd').classList.remove('active')" class="flex-1 text-gray-500 text-[10px] uppercase font-bold">Cancelar</button>
            <button id="btnConfirmarAdd" class="flex-1 gold-bg text-black py-3 rounded-xl text-[10px] font-bold uppercase">Adicionar</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let produtoAtual = null;

const fM = v => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

async function atualizarVantagens() {
    const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const subtotal = carrinho.reduce((acc, i) => acc + (parseFloat(i.precoFinal || i.price) * i.quantidade), 0);
    document.getElementById('contadorCarrinho').innerText = fM(subtotal);

    const snap = await db.ref('settings/promocaoValor').once('value');
    if(snap.exists()){
        const regras = Object.values(snap.val()).sort((a,b) => a.minimo - b.minimo);
        let proxima = regras.find(r => subtotal < r.minimo);
        let banner = document.getElementById('bannerProgressoAtacado');
        banner.style.display = 'block';
        
        if(proxima){
            let falta = proxima.minimo - subtotal;
            let pct = (subtotal / proxima.minimo) * 100;
            document.getElementById('msgAtacadoTopo').innerHTML = `Faltam <span class="text-white">${fM(falta)}</span> para ganhar <span class="text-white">${proxima.porcentagem}% OFF</span>`;
            document.getElementById('barraProgressoTopo').style.width = pct + "%";
        } else {
            document.getElementById('msgAtacadoTopo').innerText = "🚀 DESCONTO MÁXIMO ATINGIDO!";
            document.getElementById('barraProgressoTopo').style.width = "100%";
        }
    }
}

function prepararAdd(p) {
    produtoAtual = p;
    document.getElementById('modalNomeProd').innerText = p.name;
    const container = document.getElementById('containerOpcoes');
    if(p.variacaoTipo === 'Aro'){
        let html = '<div class="grid-variacoes">';
        ["12","14","16","18","20","22","24"].forEach(a => {
            html += `<div class="bg-black p-2 rounded"> <span class="text-[9px] gold-text">Aro ${a}</span> <input type="number" class="input-var" data-var="${a}" value="0"> </div>`;
        });
        container.innerHTML = html + '</div>';
    } else {
        container.innerHTML = `<input type="number" id="qtdSimples" value="1" class="w-20 bg-black border border-gray-700 p-2 text-center text-xl mt-4">`;
    }
    document.getElementById('modalQtd').classList.add('active');
}

document.getElementById('btnConfirmarAdd').onclick = () => {
    let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const inputsVar = document.querySelectorAll('.input-var');
    if(inputsVar.length > 0){
        inputsVar.forEach(i => { if(i.value > 0) carrinho.push({...produtoAtual, name: `${produtoAtual.name} (${i.dataset.var})`, quantidade: parseInt(i.value)}); });
    } else {
        carrinho.push({...produtoAtual, quantidade: parseInt(document.getElementById('qtdSimples').value)});
    }
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    document.getElementById('modalQtd').classList.remove('active');
    atualizarVantagens();
};

async function carregar() {
    const params = new URLSearchParams(window.location.search);
    const catId = params.get('id');
    db.ref('products').on('value', snap => {
        const grid = document.getElementById('gridProdutos');
        grid.innerHTML = '';
        snap.forEach(s => {
            const p = s.val();
            if(p.category === catId && !p.paused){
                grid.innerHTML += `
                <div class="card-prod p-4" onclick='prepararAdd(${JSON.stringify({...p, key: s.key, precoFinal: p.price})})'>
                    <div class="tag-atacado-flash">ATACADO</div>
                    <img src="${p.image}" class="w-full aspect-square object-cover rounded-lg mb-2">
                    <h3 class="text-[10px] font-bold uppercase mb-2 h-8 overflow-hidden">${p.name}</h3>
                    <div class="gold-text font-bold text-lg">${fM(p.price)}</div>
                    <button class="w-full border border-[#caa85c] gold-text py-2 rounded-lg mt-3 text-[9px] font-bold uppercase">Adicionar</button>
                </div>`;
            }
        });
    });
    atualizarVantagens();
}
window.onload = carregar;
</script>
</body>
</html>
