<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Produtos | Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; padding-bottom: 60px; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .gold-bg { background: #caa85c; }
        header { background: #000; border-bottom: 1px solid #222; }
        
        /* Tag de Atacado com Animação */
        .tag-atacado-flash { 
            position: absolute; top: 8px; right: 8px; 
            background: linear-gradient(45deg, #caa85c, #f1d592); 
            color: #000; font-size: 9px; font-weight: 900; 
            padding: 3px 8px; border-radius: 6px; z-index: 20; 
            box-shadow: 0 4px 12px rgba(202, 168, 92, 0.4);
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        /* Banner de Progresso */
        #bannerProgressoAtacado {
            background: #1a1a1a;
            border-bottom: 2px solid #caa85c;
            padding: 12px;
            text-align: center;
            position: sticky;
            top: 135px; /* Ajustado para ficar abaixo dos botões do header */
            z-index: 40;
            display: none;
        }

        .card-prod { background:#141414; border-radius:15px; border:1px solid #2a2a2a; transition:.3s; display:flex; flex-direction:column; height:100%; overflow:hidden; position: relative; cursor: pointer; }
        .card-prod:hover { border-color: #caa85c; transform: translateY(-3px); }
        .img-container { width:100%; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; background:#1a1a1a; overflow:hidden; position:relative; }
        .img-container img { width:100%; height:100%; object-fit:cover; }

        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100; align-items:center; justify-content:center; padding: 20px; }
        .modal.active { display:flex; }
        .modal-content { background:#141414; border: 1px solid #2a2a2a; padding: 24px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; max-height: 90vh; overflow-y: auto; }
        
        .grid-variacoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .item-variacao { background: #0b0b0b; border: 1px solid #333; border-radius: 10px; padding: 8px; }
        .item-variacao span { display: block; font-size: 11px; color: #caa85c; font-weight: bold; }
        input[type="number"] { background: #000; border: 1px solid #333; color: #fff; outline: none; text-align: center; width: 100%; border-radius: 6px; }
    </style>
</head>
<body>

<header class="sticky top-0 z-50 shadow-lg text-center bg-black/90 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col items-center">
        <h1 class="serif text-3xl gold-text tracking-widest uppercase" id="nomeLoja">Abella Joias</h1>
        <p class="text-[10px] tracking-[4px] text-gray-500 font-light mt-1 mb-6 uppercase">Atacado de Joias no Bruto</p>
        
        <div class="flex gap-3 flex-wrap justify-center items-center">
            <a href="index.html" class="px-6 py-2 border border-[#caa85c] text-[#caa85c] text-[10px] font-bold rounded-full uppercase">Categorias</a>
            <a href="galvanicas.html" class="px-6 py-2 border border-[#caa85c] border-dashed text-[#caa85c] text-[10px] font-bold rounded-full uppercase">✨ Galvânicas</a>
            <a href="carrinho.html" class="gold-bg text-black px-6 py-2 rounded-full font-bold text-[10px] uppercase flex items-center gap-2">
                CARRINHO <span id="contadorCarrinho">R$ 0,00</span>
            </a>
        </div>
    </div>
</header>

<div id="bannerProgressoAtacado">
    <div class="max-w-xl mx-auto">
        <p id="msgAtacadoTopo" class="text-[10px] font-bold gold-text uppercase tracking-tighter mb-1"></p>
        <div class="w-full bg-[#333] h-1.5 rounded-full overflow-hidden">
            <div id="barraProgressoTopo" class="gold-bg h-full transition-all duration-500" style="width: 0%"></div>
        </div>
    </div>
</div>

<main class="max-w-7xl mx-auto p-6">
    <h2 id="tituloCategoria" class="serif text-center text-xl mb-8 gold-text uppercase tracking-widest">Produtos</h2>
    <div id="gridProdutos" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6"></div>
</main>

<div id="modalQtd" class="modal">
    <div class="modal-content">
        <h3 class="serif gold-text text-lg mb-1" id="modalNomeProd">Produto</h3>
        <img id="modalImgProd" class="w-full max-w-[200px] aspect-square object-cover rounded-xl mx-auto mb-4 border border-[#333]">
        <div id="containerOpcoes"></div>
        <div class="flex gap-2 mt-6">
            <button onclick="fecharModal()" class="flex-1 py-3 text-[10px] font-bold text-gray-500 uppercase">Sair</button>
            <button id="btnConfirmarAdd" class="flex-1 gold-bg text-black py-3 rounded-xl text-[10px] font-bold uppercase">Confirmar</button>
        </div>
    </div>
</div>

<script>
if (!firebase.apps.length) {
    firebase.initializeApp({
        apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
        databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
    });
}
const db = firebase.database();
let produtoAtualParaAdd = null;
let configEmpresa = { descontoPix: 5 };
let maiorDescGlobal = 0;

const fM = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

async function atualizarInterfaceGeral() {
    const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const subtotal = carrinho.reduce((acc, item) => acc + (parseFloat(item.precoFinal || item.price || 0) * parseInt(item.quantidade || 1)), 0);

    const promoSnap = await db.ref('settings/promocaoValor').once('value');
    if (!promoSnap.exists()) return;

    const regras = Object.values(promoSnap.val()).sort((a, b) => a.minimo - b.minimo);
    maiorDescGlobal = Math.max(...regras.map(r => Number(r.porcentagem)));

    let regraAtual = null;
    let proximaRegra = null;

    regras.forEach(r => {
        if (subtotal >= r.minimo) regraAtual = r;
        else if (!proximaRegra) proximaRegra = r;
    });

    // Atualiza o Banner de Progresso
    const banner = document.getElementById('bannerProgressoAtacado');
    const msg = document.getElementById('msgAtacadoTopo');
    const barra = document.getElementById('barraProgressoTopo');
    
    banner.style.display = 'block';
    if (proximaRegra) {
        let falta = proximaRegra.minimo - subtotal;
        let pct = (subtotal / proximaRegra.minimo) * 100;
        msg.innerHTML = `Faltam <span class="text-white">${fM(falta)}</span> para liberar <span class="text-white">${proximaRegra.porcentagem}% OFF</span>`;
        barra.style.width = pct + "%";
    } else {
        msg.innerHTML = `🔥 Você atingiu o desconto máximo de ${regraAtual.porcentagem}%!`;
        barra.style.width = "100%";
    }

    // Calcula economia de atacado para o contador do header
    let economiaAtacado = regraAtual ? subtotal * (Number(regraAtual.porcentagem) / 100) : 0;
    document.getElementById('contadorCarrinho').innerText = fM(subtotal - economiaAtacado);
}

async function carregarProdutos() {
    const params = new URLSearchParams(window.location.search);
    const catId = params.get('id');
    
    const [empSnap, catSnap, promoCnfSnap] = await Promise.all([
        db.ref('settings/empresa').once('value'),
        db.ref('categories/' + catId).once('value'),
        db.ref('settings/promocao').once('value')
    ]);

    configEmpresa = empSnap.val() || { nome: "Abella Joias", descontoPix: 5 };
    const categoria = catSnap.val() || {};
    const promoCnf = promoCnfSnap.val() || { ativa: false };

    document.getElementById('nomeLoja').innerText = configEmpresa.nome;
    document.getElementById('tituloCategoria').innerText = categoria.name || "Produtos";

    db.ref('products').on('value', snap => {
        const grid = document.getElementById('gridProdutos');
        grid.innerHTML = '';

        snap.forEach(s => {
            const p = s.val();
            if (p.category !== catId || p.paused) return;

            const temPromoAtiva = promoCnf.ativa === true && categoria.promoStatus === "ATIVA"; 
            const porcentagem = temPromoAtiva ? (categoria.promoPct || p.promoPct || 0) : 0;
            const precoFinal = porcentagem > 0 ? p.price * (1 - porcentagem / 100) : p.price;
            const valorPix = precoFinal * (1 - (configEmpresa.descontoPix / 100));
            const peso = (p.peso || p.weight) ? parseFloat(p.peso || p.weight).toFixed(2) : null;

            const prodData = JSON.stringify({ ...p, key: s.key, precoFinal }).replace(/'/g,"&apos;");

            grid.innerHTML += `
                <div class="card-prod p-4" onclick='prepararAdd(${prodData})'>
                    <div class="img-container mb-4 rounded-xl">
                        ${maiorDescGlobal > 0 ? `<div class="tag-atacado-flash">ATÉ ${maiorDescGlobal}% OFF</div>` : ''}
                        <img src="${p.image || 'https://via.placeholder.com/400'}" loading="lazy">
                    </div>
                    <div class="flex-1">
                        <div class="text-[9px] text-gray-500 font-bold">SKU: ${p.sku || '---'}</div>
                        <h3 class="text-[11px] font-bold uppercase mb-1 leading-tight h-8 overflow-hidden">${p.name}</h3>
                        ${peso ? `<div class="text-[9px] text-gray-400 mb-2 italic">Peso: ${peso}g</div>` : ''}
                        <div class="mb-3">
                            <div class="text-lg font-bold gold-text">${fM(precoFinal)}</div>
                            <div class="text-[10px] text-green-500 font-bold uppercase">Pix: ${fM(valorPix)}</div>
                        </div>
                    </div>
                    <button class="w-full border border-[#caa85c] text-[#caa85c] py-2 rounded-lg text-[9px] font-bold uppercase">Ver Opções</button>
                </div>`;
        });
    });
}

function prepararAdd(p) {
    produtoAtualParaAdd = p;
    document.getElementById('modalNomeProd').innerText = p.name;
    document.getElementById('modalImgProd').src = p.image;
    const container = document.getElementById('containerOpcoes');
    container.innerHTML = '';

    if (p.variacaoTipo === 'Lista' && p.opcoesPersonalizadas) {
        const opcoes = p.opcoesPersonalizadas.split(',').map(o => o.trim());
        let html = '<div class="grid-variacoes">';
        opcoes.forEach(opt => {
            html += `<div class="item-variacao"><span>${opt}</span><input type="number" min="0" value="0" data-var="${opt}" class="input-var-qtd p-2"></div>`;
        });
        container.innerHTML = html + '</div>';
    } else if (p.variacaoTipo === 'Aro') {
        const aros = ["12", "14", "16", "18", "20", "22", "24"];
        let html = '<div class="grid-variacoes">';
        aros.forEach(aro => {
            html += `<div class="item-variacao"><span>Aro ${aro}</span><input type="number" min="0" value="0" data-var="${aro}" class="input-var-qtd p-2"></div>`;
        });
        container.innerHTML = html + '</div>';
    } else {
        container.innerHTML = `<div class="mt-4"><input type="number" id="inputQtdSimples" value="1" min="1" class="p-3 text-center text-xl font-bold border border-[#caa85c] rounded-xl bg-black text-white w-32"></div>`;
    }
    document.getElementById('modalQtd').classList.add('active');
}

document.getElementById('btnConfirmarAdd').onclick = () => {
    let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const inputsVar = document.querySelectorAll('.input-var-qtd');
    let add = false;

    if (inputsVar.length > 0) {
        inputsVar.forEach(input => {
            const qtd = parseInt(input.value);
            if (qtd > 0) {
                carrinho.push({ ...produtoAtualParaAdd, name: `${produtoAtualParaAdd.name} (${input.dataset.var})`, quantidade: qtd });
                add = true;
            }
        });
    } else {
        const qtd = parseInt(document.getElementById('inputQtdSimples').value);
        if (qtd > 0) {
            carrinho.push({ ...produtoAtualParaAdd, quantidade: qtd });
            add = true;
        }
    }

    if (add) {
        localStorage.setItem('carrinho', JSON.stringify(carrinho));
        atualizarInterfaceGeral();
        fecharModal();
        alert("Adicionado!");
    }
};

function fecharModal() { document.getElementById('modalQtd').classList.remove('active'); }
window.onload = () => { carregarProdutos(); atualizarInterfaceGeral(); };
</script>
</body>
</html>
