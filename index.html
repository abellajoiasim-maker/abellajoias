<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Abella Joias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body { background:#0b0b0b; color:#eee; font-family:'Inter'; }
.serif { font-family:'Cinzel'; }
.gold { color:#caa85c; }

.card { background:#141414; border:1px solid #2a2a2a; border-radius:20px; overflow:hidden; transition:.3s; }
.card:hover { transform:translateY(-5px); border-color:#caa85c; }

.badge { position:absolute; top:12px; right:12px; font-size:9px; padding:4px 10px; border-radius:20px; font-weight:800; }

</style>
</head>

<body>

<!-- HEADER -->
<header class="sticky top-0 bg-black/90 backdrop-blur border-b border-[#222] z-50">
<div class="max-w-7xl mx-auto p-5 flex justify-between items-center">

<div>
<h1 id="nome" class="serif gold text-xl uppercase"></h1>
<p id="slogan" class="text-[9px] text-gray-400 uppercase"></p>
</div>

<a href="carrinho.html" class="border border-[#caa85c]/30 px-4 py-2 rounded-xl text-sm">
🛒 <span id="cartTotal">R$ 0,00</span>
</a>

</div>
</header>

<!-- BANNER PROMO -->
<div id="banner" class="hidden text-center py-3 border-b border-[#caa85c] bg-gradient-to-r from-black to-[#1a1a1a]">
<span id="bannerTexto" class="gold font-bold text-xs uppercase tracking-widest"></span>
</div>

<!-- INFO COMPRA -->
<div class="max-w-7xl mx-auto p-6 grid md:grid-cols-3 gap-4 text-center">

<div class="card p-4">
<p class="text-xs text-gray-400">Pagamento</p>
<p id="parcelamento" class="gold font-bold text-sm"></p>
</div>

<div class="card p-4">
<p class="text-xs text-gray-400">Desconto</p>
<p id="pix" class="gold font-bold text-sm"></p>
</div>

<div class="card p-4">
<p class="text-xs text-gray-400">Atendimento</p>
<a id="whats" target="_blank" class="gold font-bold text-sm">Falar no WhatsApp</a>
</div>

</div>

<!-- CATEGORIAS -->
<main class="max-w-7xl mx-auto p-6">

<h2 class="serif text-2xl mb-6">Coleções</h2>

<div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</main>

<!-- GALVANICAS -->
<div class="max-w-7xl mx-auto p-6">

<div class="card p-6 text-center">
<h3 class="serif gold text-lg mb-2">Precisa de Galvânica?</h3>
<p class="text-gray-400 text-sm mb-4">Temos parceiros confiáveis para banho e acabamento</p>
<a href="galvanicas.html" class="bg-[#caa85c] text-black px-6 py-3 rounded-xl font-bold text-xs">VER PARCEIROS</a>
</div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSy...",
databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const fM = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

// 🔥 CARREGAR TUDO
async function init(){

const [empSnap, catSnap, promoSnap] = await Promise.all([
db.ref('settings/empresa').once('value'),
db.ref('categories').once('value'),
db.ref('settings/promocao').once('value')
]);

const emp = empSnap.val() || {};
const cats = catSnap.val() || {};
const promo = promoSnap.val() || {};

// EMPRESA
nome.innerText = emp.nome || "Abella Joias";
slogan.innerText = emp.slogan || "";

parcelamento.innerText = `Até ${emp.parcelas || 1}x no cartão`;
pix.innerText = `${emp.pix || 0}% OFF no PIX`;

if(emp.whatsapp){
whats.href = `https://wa.me/${emp.whatsapp}`;
}

// BANNER
if(promo.ativa){
banner.classList.remove('hidden');
bannerTexto.innerText = promo.texto || "Promoção ativa";
}

// CATEGORIAS
grid.innerHTML = '';

Object.entries(cats).forEach(([id,cat])=>{
if(cat.paused) return;

const promoTag = cat.promoAtiva ? 
`<span class="badge" style="background:${cat.promoColor || '#caa85c'}">${cat.promoTag || 'OFERTA'}</span>` : '';

grid.innerHTML += `
<div class="card relative cursor-pointer" onclick="location.href='produtos.html?id=${id}'">
${promoTag}
<img src="${cat.image}" class="w-full aspect-[4/5] object-cover">
<div class="p-4">
<h3 class="font-bold">${cat.name}</h3>
<p class="text-xs text-gray-400 mt-1">Clique para ver modelos</p>
</div>
</div>
`;
});

atualizarCarrinho();

}

// 🛒
function atualizarCarrinho(){
const cart = JSON.parse(localStorage.getItem('carrinho') || '[]');
const total = cart.reduce((a,i)=>a + (i.precoFinal*i.quantidade),0);
cartTotal.innerText = fM(total);
}

window.onload = init;
</script>

</body>
</html>
