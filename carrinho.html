<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Carrinho • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; padding-bottom: 200px; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .card { background: #141414; border-radius: 20px; border: 1px solid #222; padding: 16px; margin-bottom: 16px; }
        input { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 12px !important; padding: 12px !important; width: 100%; outline: none; font-size: 13px; }
        input:focus { border-color: #caa85c !important; }
        .btn-pay { border: 1px solid #333; transition: 0.3s; color: #777; background: #000; }
        .btn-pay.active { border-color: #caa85c; background: rgba(202, 168, 92, 0.1); color: #caa85c; }
    </style>
</head>
<body class="p-4">

    <header class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='index.html'" class="p-2 bg-[#141414] rounded-full border border-[#333]">
                <svg class="w-5 h-5 gold-text" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="serif gold-text text-lg uppercase tracking-widest">Carrinho</h1>
        </div>
        <button onclick="limparTudo()" class="text-[10px] text-red-500 font-bold uppercase border border-red-500/20 px-3 py-1 rounded-full">Limpar</button>
    </header>

    <div id="area-impressao">
        <div id="lista-carrinho" class="space-y-3 mb-6"></div>

        <div class="card space-y-4 border-l-4 border-[#caa85c]">
            <h3 class="gold-text serif text-[10px] uppercase tracking-widest">👤 Identificação do Cliente</h3>
            <input type="text" id="nomeCliente" placeholder="Nome Completo *" required>
            <div class="grid grid-cols-2 gap-2">
                <input type="tel" id="telCliente" placeholder="WhatsApp *" required>
                <input type="text" id="cidCliente" placeholder="Cidade *" required>
            </div>
        </div>

        <div class="card space-y-4">
            <h3 class="gold-text serif text-[10px] uppercase tracking-widest">🚚 Dados de Entrega</h3>
            <input type="text" id="entLocal" placeholder="Nome do Local (Ex: Minha Loja)">
            <div class="grid grid-cols-4 gap-2">
                <div class="col-span-3"><input type="text" id="entRua" placeholder="Rua / Logradouro"></div>
                <div class="col-span-1"><input type="text" id="entNum" placeholder="Nº"></div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="entBairro" placeholder="Bairro">
                <input type="text" id="entCep" placeholder="CEP">
            </div>
            <input type="text" id="entCidade" placeholder="Cidade de Destino">
        </div>

        <div class="card border-t-4 border-[#caa85c]">
            <h3 class="gold-text serif text-[10px] uppercase tracking-widest mb-4">📊 Resumo do Pedido</h3>
            <div class="grid grid-cols-3 gap-2 text-center border-b border-[#222] pb-4 mb-4">
                <div><p class="text-[9px] text-gray-500 uppercase">Itens</p><b id="res-modelos" class="text-sm">0</b></div>
                <div><p class="text-[9px] text-gray-500 uppercase">Peças</p><b id="res-pecas" class="text-sm">0</b></div>
                <div><p class="text-[9px] text-gray-500 uppercase">Peso</p><b id="res-peso" class="text-sm">0g</b></div>
            </div>
            <div class="space-y-2 text-xs">
                <div class="flex justify-between text-gray-400"><span>Subtotal:</span> <span id="res-sub">R$ 0,00</span></div>
                <div class="flex justify-between text-green-500 font-bold"><span id="label-desc">Desconto:</span> <span id="res-desc">- R$ 0,00</span></div>
                <div class="flex justify-between text-gray-500 italic"><span>Parcelamento (3x):</span> <span id="res-parcelas">R$ 0,00</span></div>
                <div class="flex justify-between text-lg font-black gold-text pt-2 border-t border-[#222]">
                    <span>TOTAL:</span> <span id="res-total">R$ 0,00</span>
                </div>
            </div>
        </div>
    </div>

    <div class="px-2 mb-6">
        <div class="grid grid-cols-3 gap-2">
            <button onclick="setMetodo('pix')" id="btn-pix" class="btn-pay p-3 rounded-xl text-[10px] font-bold uppercase">PIX <br> (-5%)</button>
            <button onclick="setMetodo('cartao')" id="btn-cartao" class="btn-pay p-3 rounded-xl text-[10px] font-bold uppercase">CARTÃO <br> (CHEIO)</button>
            <button onclick="setMetodo('promo')" id="btn-promo" class="btn-pay p-3 rounded-xl text-[10px] font-bold uppercase">PROMO <br> ATIVA</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-md border-t border-[#222] p-4 z-50">
        <div class="grid grid-cols-5 gap-2 max-w-xl mx-auto">
            <button onclick="gerarPDF()" class="col-span-1 bg-[#222] text-white p-4 rounded-2xl flex items-center justify-center border border-[#333]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </button>
            <button onclick="enviarPedido()" class="col-span-4 bg-[#caa85c] text-black py-4 rounded-2xl font-black uppercase text-xs tracking-[2px] shadow-lg shadow-[#caa85c]/10">Finalizar no WhatsApp</button>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let metodoPagamento = 'pix';
const fMoeda = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

async function render() {
    const box = document.getElementById('lista-carrinho');
    box.innerHTML = '';
    let subtotal = 0, pecas = 0, peso = 0;

    carrinho.forEach((item, idx) => {
        const precoItem = item.precoFinal || item.price || 0;
        subtotal += precoItem * item.quantidade;
        pecas += item.quantidade;
        peso += (Number(item.peso || item.weight || 0) * item.quantidade);

        box.innerHTML += `
            <div class="flex items-center gap-3 bg-[#141414] p-3 rounded-2xl border border-[#222]">
                <img src="${item.image || item.foto}" class="w-14 h-14 object-cover rounded-xl border border-[#333]">
                <div class="flex-1 min-w-0">
                    <p class="text-[10px] font-bold uppercase truncate">${item.nome || item.name}</p>
                    <p class="gold-text text-xs font-black">${fMoeda(precoItem)}</p>
                    <div class="flex items-center gap-3 mt-2">
                        <button onclick="altQtd(${idx},-1)" class="w-6 h-6 bg-black rounded border border-[#333] flex items-center justify-center">-</button>
                        <span class="text-xs font-bold">${item.quantidade}</span>
                        <button onclick="altQtd(${idx},1)" class="w-6 h-6 bg-black rounded border border-[#333] flex items-center justify-center">+</button>
                    </div>
                </div>
                <button onclick="remover(${idx})" class="p-2 text-gray-600">✕</button>
            </div>`;
    });

    if(carrinho.length === 0) box.innerHTML = '<p class="text-center py-10 text-gray-500 uppercase text-[10px] tracking-widest">Carrinho Vazio</p>';

    // Lógica de Promoções do Firebase
    const snapPromo = await db.ref('settings/promocao').once('value');
    const promo = snapPromo.val() || { ativa: false };
    let pctPromo = 0;
    if (promo.ativa && promo.regras_progressivas) {
        Object.values(promo.regras_progressivas).forEach(r => { if (subtotal >= r.min) pctPromo = r.desc; });
    }

    let desconto = 0;
    if (metodoPagamento === 'pix') {
        desconto = subtotal * 0.05;
        document.getElementById('label-desc').innerText = "Desconto PIX (5%):";
    } else if (metodoPagamento === 'promo') {
        desconto = subtotal * (pctPromo / 100);
        document.getElementById('label-desc').innerText = `Promoção (${pctPromo}%):`;
    } else {
        desconto = 0;
        document.getElementById('label-desc').innerText = "Sem desconto:";
    }

    const totalFinal = subtotal - desconto;

    // Atualização da UI
    document.getElementById('res-modelos').innerText = carrinho.length;
    document.getElementById('res-pecas').innerText = pecas;
    document.getElementById('res-peso').innerText = peso.toFixed(2) + 'g';
    document.getElementById('res-sub').innerText = fMoeda(subtotal);
    document.getElementById('res-desc').innerText = "- " + fMoeda(desconto);
    document.getElementById('res-parcelas').innerText = `3x de ${fMoeda(totalFinal / 3)}`;
    document.getElementById('res-total').innerText = fMoeda(totalFinal);

    document.querySelectorAll('.btn-pay').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + metodoPagamento).classList.add('active');
}

function setMetodo(m) { metodoPagamento = m; render(); }
function altQtd(idx, d) { carrinho[idx].quantidade += d; if(carrinho[idx].quantidade <= 0) carrinho.splice(idx,1); salvar(); }
function remover(idx) { carrinho.splice(idx,1); salvar(); }
function limparTudo() { if(confirm("Esvaziar carrinho?")) { carrinho = []; salvar(); } }
function salvar() { localStorage.setItem('carrinho', JSON.stringify(carrinho)); render(); }

function gerarPDF() {
    const element = document.getElementById('area-impressao');
    const opt = { margin: 10, filename: 'pedido-abella.pdf', image: { type: 'jpeg', quality: 0.98 }, 
                  html2canvas: { scale: 2, backgroundColor: '#0b0b0b' }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
    html2pdf().set(opt).from(element).save();
}

async function enviarPedido() {
    const nome = document.getElementById('nomeCliente').value;
    const tel = document.getElementById('telCliente').value;
    const cid = document.getElementById('cidCliente').value;
    const totalTexto = document.getElementById('res-total').innerText;
    
    if (!nome || !tel || !cid || carrinho.length === 0) return alert("Preencha os dados obrigatórios (*)");

    const foneLoja = "5519988207658";
    const formaPagamento = metodoPagamento.toUpperCase();

    let msg = `Olá, meu nome é *${nome}*!\n\n`;
    msg += `Acabei de fazer um pedido pelo catálogo da Abella Joias.\n`;
    msg += `💰 *Total:* ${totalTexto}\n`;
    msg += `💳 *Pagamento:* ${formaPagamento}\n\n`;
    msg += `Aguardando seu retorno para finalizar!`;

    // Salva cópia no banco para conferência
    const pedidoID = Date.now().toString().slice(-5);
    await db.ref('orders/' + pedidoID).set({
        cliente: { nome, tel, cid, local: document.getElementById('entLocal').value },
        entrega: { rua: document.getElementById('entRua').value, num: document.getElementById('entNum').value, bairro: document.getElementById('entBairro').value, cep: document.getElementById('entCep').value, cidade: document.getElementById('entCidade').value },
        itens: carrinho,
        pagamento: formaPagamento,
        total: totalTexto,
        data: new Date().toLocaleString()
    });

    localStorage.removeItem('carrinho');
    window.location.href = `https://api.whatsapp.com/send?phone=${foneLoja}&text=${encodeURIComponent(msg)}`;
}

render();
</script>
</body>
</html>
