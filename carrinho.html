<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checkout • Abella Joias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body { background:#0b0b0b; color:#eee; font-family:'Inter'; }
.gold { color:#caa85c }
.card { background:#111; border:1px solid #222; border-radius:16px; padding:16px; margin-bottom:12px;}
.input { background:#000; border:1px solid #333; padding:10px; border-radius:10px; width:100%;}
.btn { padding:12px; border-radius:12px; font-weight:800;}
.btn-main { background:#caa85c; color:#000;}
.btn-alt { border:1px solid #333;}
.item { display:flex; gap:10px; border-bottom:1px solid #222; padding:10px 0;}
</style>
</head>

<body class="p-4">

<!-- HEADER -->
<div class="flex justify-between mb-4">
<button onclick="history.back()" class="text-xs gold">← Voltar</button>
<h1 class="gold text-sm">Checkout</h1>
<a href="produtos.html" class="text-xs text-gray-400">Continuar</a>
</div>

<!-- PRODUTOS -->
<div class="card">
<h2 class="gold text-xs mb-2">Seu Pedido</h2>
<div id="lista"></div>
</div>

<!-- CLIENTE -->
<div class="card">
<h2 class="gold text-xs mb-2">Cliente</h2>
<input class="input mb-2" id="nome" placeholder="Nome">
<input class="input mb-2" id="tel" placeholder="WhatsApp">
<input class="input" id="cidade">
</div>

<!-- ENTREGA -->
<div class="card">
<h2 class="gold text-xs mb-2">Entrega</h2>
<input class="input mb-2" id="local">
<input class="input mb-2" id="rua">
<input class="input mb-2" id="numero">
<input class="input mb-2" id="bairro">
<input class="input" id="cidadeEntrega">
</div>

<!-- PAGAMENTO -->
<div class="card">
<div class="flex gap-2">
<button onclick="setMetodo('pix')" class="btn btn-alt">PIX</button>
<button onclick="setMetodo('cartao')" class="btn btn-alt">Cartão</button>
</div>
</div>

<!-- RESUMO -->
<div class="card">
<div id="resumo"></div>
</div>

<!-- FIXO -->
<div class="fixed bottom-0 left-0 right-0 bg-black p-3 border-t border-[#333]">
<div class="flex gap-2">
<button onclick="gerarPDF()" class="btn btn-alt">PDF</button>
<button onclick="finalizar()" class="btn btn-main">Finalizar</button>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSy...",
databaseURL:"https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let carrinho=JSON.parse(localStorage.getItem('carrinho')||'[]');
let metodo='pix';

let empresa={pixDesconto:0,parcelas:1,whatsapp:""};

async function init(){
const emp=await db.ref('settings/empresa').once('value');
empresa={...empresa,...(emp.val()||{})};

render();
}

function render(){
let lista=document.getElementById('lista');
lista.innerHTML='';

let sub=0,pecas=0,peso=0;

carrinho.forEach((i,idx)=>{
let totalItem=i.precoFinal*i.quantidade;
sub+=totalItem;
pecas+=i.quantidade;
peso+=(i.peso||0)*i.quantidade;

lista.innerHTML+=`
<div class="item">
<img src="${i.image}" class="w-14 h-14 rounded object-cover">
<div class="flex-1">
<div class="text-xs font-bold">${i.nome}</div>
<div class="text-[10px]">${i.sku||''}</div>
<div class="text-[10px]">${i.variacao||''}</div>
<div class="text-[10px]">Peso: ${i.peso||0}g</div>
<div class="text-[10px] text-green-400 font-bold">Total: R$ ${totalItem.toFixed(2)}</div>

<div class="flex justify-between mt-1">
<input type="number" value="${i.quantidade}" min="1" onchange="qtd(${idx},this.value)" class="w-12 text-center bg-black border border-[#333]">
<button onclick="rem(${idx})" class="text-red-500 text-xs">remover</button>
</div>
</div>
</div>`;
});

let descPix=metodo==='pix'?sub*(empresa.pixDesconto/100):0;
let total=sub-descPix;

document.getElementById('resumo').innerHTML=`
<div class="text-xs">Peças: ${pecas}</div>
<div class="text-xs">Peso: ${peso.toFixed(2)}g</div>
<div class="text-xs">Subtotal: R$ ${sub.toFixed(2)}</div>
<div class="text-green-400 text-xs">PIX: -${descPix.toFixed(2)}</div>
<div class="font-bold gold mt-2">Total: R$ ${total.toFixed(2)}</div>
<div class="text-xs">${empresa.parcelas}x de ${(total/empresa.parcelas).toFixed(2)}</div>
`;
}

function qtd(i,v){carrinho[i].quantidade=parseInt(v)||1; salvar();}
function rem(i){carrinho.splice(i,1); salvar();}
function salvar(){localStorage.setItem('carrinho',JSON.stringify(carrinho)); render();}
function setMetodo(m){metodo=m; render();}

function gerarPDF(){
html2pdf().from(document.body).save();
}

async function finalizar(){
if(!empresa.whatsapp) return alert("Configure WhatsApp");

let nome=document.getElementById('nome').value;

let pedido={
cliente:nome,
itens:carrinho,
data:Date.now()
};

await db.ref('orders').push(pedido);

let listaTxt=carrinho.map(i=>`${i.nome} x${i.quantidade}`).join('%0A');

let msg=`Pedido Abella Joias%0ACliente: ${nome}%0A${listaTxt}`;

window.open(`https://wa.me/${empresa.whatsapp}?text=${msg}`);
}

init();
</script>

</body>
</html>
