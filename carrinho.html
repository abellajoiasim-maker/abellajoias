<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Carrinho • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0b0b; color: #eee; margin:0; padding-bottom: 160px; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .card { background: #141414; border-radius: 20px; border: 1px solid #222; padding: 16px; }
        input, select { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 12px !important; padding: 12px !important; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: #caa85c !important; }
        .btn-pay { border: 1px solid #333; transition: 0.3s; }
        .btn-pay.active { border-color: #caa85c; background: #caa85c/10; color: #caa85c; }
    </style>
</head>
<body class="p-4">

    <header class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 bg-[#141414] rounded-full border border-[#333]">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="serif gold-text text-xl uppercase tracking-widest">Carrinho</h1>
        </div>
        <button onclick="limparCarrinho()" class="text-[10px] text-red-500 font-bold uppercase border border-red-500/30 px-3 py-1 rounded-full">Limpar tudo</button>
    </header>

    <div id="lista-carrinho" class="space-y-3 mb-8">
        </div>

    <div class="card space-y-4 mb-6">
        <h3 class="gold-text serif text-xs uppercase tracking-widest border-b border-[#222] pb-2">Identificação do Cliente</h3>
        <input type="text" id="nomeCliente" placeholder="Nome Completo *" required>
        <input type="tel" id="telefoneCliente" placeholder="WhatsApp (DDD + Número) *" required>
        <input type="text" id="cidadeCliente" placeholder="Cidade / Estado *" required>
    </div>

    <div class="card space-y-4 mb-6">
        <h3 class="gold-text serif text-xs uppercase tracking-widest border-b border-[#222] pb-2">Endereço de Entrega</h3>
        <input type="text" id="localEntrega" placeholder="Nome do Local (Ex: Minha Loja, Casa)">
        <div class="grid grid-cols-4 gap-2">
            <div class="col-span-3"><input type="text" id="ruaEntrega" placeholder="Rua / Logradouro"></div>
            <div class="col-span-1"><input type="text" id="numEntrega" placeholder="Nº"></div>
        </div>
        <input type="text" id="bairroEntrega" placeholder="Bairro">
        <input type="text" id="cidadeEntrega" placeholder="Cidade do Destinatário">
    </div>

    <div class="card space-y-4 mb-8">
        <h3 class="gold-text serif text-xs uppercase tracking-widest border-b border-[#222] pb-2">Forma de Pagamento</h3>
        <div class="grid grid-cols-3 gap-2">
            <button onclick="setMetodo('pix')" id="btn-pix" class="btn-pay p-3 rounded-xl text-[10px] font-bold uppercase">PIX <br><span class="text-[8px] text-green-500">(-5%)</span></button>
            <button onclick="setMetodo('cartao')" id="btn-cartao" class="btn-pay p-3 rounded-xl text-[10px] font-bold uppercase">Cartão <br><span class="text-[8px] text-gray-400">Sem Desc.</span></button>
            <button onclick="setMetodo('promo')" id="btn-promo" class="btn-pay p-3 rounded-xl text-[10px] font-bold uppercase">Promoção <br><span id="promo-label" class="text-[8px] text-blue-400">Ativa</span></button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-[#222] p-4 z-50">
        <div class="max-w-xl mx-auto space-y-1 mb-4">
            <div class="flex justify-between text-[10px] text-gray-500 uppercase font-bold">
                <span>Itens: <b id="res-itens">0</b> | Peças: <b id="res-pecas">0</b> | Peso: <b id="res-peso">0g</b></span>
            </div>
            <div class="flex justify-between text-xs text-gray-400"><span>Preço Cheio:</span> <span id="res-sub">R$ 0,00</span></div>
            <div class="flex justify-between text-xs text-green-500"><span>Desconto Aplicado:</span> <span id="res-desc">- R$ 0,00</span></div>
            <div class="flex justify-between text-lg font-black gold-text italic"><span>TOTAL A PAGAR:</span> <span id="res-total">R$ 0,00</span></div>
        </div>
        <button onclick="enviarPedido()" class="w-full bg-[#caa85c] text-black py-4 rounded-2xl font-black uppercase text-xs tracking-[2px] shadow-xl shadow-[#caa85c]/10">Finalizar Pedido via WhatsApp</button>
    </div>

<script>
// CONFIG FIREBASE
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let metodoPagamento = 'pix'; // Padrão
let resumoGeral = { sub: 0, desc: 0, total: 0, peso: 0, pecas: 0 };

const fMoeda = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

async function render() {
    const box = document.getElementById('lista-carrinho');
    box.innerHTML = '';
    
    let subtotal = 0;
    let pesoTotal = 0;
    let pecasTotal = 0;

    carrinho.forEach((item, idx) => {
        const totalItem = item.precoFinal * item.quantidade;
        subtotal += totalItem;
        pecasTotal += item.quantidade;
        pesoTotal += (Number(item.peso || 0) * item.quantidade);

        box.innerHTML += `
            <div class="flex items-center gap-3 bg-[#141414] p-3 rounded-2xl border border-[#222]">
                <div class="relative w-16 h-16">
                    <img src="${item.image || item.foto}" class="w-full h-full object-cover rounded-xl">
                </div>
                <div class="flex-1">
                    <p class="text-[10px] font-bold uppercase leading-tight">${item.nome}</p>
                    ${item.variacao ? `<p class="text-[8px] text-[#caa85c] italic mb-1">Obs: ${item.variacao}</p>` : ''}
                    <p class="gold-text text-xs font-black">${fMoeda(item.precoFinal)}</p>
                    
                    <div class="flex items-center gap-3 mt-2">
                        <button onclick="altQtd(${idx}, -1)" class="w-7 h-7 bg-black rounded-lg border border-[#333] flex items-center justify-center font-bold">-</button>
                        <span class="text-xs font-bold w-4 text-center">${item.quantidade}</span>
                        <button onclick="altQtd(${idx}, 1)" class="w-7 h-7 bg-black rounded-lg border border-[#333] flex items-center justify-center font-bold">+</button>
                    </div>
                </div>
                <button onclick="remover(${idx})" class="p-2 text-gray-600">✕</button>
            </div>`;
    });

    if(carrinho.length === 0) box.innerHTML = '<p class="text-center py-20 text-gray-600 uppercase text-[10px] tracking-[3px]">O carrinho está vazio</p>';

    // Lógica de Descontos
    let descontoFinal = 0;

    // 1. Busca se há promoção progressiva ativa no banco
    const snapPromo = await db.ref('settings/promocao').once('value');
    const promo = snapPromo.val() || {};
    let pctPromo = 0;

    if (promo.ativa && promo.regras_progressivas) {
        const regras = Object.values(promo.regras_progressivas);
        regras.forEach(r => { if (subtotal >= r.min) pctPromo = r.desc; });
    }
    document.getElementById('promo-label').innerText = `${pctPromo}% OFF`;

    // Aplica o método escolhido
    if (metodoPagamento === 'pix') {
        descontoFinal = subtotal * 0.05;
    } else if (metodoPagamento === 'promo') {
        descontoFinal = subtotal * (pctPromo / 100);
    } else {
        descontoFinal = 0;
    }

    resumoGeral = { 
        sub: subtotal, 
        desc: descontoFinal, 
        total: subtotal - descontoFinal,
        peso: pesoTotal,
        pecas: pecasTotal
    };

    // Atualiza UI
    document.getElementById('res-itens').innerText = carrinho.length;
    document.getElementById('res-pecas').innerText = pecasTotal;
    document.getElementById('res-peso').innerText = pesoTotal.toFixed(1) + 'g';
    document.getElementById('res-sub').innerText = fMoeda(resumoGeral.sub);
    document.getElementById('res-desc').innerText = "- " + fMoeda(resumoGeral.desc);
    document.getElementById('res-total').innerText = fMoeda(resumoGeral.total);
    
    // Atualiza botões
    document.querySelectorAll('.btn-pay').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + metodoPagamento).classList.add('active');
}

function setMetodo(m) { metodoPagamento = m; render(); }
function altQtd(idx, delta) {
    carrinho[idx].quantidade += delta;
    if (carrinho[idx].quantidade <= 0) carrinho.splice(idx, 1);
    salvar();
}
function remover(idx) { carrinho.splice(idx, 1); salvar(); }
function limparCarrinho() { if(confirm("Deseja esvaziar o carrinho?")) { carrinho = []; salvar(); } }
function salvar() { localStorage.setItem('carrinho', JSON.stringify(carrinho)); render(); }

async function enviarPedido() {
    const dados = {
        nome: document.getElementById('nomeCliente').value,
        tel: document.getElementById('telefoneCliente').value,
        cidade: document.getElementById('cidadeCliente').value,
        local: document.getElementById('localEntrega').value,
        rua: document.getElementById('ruaEntrega').value,
        num: document.getElementById('numEntrega').value,
        bairro: document.getElementById('bairroEntrega').value,
        cidEntrega: document.getElementById('cidadeEntrega').value
    };

    if (!dados.nome || !dados.tel || !dados.cidade || carrinho.length === 0) {
        return alert("Por favor, preencha todos os campos obrigatórios (*).");
    }

    const pedidoId = Date.now().toString().slice(-6);

    // Salva no Firebase
    await db.ref('orders/' + pedidoId).set({
        cliente: dados,
        itens: carrinho,
        resumo: resumoGeral,
        pagamento: metodoPagamento,
        data: new Date().toLocaleString('pt-BR')
    });

    // Monta Mensagem do WhatsApp
    let msg = `*NOVO PEDIDO #${pedidoId} - ABELLA JOIAS*\\n\\n`;
    msg += `👤 *CLIENTE:* ${dados.nome}\\n`;
    msg += `📞 *WHATS:* ${dados.tel}\\n`;
    msg += `📍 *CIDADE:* ${dados.cidade}\\n\\n`;
    
    msg += `🚚 *ENDEREÇO DE ENTREGA:*\\n`;
    msg += `${dados.rua || '---'}, ${dados.num || 'S/N'}\\n`;
    msg += `${dados.bairro || '---'} - ${dados.cidEntrega || dados.cidade}\\n\\n`;

    msg += `🛍️ *ITENS:*\\n`;
    carrinho.forEach(i => {
        msg += `• ${i.quantidade}x ${i.nome} ${i.variacao ? '('+i.variacao+')' : ''} - ${fMoeda(i.precoFinal * i.quantidade)}\\n`;
    });

    msg += `\\n📊 *RESUMO:*\\n`;
    msg += `Peças: ${resumoGeral.pecas} | Peso: ${resumoGeral.peso.toFixed(1)}g\\n`;
    msg += `Subtotal: ${fMoeda(resumoGeral.sub)}\\n`;
    msg += `Pagamento: *${metodoPagamento.toUpperCase()}*\\n`;
    msg += `Desconto: -${fMoeda(resumoGeral.desc)}\\n`;
    msg += `*TOTAL: ${fMoeda(resumoGeral.total)}*`;

    localStorage.removeItem('carrinho');
    const url = `https://api.whatsapp.com/send?phone=5519988207658&text=${encodeURIComponent(msg)}`;
    window.location.href = url;
}

render();
</script>
</body>
</html>
