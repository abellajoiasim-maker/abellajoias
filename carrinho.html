<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Pedido • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .gold-bg { background: #caa85c; }
        .card { background: #141414; border-radius: 18px; border: 1px solid #2a2a2a; padding: 20px; margin-bottom: 20px; }
        
        /* Ajuste Visual da Barra de Progresso no Carrinho */
        .progress-wrapper { background: #222; border-radius: 50px; height: 10px; width: 100%; overflow: hidden; margin-top: 8px; border: 1px solid #333; }
        .progress-fill { background: linear-gradient(90deg, #caa85c, #f1d592); height: 100%; transition: width 0.6s ease-in-out; width: 0%; }
        
        .pulse-save { animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        input { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; padding: 12px; border-radius: 10px; width: 100%; outline: none; margin-bottom: 12px; }
        .pay-btn { border: 1px solid #333; border-radius: 14px; padding: 16px; text-align: center; cursor: pointer; transition: 0.3s; }
        .pay-btn.active { border-color: #caa85c; background: rgba(202, 168, 92, 0.05); }
    </style>
</head>
<body>

<header class="sticky top-0 z-50 bg-black/95 backdrop-blur-md border-b border-[#222]">
    <div class="max-w-xl mx-auto p-4 flex justify-between items-center">
        <button onclick="history.back()" class="text-[10px] font-bold uppercase gold-text">← Continuar Comprando</button>
        <h1 class="serif gold-text uppercase text-sm tracking-widest">Meu Carrinho</h1>
    </div>
</header>

<main class="max-w-xl mx-auto p-4 pb-40">

    <div class="card border-dashed border-[#caa85c]/50">
        <div id="infoProgresso">
            <div class="flex justify-between items-end">
                <span id="labelProgresso" class="text-[10px] uppercase font-bold text-gray-400">Calculando vantagens...</span>
                <span id="pctAtual" class="text-xs font-bold gold-text">0%</span>
            </div>
            <div class="progress-wrapper">
                <div id="barraProgresso" class="progress-fill"></div>
            </div>
            <p id="fraseMotivacional" class="text-[9px] italic text-gray-500 mt-2 text-center"></p>
        </div>
    </div>

    <div id="listaItens" class="space-y-4 mb-6"></div>

    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-6 tracking-widest text-center">Resumo do Pedido</h2>
        <div class="space-y-3">
            <div class="flex justify-between text-sm text-gray-400">
                <span>Subtotal dos Produtos</span>
                <b id="subtotalTxt" class="text-white">R$ 0,00</b>
            </div>
            
            <div id="linhaDescontoAtacado" class="flex justify-between text-sm text-emerald-500 font-bold hidden">
                <span id="labelAtacado">Desconto de Atacado</span>
                <b id="valorAtacado">- R$ 0,00</b>
            </div>

            <div id="linhaDescontoPix" class="flex justify-between text-sm text-sky-400 font-bold hidden">
                <span>Bônus Pagamento Pix</span>
                <b id="valorPix">- R$ 0,00</b>
            </div>

            <div class="pt-4 mt-2 border-t border-[#333] flex justify-between items-center">
                <span class="serif gold-text text-sm">Total a Pagar</span>
                <div class="text-right">
                    <div id="totalFinalTxt" class="text-3xl font-bold text-white">R$ 0,00</div>
                    <div id="totalEconomizado" class="text-[10px] uppercase text-emerald-500 font-bold pulse-save"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-4 tracking-widest border-b border-[#222] pb-2 text-center">Forma de Pagamento</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="pay-btn" onclick="setPagamento('Pix', this)">
                <span class="block text-white font-bold text-sm">PIX</span>
                <span class="text-[9px] text-emerald-500 font-bold uppercase" id="pixInfo">---</span>
            </div>
            <div class="pay-btn" onclick="setPagamento('Cartão', this)">
                <span class="block text-white font-bold text-sm">CARTÃO</span>
                <span class="text-[9px] text-gray-500 uppercase">Sem juros</span>
            </div>
        </div>
    </div>

    <div class="card">
        <input id="nomeCliente" placeholder="Seu Nome Completo">
        <input id="telefoneCliente" placeholder="Seu WhatsApp">
        <button onclick="finalizarPedido()" class="w-full gold-bg text-black py-5 rounded-2xl font-bold uppercase tracking-widest shadow-lg mt-2">
            Finalizar Pedido via WhatsApp
        </button>
    </div>
</main>

<script>
// Configurações e Firebase (Mantendo sua chave)
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let formaPagamento = '';
let configEmpresa = { descontoPix: 0, whats: '' };

const fM = v => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

async function inicializar() {
    const snap = await db.ref('settings/empresa').once('value');
    if(snap.exists()){
        configEmpresa = snap.val();
        document.getElementById('pixInfo').innerText = `${configEmpresa.descontoPix}% DESCONTO`;
    }
    renderCarrinho();
}

function setPagamento(tipo, el) {
    formaPagamento = tipo;
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderCarrinho();
}

async function renderCarrinho() {
    const lista = document.getElementById('listaItens');
    lista.innerHTML = '';
    let bruto = 0;

    carrinho.forEach((item, index) => {
        let preco = parseFloat(item.precoFinal || item.price || 0);
        let qtd = parseInt(item.quantidade || 1);
        bruto += (preco * qtd);

        lista.innerHTML += `
            <div class="flex items-center gap-4 bg-[#141414] p-3 rounded-xl border border-[#222]">
                <img src="${item.image}" class="w-16 h-16 object-cover rounded-lg border border-[#333]">
                <div class="flex-1">
                    <h4 class="text-[10px] font-bold text-white uppercase">${item.name}</h4>
                    <div class="text-xs gold-text font-bold mt-1">${fM(preco)}</div>
                    <div class="flex items-center gap-3 mt-2">
                        <button onclick="alterarQtd(${index},-1)" class="w-6 h-6 bg-[#222] rounded border border-[#444]">-</button>
                        <span class="text-xs font-bold">${qtd}</span>
                        <button onclick="alterarQtd(${index},1)" class="w-6 h-6 bg-[#222] rounded border border-[#444]">+</button>
                    </div>
                </div>
                <div class="text-right font-bold text-sm text-white">${fM(preco * qtd)}</div>
            </div>`;
    });

    // LÓGICA DE PROGRESSO E GATILHOS
    const snapPromo = await db.ref('settings/promocaoValor').once('value');
    let economiaAtacado = 0;
    let pctAplicada = 0;

    if (snapPromo.exists()) {
        const regras = Object.values(snapPromo.val()).sort((a, b) => a.minimo - b.minimo);
        let proxima = null;

        regras.forEach(r => {
            if (bruto >= r.minimo) {
                pctAplicada = Number(r.porcentagem);
                economiaAtacado = bruto * (pctAplicada / 100);
            } else if (!proxima) {
                proxima = r;
            }
        });

        const barra = document.getElementById('barraProgresso');
        const frase = document.getElementById('fraseMotivacional');
        const label = document.getElementById('labelProgresso');

        if (proxima) {
            let falta = proxima.minimo - bruto;
            let percentBarra = (bruto / proxima.minimo) * 100;
            barra.style.width = percentBarra + "%";
            label.innerText = `Faltam ${fM(falta)} para o próximo nível`;
            document.getElementById('pctAtual').innerText = pctAplicada + "%";
            frase.innerText = `Adicione mais itens para liberar ${proxima.porcentagem}% de desconto!`;
        } else {
            barra.style.width = "100%";
            label.innerText = "Nível máximo de desconto atingido!";
            document.getElementById('pctAtual').innerText = pctAplicada + "%";
            frase.innerText = "🔥 Você desbloqueou a melhor condição do catálogo!";
        }
    }

    // RESUMO FINAL
    let subtotalAposAtacado = bruto - economiaAtacado;
    let descPix = (formaPagamento === 'Pix') ? (subtotalAposAtacado * (configEmpresa.descontoPix / 100)) : 0;
    let totalFinal = subtotalAposAtacado - descPix;
    let economiaTotal = economiaAtacado + descPix;

    document.getElementById('subtotalTxt').innerText = fM(bruto);
    
    if (economiaAtacado > 0) {
        document.getElementById('linhaDescontoAtacado').classList.remove('hidden');
        document.getElementById('labelAtacado').innerText = `Desconto Atacado (${pctAplicada}%)`;
        document.getElementById('valorAtacado').innerText = "- " + fM(economiaAtacado);
    } else {
        document.getElementById('linhaDescontoAtacado').classList.add('hidden');
    }

    if (descPix > 0) {
        document.getElementById('linhaDescontoPix').classList.remove('hidden');
        document.getElementById('valorPix').innerText = "- " + fM(descPix);
    } else {
        document.getElementById('linhaDescontoPix').classList.add('hidden');
    }

    document.getElementById('totalFinalTxt').innerText = fM(totalFinal);
    document.getElementById('totalEconomizado').innerText = economiaTotal > 0 ? `Você está economizando ${fM(economiaTotal)}` : "";

    // Global para o WhatsApp
    window.resumoFinal = { totalFinal, economiaTotal, bruto };
}

function alterarQtd(idx, d) {
    carrinho[idx].quantidade = (carrinho[idx].quantidade || 1) + d;
    if (carrinho[idx].quantidade <= 0) carrinho.splice(idx, 1);
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    renderCarrinho();
}

function finalizarPedido() {
    const nome = document.getElementById('nomeCliente').value;
    if (!nome || !formaPagamento) return alert("Por favor, preencha seu nome e escolha o pagamento.");
    
    let msg = `Olá! Meu nome é ${nome}.\nQuero finalizar meu pedido na Abella Joias:\n\n*Total:* ${fM(window.resumoFinal.totalFinal)}\n*Economia total:* ${fM(window.resumoFinal.economiaTotal)}\n*Pagamento:* ${formaPagamento}`;
    window.location.href = `https://api.whatsapp.com/send?phone=${configEmpresa.whats}&text=${encodeURIComponent(msg)}`;
}

inicializar();
</script>
</body>
</html>
