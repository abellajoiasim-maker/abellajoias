<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Carrinho • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; padding-bottom: 220px; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .card { background: #141414; border-radius: 20px; border: 1px solid #222; padding: 16px; margin-bottom: 16px; }
        input, select { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 12px !important; padding: 10px !important; width: 100%; outline: none; font-size: 13px; }
        input:focus { border-color: #caa85c !important; }
        .btn-pay { border: 1px solid #333; transition: 0.3s; color: #777; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-pay.active { border-color: #caa85c; background: rgba(202, 168, 92, 0.1); color: #caa85c; }
        .input-qtd { width: 50px !important; text-align: center; padding: 5px !important; border-radius: 8px !important; }
    </style>
</head>
<body class="p-4">

    <header class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='index.html'" class="p-2 bg-[#141414] rounded-full border border-[#333]">
                <svg class="w-5 h-5 gold-text" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="serif gold-text text-lg uppercase tracking-widest">Carrinho</h1>
        </div>
    </header>

    <div id="area-impressao">
        <div id="lista-carrinho" class="space-y-3 mb-6"></div>

        <div class="card space-y-4 border-l-4 border-[#caa85c]">
            <h3 class="gold-text serif text-[10px] uppercase tracking-widest">👤 Identificação</h3>
            <input type="text" id="nomeCliente" placeholder="Nome Completo *">
            <div class="grid grid-cols-2 gap-2">
                <input type="tel" id="telCliente" placeholder="WhatsApp *">
                <input type="text" id="cidCliente" placeholder="Cidade *">
            </div>
        </div>

        <div class="card space-y-4">
            <h3 class="gold-text serif text-[10px] uppercase tracking-widest">🚚 Entrega</h3>
            <input type="text" id="entLocal" placeholder="Local (Ex: Loja/Casa)">
            <input type="text" id="entEnd" placeholder="Rua, Número, Bairro">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="entCep" placeholder="CEP">
                <input type="text" id="entCid" placeholder="Cidade Destino">
            </div>
        </div>
    </div>

    <div class="card">
        <h3 class="gold-text serif text-[9px] uppercase tracking-[2px] mb-3 text-center">Selecione a Forma de Pagamento</h3>
        <div class="grid grid-cols-3 gap-2">
            <button onclick="setMetodo('pix')" id="btn-pix" class="btn-pay p-3 rounded-xl">
                <span class="text-[10px] font-bold">PIX</span>
                <span class="text-[8px] text-green-500">-5% OFF</span>
            </button>
            <button onclick="setMetodo('cartao')" id="btn-cartao" class="btn-pay p-3 rounded-xl">
                <span class="text-[10px] font-bold">CARTÃO</span>
                <span class="text-[8px]">CHEIO</span>
            </button>
            <button onclick="setMetodo('promo')" id="btn-promo" class="btn-pay p-3 rounded-xl">
                <span class="text-[10px] font-bold">PROMO</span>
                <span id="promo-label" class="text-[8px] text-blue-400">ATIVA</span>
            </button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-md border-t border-[#222] p-4 z-50">
        <div class="max-w-xl mx-auto mb-4">
            <div class="grid grid-cols-3 gap-2 text-center text-[10px] text-gray-500 uppercase font-bold mb-3 border-b border-[#222] pb-2">
                <span>Itens: <b id="res-modelos" class="text-white">0</b></span>
                <span>Peças: <b id="res-pecas" class="text-white">0</b></span>
                <span>Peso: <b id="res-peso" class="text-white">0g</b></span>
            </div>
            <div class="flex justify-between text-xs text-gray-400"><span>Subtotal:</span> <span id="res-sub">R$ 0,00</span></div>
            <div class="flex justify-between text-xs text-green-500"><span>Desconto:</span> <span id="res-desc">- R$ 0,00</span></div>
            <div class="flex justify-between text-[11px] text-gray-500 italic"><span>Ou 3x de:</span> <span id="res-parcelas">R$ 0,00</span></div>
            <div class="flex justify-between text-lg font-black gold-text mt-1">
                <span>TOTAL:</span> <span id="res-total">R$ 0,00</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="gerarPDF()" class="bg-[#222] p-4 rounded-2xl border border-[#333]"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg></button>
            <button onclick="enviarPedido()" class="flex-1 bg-[#caa85c] text-black py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Finalizar Pedido</button>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let metodoPagamento = 'pix';
const fMoeda = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

async function render() {
    const box = document.getElementById('lista-carrinho');
    box.innerHTML = '';
    let sub = 0, pecas = 0, pesoTotal = 0;

    carrinho.forEach((item, idx) => {
        const precoUn = item.precoFinal || 0;
        const totalItem = precoUn * item.quantidade;
        const pesoUn = Number(item.peso || 0);
        const pesoItemTotal = pesoUn * item.quantidade;

        sub += totalItem;
        pecas += item.quantidade;
        pesoTotal += pesoItemTotal;

        box.innerHTML += `
            <div class="card flex gap-3 items-start !mb-3">
                <img src="${item.image || item.foto}" class="w-16 h-16 object-cover rounded-xl border border-[#333]">
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start">
                        <h4 class="text-[10px] font-bold uppercase truncate pr-2">${item.nome}</h4>
                        <button onclick="remover(${idx})" class="text-red-500 text-xs">✕</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-y-1 mt-2 border-t border-[#222] pt-2">
                        <div>
                            <p class="text-[8px] text-gray-500 uppercase">Valor Un.</p>
                            <p class="text-[10px] font-bold">${fMoeda(precoUn)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] text-gray-500 uppercase">Total Item</p>
                            <p class="text-[10px] gold-text font-black">${fMoeda(totalItem)}</p>
                        </div>
                        <div>
                            <p class="text-[8px] text-gray-500 uppercase">Peso Un.</p>
                            <p class="text-[10px]">${pesoUn.toFixed(2)}g</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] text-gray-500 uppercase">Peso Total</p>
                            <p class="text-[10px]">${pesoItemTotal.toFixed(2)}g</p>
                        </div>
                    </div>

                    <div class="mt-3 flex items-center justify-between bg-black/50 p-2 rounded-lg">
                        <span class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">Qtd:</span>
                        <input type="number" value="${item.quantidade}" min="1" 
                            onchange="editarQtd(${idx}, this.value)" 
                            class="input-qtd !p-1 !border-[#444] text-xs font-bold">
                    </div>
                </div>
            </div>`;
    });

    // Promoção Firebase
    const snap = await db.ref('settings/promocao').once('value');
    const p = snap.val() || { ativa: false };
    let pctP = 0;
    if(p.ativa && p.regras_progressivas) {
        Object.values(p.regras_progressivas).forEach(r => { if(sub >= r.min) pctP = r.desc; });
    }
    document.getElementById('promo-label').innerText = pctP + "% OFF";

    let desc = 0;
    if(metodoPagamento === 'pix') desc = sub * 0.05;
    else if(metodoPagamento === 'promo') desc = sub * (pctP/100);

    const totalFinal = sub - desc;

    document.getElementById('res-modelos').innerText = carrinho.length;
    document.getElementById('res-pecas').innerText = pecas;
    document.getElementById('res-peso').innerText = pesoTotal.toFixed(2) + 'g';
    document.getElementById('res-sub').innerText = fMoeda(sub);
    document.getElementById('res-desc').innerText = "- " + fMoeda(desc);
    document.getElementById('res-total').innerText = fMoeda(totalFinal);
    document.getElementById('res-parcelas').innerText = fMoeda(totalFinal / 3);

    document.querySelectorAll('.btn-pay').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + metodoPagamento).classList.add('active');
}

function editarQtd(idx, val) {
    carrinho[idx].quantidade = parseInt(val) || 1;
    if(carrinho[idx].quantidade < 1) carrinho[idx].quantidade = 1;
    salvar();
}

function setMetodo(m) { metodoPagamento = m; render(); }
function remover(idx) { carrinho.splice(idx,1); salvar(); }
function salvar() { localStorage.setItem('carrinho', JSON.stringify(carrinho)); render(); }

function gerarPDF() {
    const opt = { margin: 10, filename: 'pedido-abella.pdf', html2canvas: { scale: 2, backgroundColor: '#0b0b0b' }, jsPDF: { unit: 'mm', format: 'a4' } };
    html2pdf().set(opt).from(document.getElementById('area-impressao')).save();
}

async function enviarPedido() {
    const nome = document.getElementById('nomeCliente').value;
    const tel = document.getElementById('telCliente').value;
    const cid = document.getElementById('cidCliente').value;
    if(!nome || !tel || !cid || carrinho.length === 0) return alert("Preencha os campos obrigatórios (*)");

    const msg = `Olá, meu nome é *${nome}*!\nAcabei de fazer um pedido na Abella Joias.\n\n💰 *Total:* ${document.getElementById('res-total').innerText}\n💳 *Pagamento:* ${metodoPagamento.toUpperCase()}\n\nAguardando seu retorno!`;
    window.location.href = `https://api.whatsapp.com/send?phone=5519988207658&text=${encodeURIComponent(msg)}`;
}

render();
</script>
</body>
</html>
