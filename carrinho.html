<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checkout • Abella Joias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* AJUSTE 1: Padding no body para evitar que o resumo cubra o conteúdo */
body { 
    background:#0a0a0a; 
    color:#fff; 
    font-family:'Inter'; 
    padding-bottom: 220px !important; 
    min-height: 100vh;
}
.serif { font-family:'Cinzel'; }
.gold { color:#caa85c; }

.card {
    background:#111;
    border:1px solid #222;
    border-radius:16px;
    padding:16px;
    margin-bottom:12px;
}

.input {
    width:100%;
    background:#000;
    border:1px solid #333;
    border-radius:10px;
    padding:12px;
    font-size:14px;
    color: white;
}
.input:focus { border-color:#caa85c; }

.btn-pay {
    flex:1;
    border:1px solid #333;
    padding:12px;
    border-radius:12px;
    text-align:center;
}
.btn-pay.active {
    border-color:#caa85c;
    background:rgba(202,168,92,0.1);
}

.item {
    display:flex;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid #222;
}
</style>
</head>

<body class="p-3">

<div class="flex justify-between mb-4">
<button onclick="location.href='index.html'" class="text-sm gold">← Voltar às compras</button>
<h1 class="serif gold">Checkout</h1>
<div></div>
</div>

<div id="areaPDF">

<div class="card">
<h2 class="gold text-sm mb-2">Seu Pedido</h2>
<div id="lista"></div>
</div>

<div class="card">
<h2 class="gold text-sm mb-2">Dados do Cliente</h2>

<input class="input mb-2" id="nome" placeholder="Nome completo *">
<input class="input mb-2" id="whats" placeholder="WhatsApp com DDD *">
<input class="input" id="cidade" placeholder="Cidade *">

</div>

<div class="card">
<h2 class="gold text-sm mb-2">Local de Entrega</h2>

<input class="input mb-2" id="local" placeholder="Nome do local (ex: Loja, Casa)">
<input class="input mb-2" id="rua" placeholder="Rua / Avenida *">
<input class="input mb-2" id="numero" placeholder="Número *">
<input class="input mb-2" id="bairro" placeholder="Bairro *">
<input class="input" id="cidadeEntrega" placeholder="Cidade *">

</div>

<div class="card">
<h2 class="gold text-sm mb-2 text-center">Forma de Pagamento</h2>

<div class="flex gap-2">
<button onclick="setMetodo('pix')" id="pix" class="btn-pay">PIX</button>
<button onclick="setMetodo('cartao')" id="cartao" class="btn-pay">Cartão</button>
</div>

</div>

<div class="h-20"></div>

</div> <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-[#333] p-4 z-[9999] shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
    <div class="max-w-3xl mx-auto">
        <div class="text-xs flex justify-between mb-2">
        <span>Peças: <b id="pecas">0</b></span>
        <span>Peso: <b id="peso">0g</b></span>
        </div>

        <div class="text-xs mb-1">
        Subtotal: <b id="sub"></b>
        </div>

        <div class="text-green-400 text-xs" id="pixDesc"></div>
        <div class="text-blue-400 text-xs" id="promoDesc"></div>
        <div class="text-gray-400 text-xs" id="parcelas"></div>

        <div class="text-lg font-bold gold">
        Total: <span id="total"></span>
        </div>

        <div class="flex gap-2 mt-3 pb-2">
        <button onclick="baixarPDF()" class="bg-gray-800 px-4 py-2 rounded">PDF</button>
        <button onclick="finalizar()" class="bg-[#caa85c] text-black flex-1 rounded py-2 font-bold uppercase">
        Finalizar Pedido
        </button>
        </div>
    </div>
</div>

<script>
// TODO SEU CÓDIGO ORIGINAL RESTAURADO ABAIXO
const firebaseConfig = {
apiKey:"AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
databaseURL:"https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho')||'[]');
let metodo='pix';
let empresa={pixDesconto:5, parcelas:3, whatsapp:'5519988207658'};

const f = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);

async function init(){
const snap = await db.ref('settings/empresa').once('value');
empresa = {...empresa, ...(snap.val()||{})};
render();
}

function render(){
let html='';
let sub=0, peso=0, pecas=0;

carrinho.forEach((p,i)=>{
let total = p.precoFinal * p.quantidade;
let pesoItem = (p.peso||0)*p.quantidade;

sub+=total;
peso+=pesoItem;
pecas+=p.quantidade;

html+=`
<div class="item">
<img src="${p.image}" class="w-12 h-12 object-cover rounded">

<div class="flex-1">
<div class="text-sm font-bold">${p.nome}</div>
<div class="text-xs text-gray-400">${p.sku||''}</div>
<div class="text-xs">Peso: ${p.peso}g</div>

<div class="flex justify-between mt-1">
<input type="number" value="${p.quantidade}" onchange="qtd(${i},this.value)" class="w-12 bg-black border">
<button onclick="rem(${i})">✕</button>
</div>

<div class="text-xs mt-1">${f(total)}</div>
</div>
</div>`;
});

document.getElementById('lista').innerHTML=html;

let descPix = metodo==='pix' ? sub*(empresa.pixDesconto/100) : 0;
let total = sub-descPix;

document.getElementById('pecas').innerText=pecas;
document.getElementById('peso').innerText=peso.toFixed(2)+'g';
document.getElementById('sub').innerText=f(sub);
document.getElementById('total').innerText=f(total);
document.getElementById('pixDesc').innerText = descPix?`Desconto PIX: -${f(descPix)}`:'';
document.getElementById('parcelas').innerText =
metodo==='cartao'?`${empresa.parcelas}x de ${f(total/empresa.parcelas)}`:'';

document.querySelectorAll('.btn-pay').forEach(b=>b.classList.remove('active'));
document.getElementById(metodo).classList.add('active');
}

function qtd(i,v){carrinho[i].quantidade=parseInt(v)||1; salvar();}
function rem(i){carrinho.splice(i,1); salvar();}
function salvar(){localStorage.setItem('carrinho',JSON.stringify(carrinho));render();}
function setMetodo(m){metodo=m;render();}

function baixarPDF(){
html2pdf().from(document.getElementById('areaPDF')).save('pedido.pdf');
}

async function finalizar(){

const nome=document.getElementById('nome').value;
if(!nome) return alert("Preencha seu nome");

let total=document.getElementById('total').innerText;

const pedido={
nome,
whats:document.getElementById('whats').value,
cidade:document.getElementById('cidade').value,
total,
metodo,
itens:carrinho,
data:new Date().toISOString()
};

await db.ref('orders').push(pedido);

const msg = `Pedido Abella Joias
Nome: ${nome}
Total: ${total}
Pagamento: ${metodo}`;

window.open(`https://wa.me/${empresa.whatsapp}?text=${encodeURIComponent(msg)}`);
}

init();
</script>

</body>
</html>
