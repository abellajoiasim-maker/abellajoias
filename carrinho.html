<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checkout • Abella Joias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background:#0b0b0b; color:#eee; }
.serif { font-family: 'Cinzel', serif; }
.gold { color:#caa85c; }

.card {
background:#111;
border:1px solid #222;
border-radius:16px;
padding:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.input {
background:#0a0a0a;
border:1px solid #333;
padding:10px;
border-radius:10px;
width:100%;
font-size:12px;
}

.input:focus { border-color:#caa85c; outline:none; }

.btn-main {
background:#caa85c;
color:#000;
font-weight:800;
border-radius:12px;
padding:14px;
width:100%;
}

.btn-alt {
border:1px solid #333;
border-radius:12px;
padding:12px;
width:100%;
}

.item {
display:flex;
gap:10px;
border-bottom:1px solid #222;
padding:10px 0;
}
</style>
</head>

<body class="p-4">

<!-- HEADER -->
<div class="flex justify-between items-center mb-4">
<button onclick="history.back()" class="text-xs gold">← Voltar</button>
<h1 class="serif gold text-sm uppercase">Checkout</h1>
<a href="produtos.html" class="text-xs text-gray-400">Continuar comprando</a>
</div>

<!-- LISTA -->
<div class="card mb-4">
<h2 class="gold text-xs mb-2 uppercase">Seu Pedido</h2>
<div id="lista"></div>
</div>

<!-- CLIENTE -->
<div class="card mb-4">
<h2 class="gold text-xs mb-2 uppercase">Cliente</h2>
<input class="input mb-2" placeholder="Nome completo" id="nome">
<div class="grid grid-cols-2 gap-2">
<input class="input" placeholder="WhatsApp" id="tel">
<input class="input" placeholder="Cidade" id="cidade">
</div>
</div>

<!-- ENTREGA -->
<div class="card mb-4">
<h2 class="gold text-xs mb-2 uppercase">Entrega</h2>
<input class="input mb-2" placeholder="Nome do local">
<div class="grid grid-cols-2 gap-2 mb-2">
<input class="input" placeholder="Rua">
<input class="input" placeholder="Número">
</div>
<div class="grid grid-cols-2 gap-2">
<input class="input" placeholder="Bairro">
<input class="input" placeholder="Cidade">
</div>
</div>

<!-- PAGAMENTO -->
<div class="card mb-4">
<h2 class="gold text-xs mb-2 uppercase">Pagamento</h2>
<div class="grid grid-cols-2 gap-2">
<button onclick="setMetodo('pix')" id="pix" class="btn-alt">PIX</button>
<button onclick="setMetodo('cartao')" id="cartao" class="btn-alt">Cartão</button>
</div>
</div>

<!-- RESUMO -->
<div class="card mb-24">
<div class="text-xs text-gray-400 mb-1">Resumo</div>
<div class="flex justify-between text-xs">
<span>Peças</span><span id="pecas">0</span>
</div>
<div class="flex justify-between text-xs">
<span>Peso</span><span id="peso">0g</span>
</div>
<div class="flex justify-between text-xs">
<span>Subtotal</span><span id="sub">R$0</span>
</div>

<div id="promo" class="text-red-400 text-xs"></div>
<div id="pixdesc" class="text-green-400 text-xs"></div>

<div class="flex justify-between mt-2 font-bold">
<span>Total</span>
<span class="gold" id="total">R$0</span>
</div>

<div class="text-[10px] text-gray-400" id="parcelas"></div>
</div>

<!-- FIXO -->
<div class="fixed bottom-0 left-0 right-0 bg-black p-3 border-t border-[#333]">
<div class="flex gap-2">
<button onclick="gerarPDF()" class="btn-alt">PDF</button>
<button onclick="finalizar()" class="btn-main">Finalizar Pedido</button>
</div>
</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSy...",
databaseURL:"https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho')||'[]');
let metodo='pix';
let empresa={pixDesconto:5,parcelas:3,whatsapp:"5519988207658"};

db.ref('settings/empresa').once('value').then(s=>{
empresa={...empresa,...(s.val()||{})};
render();
});

function render(){
let lista=document.getElementById('lista');
lista.innerHTML='';

let sub=0,pecas=0,peso=0;

carrinho.forEach((i,idx)=>{
let total=i.precoFinal*i.quantidade;
sub+=total;
pecas+=i.quantidade;
peso+= (i.peso||0)*i.quantidade;

lista.innerHTML+=`
<div class="item">
<img src="${i.image}" class="w-14 h-14 object-cover rounded">
<div class="flex-1">
<div class="text-xs font-bold">${i.nome}</div>
<div class="text-[10px] text-gray-400">${i.sku||''}</div>
<div class="text-[10px]">${i.variacao||''}</div>
<div class="text-[10px]">Peso: ${(i.peso||0)}g</div>
<div class="flex justify-between mt-1">
<input type="number" value="${i.quantidade}" min="1" onchange="qtd(${idx},this.value)" class="w-12 text-center bg-black border border-[#333]">
<button onclick="rem(${idx})" class="text-red-500 text-xs">remover</button>
</div>
</div>
</div>
`;
});

let descPix = metodo==='pix' ? sub*(empresa.pixDesconto/100):0;
let total=sub-descPix;

document.getElementById('pecas').innerText=pecas;
document.getElementById('peso').innerText=peso.toFixed(2)+'g';
document.getElementById('sub').innerText=sub.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
document.getElementById('total').innerText=total.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

document.getElementById('pixdesc').innerText= descPix>0 ? `PIX -${descPix.toFixed(2)}`:'';
document.getElementById('parcelas').innerText=`${empresa.parcelas}x de ${(total/empresa.parcelas).toFixed(2)}`;
}

function qtd(i,v){carrinho[i].quantidade=parseInt(v); salvar();}
function rem(i){carrinho.splice(i,1); salvar();}
function salvar(){localStorage.setItem('carrinho',JSON.stringify(carrinho)); render();}
function setMetodo(m){metodo=m; render();}

function gerarPDF(){
html2pdf().from(document.body).save();
}

function finalizar(){
let total=document.getElementById('total').innerText;

db.ref('orders').push({
cliente:document.getElementById('nome').value,
total
});

window.open(`https://wa.me/${empresa.whatsapp}?text=Pedido%20${total}`);
}
render();
</script>
</body>
</html>
