<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Carrinho • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0b0b; color: #eee; margin:0; padding-bottom: 180px; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .card { background: #141414; border-radius: 20px; border: 1px solid #222; padding: 16px; }
        input { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 12px !important; padding: 12px !important; width: 100%; outline: none; }
        input:focus { border-color: #caa85c !important; }
        .btn-pay { border: 1px solid #333; transition: 0.3s; color: #888; }
        .btn-pay.active { border-color: #caa85c; background: rgba(202, 168, 92, 0.1); color: #caa85c; }
    </style>
</head>
<body class="p-4">

    <header class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 bg-[#141414] rounded-full border border-[#333]">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="serif gold-text text-xl uppercase tracking-widest">Carrinho</h1>
        </div>
    </header>

    <div id="conteudo-pedido">
        <div id="lista-carrinho" class="space-y-3 mb-8"></div>

        <div class="card space-y-4 mb-6">
            <h3 class="gold-text serif text-xs uppercase tracking-widest border-b border-[#222] pb-2">Identificação e Entrega</h3>
            <input type="text" id="nomeCliente" placeholder="Seu Nome Completo *">
            <input type="tel" id="telefoneCliente" placeholder="WhatsApp *">
            <input type="text" id="cidade" placeholder="Sua Cidade *">
            <input type="text" id="endereco" placeholder="Endereço de Entrega (Rua, Nº, Bairro)">
        </div>
    </div>

    <div class="card mb-8">
        <h3 class="gold-text serif text-[10px] uppercase mb-4 tracking-widest">Forma de Pagamento</h3>
        <div class="grid grid-cols-3 gap-2">
            <button onclick="setMetodo('pix')" id="btn-pix" class="btn-pay p-3 rounded-xl text-[10px] font-bold uppercase">PIX <br> (-5%)</button>
            <button onclick="setMetodo('cartao')" id="btn-cartao" class="btn-pay p-3 rounded-xl text-[10px] font-bold uppercase">Cartão <br> (Preço)</button>
            <button onclick="setMetodo('promo')" id="btn-promo" class="btn-pay p-3 rounded-xl text-[10px] font-bold uppercase">Promo <br> Ativa</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-[#222] p-4 z-50">
        <div class="max-w-xl mx-auto mb-4">
            <div class="flex justify-between text-[10px] text-gray-500 font-bold mb-1 uppercase">
                <span>Total de Peças: <b id="res-pecas">0</b> | Peso: <b id="res-peso">0g</b></span>
            </div>
            <div class="flex justify-between text-lg font-black gold-text italic">
                <span>TOTAL:</span> <span id="res-total">R$ 0,00</span>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2">
            <button onclick="gerarPDF()" class="col-span-1 bg-[#222] text-white p-4 rounded-2xl flex items-center justify-center">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </button>
            <button onclick="enviarPedido()" class="col-span-3 bg-[#caa85c] text-black py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Finalizar no WhatsApp</button>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let metodoPagamento = 'pix';
const fMoeda = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

async function render() {
    const box = document.getElementById('lista-carrinho');
    box.innerHTML = '';
    let subtotal = 0, pecas = 0, peso = 0;

    carrinho.forEach((item, idx) => {
        subtotal += item.precoFinal * item.quantidade;
        pecas += item.quantidade;
        peso += (Number(item.peso || 0) * item.quantidade);
        box.innerHTML += `
            <div class="flex items-center gap-3 bg-[#141414] p-3 rounded-2xl border border-[#222]">
                <img src="${item.image || item.foto}" class="w-12 h-12 object-cover rounded-lg">
                <div class="flex-1">
                    <p class="text-[10px] font-bold uppercase leading-tight">${item.nome}</p>
                    <p class="gold-text text-xs font-black">${fMoeda(item.precoFinal)} ${item.variacao ? `<span class="text-[8px] text-gray-500">(${item.variacao})</span>` : ''}</p>
                    <div class="flex items-center gap-2 mt-1">
                        <button onclick="altQtd(${idx},-1)" class="w-5 h-5 bg-black rounded border border-[#333] text-[10px]">-</button>
                        <span class="text-[10px] font-bold">${item.quantidade}</span>
                        <button onclick="altQtd(${idx},1)" class="w-5 h-5 bg-black rounded border border-[#333] text-[10px]">+</button>
                    </div>
                </div>
                <button onclick="remover(${idx})" class="text-gray-600 text-xs">✕</button>
            </div>`;
    });

    // Lógica de Desconto (Simples para o exemplo, integra com seu banco se precisar)
    let totalFinal = subtotal;
    if(metodoPagamento === 'pix') totalFinal = subtotal * 0.95;

    document.getElementById('res-pecas').innerText = pecas;
    document.getElementById('res-peso').innerText = peso.toFixed(1) + 'g';
    document.getElementById('res-total').innerText = fMoeda(totalFinal);
    
    document.querySelectorAll('.btn-pay').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + metodoPagamento).classList.add('active');
}

function setMetodo(m) { metodoPagamento = m; render(); }
function altQtd(idx, d) { carrinho[idx].quantidade += d; if(carrinho[idx].quantidade <= 0) carrinho.splice(idx,1); salvar(); }
function remover(idx) { carrinho.splice(idx,1); salvar(); }
function salvar() { localStorage.setItem('carrinho', JSON.stringify(carrinho)); render(); }

// FUNÇÃO PARA GERAR PDF
function gerarPDF() {
    const element = document.getElementById('conteudo-pedido');
    const opt = {
        margin: 10,
        filename: 'pedido-abella-joias.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, backgroundColor: '#0b0b0b' },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(element).save();
}

async function enviarPedido() {
    const nome = document.getElementById('nomeCliente').value;
    const fone = document.getElementById('telefoneCliente').value;
    const cid = document.getElementById('cidade').value;
    const totalTexto = document.getElementById('res-total').innerText;
    
    if (!nome || !fone || carrinho.length === 0) return alert("Preencha os campos obrigatórios!");

    const formaPagamento = metodoPagamento.toUpperCase();
    const foneLoja = "5519988207658";

    // Salvando no Firebase para seu controle
    await db.ref('orders').push({ cliente: {nome, fone, cid}, itens: carrinho, total: totalTexto, data: new Date().toLocaleString() });

    // Mensagem de WhatsApp conforme seu exemplo
    let msg = `Olá, meu nome é *${nome}*!\n\n`;
    msg += `Acabei de fazer um pedido pelo catálogo da Abella Joias.\n`;
    msg += `💰 *Total:* ${totalTexto}\n`;
    msg += `💳 *Pagamento:* ${formaPagamento}\n\n`;
    msg += `Aguardando seu retorno para finalizar!`;

    localStorage.removeItem('carrinho');
    window.location.href = `https://api.whatsapp.com/send?phone=${foneLoja}&text=${encodeURIComponent(msg)}`;
}

render();
</script>
</body>
</html>
