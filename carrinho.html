<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checkout • Abella Joias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
body { background:#0b0b0b; color:#fff; font-family: Arial; }
.card { background:#141414; border:1px solid #2a2a2a; border-radius:12px; padding:16px; }
.input { width:100%; padding:10px; background:#0b0b0b; border:1px solid #333; border-radius:8px; color:#fff; }
.btn { background:#caa85c; color:#000; padding:12px; font-weight:bold; border-radius:8px; width:100%; }
</style>
</head>

<body class="p-4">

<h1 class="text-xl text-[#caa85c] mb-4 font-bold">Finalizar Pedido</h1>

<div class="card mb-4">
    <input id="nome" class="input mb-2" placeholder="Seu nome">
    <input id="telefone" class="input mb-2" placeholder="WhatsApp">
    <input id="endereco" class="input" placeholder="Endereço">
</div>

<div class="card mb-4">
    <h2 class="text-sm text-gray-400 mb-2">Resumo</h2>
    <div id="resumo"></div>
    <div class="mt-2 text-right font-bold" id="total">R$ 0,00</div>
</div>

<button onclick="finalizarPedido()" class="btn">FINALIZAR PEDIDO</button>

<script>

// 🔒 ANTI ERRO GLOBAL
window.onerror = function(msg){ console.error(msg); return true; };

const firebaseConfig = {
apiKey:"AIzaSyDP...",
databaseURL:"https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

// 🔒 FIREBASE SAFE
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔒 HELPERS
const money = v => Math.max(0, parseFloat(v) || 0); // AJUSTE CIRÚRGICO: bloqueia negativo
const safe = id => document.getElementById(id);
const round = v => Math.round(v * 100) / 100;

let carrinho = [];

// 🔥 CARREGAR CARRINHO
function carregarCarrinho(){
    try{
        const data = JSON.parse(localStorage.getItem("carrinho")) || [];
        carrinho = Array.isArray(data) ? data : [];
        render();
    }catch{
        carrinho = [];
        render();
    }
}

// 🔥 RENDER
function render(){
    const el = safe("resumo");
    let total = 0;
    let html = '';

    carrinho.forEach(item=>{
        const preco = money(item.precoFinal || item.price);
        const qtd = Math.max(1, parseInt(item.qtd) || 1);

        const subtotal = round(preco * qtd);
        total += subtotal;

        html += `
        <div class="flex justify-between text-sm mb-1">
            <span>${item.name || "Produto"}</span>
            <span>R$ ${subtotal.toFixed(2)}</span>
        </div>`;
    });

    total = round(total);

    el.innerHTML = html || "Carrinho vazio";
    safe("total").innerText = "R$ " + total.toFixed(2);
}

// 🔥 VALIDAÇÃO
function validar(){
    if(!carrinho.length) return "Carrinho vazio";

    if(!safe("nome").value.trim()) return "Nome obrigatório";
    if(!safe("telefone").value.trim()) return "Telefone obrigatório";

    return null;
}

// 🔥 FINALIZAR
function finalizarPedido(){
    try{

        const erro = validar();
        if(erro) return alert(erro);

        let total = 0;

        const itens = carrinho.map(item=>{
            const preco = money(item.precoFinal || item.price);
            const qtd = Math.max(1, parseInt(item.qtd) || 1);

            const subtotal = round(preco * qtd);
            total += subtotal;

            return {
                nome: item.name || "",
                preco: preco,
                qtd: qtd,
                subtotal: subtotal
            };
        });

        total = round(total);

        if(total <= 0) return alert("Erro no cálculo do pedido"); // AJUSTE CIRÚRGICO

        const pedido = {
            cliente:{
                nome: safe("nome").value,
                telefone: safe("telefone").value,
                endereco: safe("endereco").value
            },
            itens,
            total,
            status:"novo",
            criadoEm: Date.now()
        };

        db.ref("pedidos").push(pedido)
        .then(()=>{
            alert("Pedido enviado!");
            localStorage.removeItem("carrinho");
            location.reload();
        })
        .catch(()=> alert("Erro ao enviar"));

    }catch(e){
        console.error(e);
        alert("Erro inesperado");
    }
}

// INIT
carregarCarrinho();

</script>

</body>
</html>
