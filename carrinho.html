<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checkout • Abella Joias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{background:#0b0b0b;color:#eee;font-family:Arial}
.card{background:#111;border:1px solid #222;padding:12px;border-radius:10px;margin-bottom:10px}
.input{background:#000;border:1px solid #333;color:#fff;padding:8px;border-radius:6px;width:100%}
.btn-pay{border:1px solid #333;padding:10px;border-radius:8px;width:100%}
.active{border-color:#caa85c;background:#1a1a1a}
</style>
</head>

<body class="p-3">

<!-- HEADER -->
<div class="flex justify-between items-center mb-4">
    <button onclick="window.location.href='index.html'" 
    class="text-[#caa85c] text-xs font-bold">
        ← Continuar Comprando
    </button>

    <h1 class="text-[#caa85c] font-bold text-sm">Seu Carrinho</h1>

    <div></div>
</div>

<div id="area">

<!-- LISTA -->
<div class="card">
<h3 class="text-xs font-bold mb-2">🛍️ Produtos</h3>
<div id="lista"></div>
</div>

<!-- CLIENTE -->
<div class="card">
<h3 class="text-xs font-bold mb-2">👤 Cliente</h3>

<label>Nome</label>
<input id="nome" class="input mb-2">

<label>Cidade</label>
<input id="cidade" class="input mb-2">

<label>WhatsApp</label>
<input id="tel" class="input">
</div>

<!-- ENTREGA -->
<div class="card">
<h3 class="text-xs font-bold mb-2">🚚 Entrega</h3>

<label>Local</label>
<input id="local" class="input mb-2">

<label>Rua</label>
<input id="rua" class="input mb-2">

<div class="flex gap-2">
<input id="num" class="input" placeholder="Nº">
<input id="bairro" class="input" placeholder="Bairro">
</div>

<input id="cidadeEnt" class="input mt-2" placeholder="Cidade">
</div>

<!-- PAGAMENTO -->
<div class="card">
<h3 class="text-xs font-bold mb-2">💳 Pagamento</h3>

<div class="flex gap-2">
<button onclick="setPay('pix')" id="pix" class="btn-pay flex-1">
PIX<br><small>- Desconto</small>
</button>

<button onclick="setPay('cartao')" id="cartao" class="btn-pay flex-1">
Cartão<br><small>Parcelado</small>
</button>
</div>
</div>

</div>

<!-- RESUMO FIXO -->
<div class="fixed bottom-0 left-0 right-0 bg-black border-t border-[#333] p-3">

<div class="text-[11px] space-y-1">

<div class="flex justify-between">
<span>Peças</span><b id="pecas"></b>
</div>

<div class="flex justify-between">
<span>Peso</span><b id="peso"></b>
</div>

<div class="flex justify-between">
<span>Subtotal</span><b id="sub"></b>
</div>

<div id="pixdesc" class="text-green-400"></div>

<div class="flex justify-between text-lg font-bold text-[#caa85c]">
<span>Total</span><span id="total"></span>
</div>

<div id="economia" class="text-green-500 text-xs"></div>

</div>

<!-- BOTÕES -->
<div class="flex gap-2 mt-3">

<button onclick="window.location.href='index.html'" 
class="bg-[#222] text-white px-3 rounded text-xs">
Continuar
</button>

<button onclick="baixarPDF()" 
class="bg-gray-700 px-3 rounded text-xs">
PDF
</button>

<button onclick="finalizar()" 
class="bg-[#caa85c] text-black flex-1 rounded text-xs font-bold">
FINALIZAR
</button>

</div>

</div>

</body>
</html>
