<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checkout • Abella Joias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{background:#0b0b0b;color:#eee;font-family:Inter}
.card{background:#111;border:1px solid #222;padding:12px;border-radius:10px;margin-bottom:10px}
.input{background:#000;border:1px solid #333;color:#fff;padding:10px;border-radius:6px;width:100%}
.btn-pay{border:1px solid #333;padding:10px;border-radius:8px;width:100%}
.active{border-color:#caa85c;background:#1a1a1a}
</style>
</head>

<body class="p-3">

<!-- HEADER -->
<div class="flex justify-between items-center mb-4">
<button onclick="window.location.href='index.html'" class="text-[#caa85c] text-xs font-bold">
← Continuar Comprando
</button>
<h1 class="text-[#caa85c] font-bold text-sm">Checkout</h1>
<div></div>
</div>

<div id="area">

<!-- PRODUTOS -->
<div class="card">
<h3 class="font-bold mb-2">🛍️ Produtos</h3>
<div id="lista"></div>
</div>

<!-- CLIENTE -->
<div class="card">
<h3 class="font-bold mb-2">👤 Cliente</h3>
<input id="nome" class="input mb-2" placeholder="Nome">
<input id="cidade" class="input mb-2" placeholder="Cidade">
<input id="tel" class="input" placeholder="WhatsApp">
</div>

<!-- ENTREGA -->
<div class="card">
<h3 class="font-bold mb-2">🚚 Entrega</h3>
<input id="local" class="input mb-2" placeholder="Nome do local">
<input id="rua" class="input mb-2" placeholder="Rua">
<div class="flex gap-2">
<input id="num" class="input" placeholder="Nº">
<input id="bairro" class="input" placeholder="Bairro">
</div>
<input id="cidadeEnt" class="input mt-2" placeholder="Cidade">
</div>

<!-- PAGAMENTO -->
<div class="card">
<h3 class="font-bold mb-2">💳 Pagamento</h3>
<div class="flex gap-2">
<button onclick="setPay('pix')" id="pix" class="btn-pay">PIX</button>
<button onclick="setPay('cartao')" id="cartao" class="btn-pay">Cartão</button>
</div>
</div>

</div>

<!-- RESUMO FIXO -->
<div class="fixed bottom-0 left-0 right-0 bg-black border-t border-[#333] p-3">

<div class="text-xs space-y-1">
<div class="flex justify-between"><span>Itens</span><b id="itens"></b></div>
<div class="flex justify-between"><span>Peças</span><b id="pecas"></b></div>
<div class="flex justify-between"><span>Peso</span><b id="peso"></b></div>
<div class="flex justify-between"><span>Subtotal</span><b id="sub"></b></div>

<div id="promo" class="text-blue-400"></div>
<div id="pixdesc" class="text-green-400"></div>

<div class="flex justify-between text-lg font-bold text-[#caa85c]">
<span>Total</span><span id="total"></span>
</div>

<div id="parcelas" class="text-gray-400 text-[11px]"></div>
<div id="economia" class="text-green-500 text-[11px]"></div>

</div>

<div class="flex gap-2 mt-3">
<button onclick="baixarPDF()" class="bg-gray-700 px-3 rounded text-xs">PDF</button>
<button onclick="finalizar()" class="bg-[#caa85c] text-black flex-1 rounded text-xs font-bold">FINALIZAR</button>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyDPB...",
databaseURL:"https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let cart=JSON.parse(localStorage.getItem('carrinho')||'[]');
let pay='pix';
let empresa={pixDesconto:5,parcelas:3};
let promocao={};

const f=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

async function init(){
const emp=await db.ref('settings/empresa').once('value');
empresa=emp.val()||empresa;

const promo=await db.ref('settings/promocao').once('value');
promocao=promo.val()||{};

render();
}

function render(){
let html='',sub=0,pecas=0,peso=0;

cart.forEach((i,idx)=>{
let total=i.precoFinal*i.quantidade;
let pesoItem=(i.peso||0)*i.quantidade;

sub+=total;
pecas+=i.quantidade;
peso+=pesoItem;

html+=`
<div style="display:flex;gap:10px;border-bottom:1px solid #222;padding:8px 0">
<img src="${i.image}" width="45">
<div style="flex:1">
<b>${i.nome}</b>
<p>${i.sku||''}</p>
<p>${i.variacao||''}</p>

<p>${i.quantidade}x ${f(i.precoFinal)} = <b>${f(total)}</b></p>
<p>Peso: ${(i.peso||0).toFixed(2)}g x ${i.quantidade} = ${pesoItem.toFixed(2)}g</p>

<div class="flex gap-2 mt-1">
<input type="number" value="${i.quantidade}" onchange="edit(${idx},this.value)" style="width:50px">
<button onclick="del(${idx})">❌</button>
</div>

</div>
</div>`;
});

document.getElementById('lista').innerHTML=html;

let descPromo=0;

// DESCONTO PROGRESSIVO
if(promocao.ativa && promocao.regras_progressivas){
Object.values(promocao.regras_progressivas).forEach(r=>{
if(sub>=r.min) descPromo=sub*(r.desc/100);
});
}

let descPix=pay==='pix'?(sub-descPromo)*(empresa.pixDesconto/100):0;

let total=sub-descPromo-descPix;

document.getElementById('itens').innerText=cart.length;
document.getElementById('pecas').innerText=pecas;
document.getElementById('peso').innerText=peso.toFixed(2)+'g';
document.getElementById('sub').innerText=f(sub);
document.getElementById('total').innerText=f(total);

document.getElementById('promo').innerText=descPromo?`Promo: -${f(descPromo)}`:'';
document.getElementById('pixdesc').innerText=descPix?`PIX: -${f(descPix)}`:'';
document.getElementById('parcelas').innerText=pay==='cartao'?`${empresa.parcelas}x de ${f(total/empresa.parcelas)}`:'';

document.getElementById('economia').innerText=(descPromo+descPix)?`Economia total: ${f(descPromo+descPix)}`:'';

document.querySelectorAll('.btn-pay').forEach(b=>b.classList.remove('active'));
document.getElementById(pay).classList.add('active');
}

function edit(i,v){cart[i].quantidade=parseInt(v)||1;save();}
function del(i){cart.splice(i,1);save();}
function save(){localStorage.setItem('carrinho',JSON.stringify(cart));render();}
function setPay(p){pay=p;render();}

function baixarPDF(){
html2pdf().from(document.getElementById('area')).save("pedido-abella.pdf");
}

async function finalizar(){

if(!document.getElementById('nome').value) return alert("Preencha o nome");

let total=document.getElementById('total').innerText;

let pedido={
cliente:{
nome:nome.value,
cidade:cidade.value,
tel:tel.value
},
entrega:{
local:local.value,
rua:rua.value,
num:num.value,
bairro:bairro.value,
cidade:cidadeEnt.value
},
itens:cart,
pagamento:pay,
total:total,
data:new Date().toISOString()
};

await db.ref('orders').push(pedido);

let msg=`*Pedido Abella Joias*%0A`;
msg+=`Cliente: ${pedido.cliente.nome}%0A`;
msg+=`Cidade: ${pedido.cliente.cidade}%0A`;
msg+=`Total: ${total}%0A`;
msg+=`Pagamento: ${pay.toUpperCase()}%0A`;
msg+=`Aguardo contato para pagamento`;

window.open(`https://wa.me/5519988207658?text=${texto}`, '_blank');
}

init();
</script>

</body>
</html>
