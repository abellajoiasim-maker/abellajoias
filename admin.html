<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Abella Joias</title>
    <link rel="stylesheet" href="admin-style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">ABELLA ADMIN</div>
        <button onclick="showTab('dashboard')" class="tab-btn active">📊 Dashboard</button>
        <button onclick="showTab('empresa')" class="tab-btn">🏢 Empresa</button>
        <button onclick="showTab('categorias')" class="tab-btn">📁 Categorias</button>
        <button onclick="showTab('produtos')" class="tab-btn">💍 Produtos</button>
        <button onclick="showTab('galvanicas')" class="tab-btn">⚗️ Galvânicas</button>
        <button onclick="showTab('pedidos')" class="tab-btn">📦 Pedidos</button>
    </nav>

    <main class="content">
        <section id="empresa" class="tab-content">
            <h2>Dados da Empresa</h2>
            <div class="card-form">
                <input type="text" id="emp-nome" placeholder="Nome da Marca">
                <input type="text" id="emp-whats" placeholder="WhatsApp de Vendas">
                <button onclick="salvarEmpresa()" class="btn-save">Atualizar Dados</button>
            </div>
        </section>

        <section id="categorias" class="tab-content">
            <div class="header-row">
                <h2>Categorias</h2>
                <button onclick="abrirModal('categoria')" class="btn-new">+ Nova Categoria</button>
            </div>
            <div id="lista-categorias" class="grid-container"></div>
        </section>

        <section id="produtos" class="tab-content">
            <div class="header-row">
                <h2>Produtos no Estoque</h2>
                <button onclick="abrirModal('produto')" class="btn-new">+ Novo Produto</button>
            </div>
            <div id="lista-produtos" class="grid-container"></div>
        </section>

        <section id="pedidos" class="tab-content">
            <h2>Pedidos Recentes</h2>
            <div id="lista-pedidos" class="list-container"></div>
        </section>
    </main>

    <div id="modal-admin" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <div id="modal-form-body"></div>
        </div>
    </div>

    <script src="admin-logic.js"></script>
</body>
</html>
