<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard • Abella Joias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
body { background:#0b0b0b; color:#eee; }
.card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:20px; }
.input { background:#0b0b0b; border:1px solid #333; padding:10px; border-radius:8px; width:100%; color:#fff; }
.btn { background:#caa85c; color:#000; font-weight:bold; padding:10px 20px; border-radius:8px; }
</style>
</head>

<body class="p-6">

<h1 class="text-[#caa85c] text-xl font-bold mb-6">Dashboard Admin</h1>

<!-- EMPRESA -->
<div class="card mb-6">
    <h2 class="text-[#caa85c] font-bold mb-4">Configurações da Empresa</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="nome" class="input" placeholder="Nome da Loja">
        <input id="slogan" class="input" placeholder="Slogan">
        <input id="whatsapp" class="input" placeholder="WhatsApp (somente números)">
        <input id="pix" class="input" type="number" placeholder="Desconto PIX (%)">
        <input id="parcelas" class="input" type="number" placeholder="Parcelas no cartão">
    </div>

    <button onclick="salvarEmpresa()" class="btn mt-4">💾 Salvar</button>
</div>

<!-- STATUS -->
<div class="card mb-6 flex justify-between items-center">
    <span id="statusTexto">Carregando...</span>
    <button onclick="alternarManutencao()" class="btn">Alternar Manutenção</button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🔥 CARREGAR DADOS DA EMPRESA
function carregarEmpresa() {
    db.ref('settings/empresa').once('value').then(snap => {
        const d = snap.val() || {};

        document.getElementById('nome').value = d.nome || '';
        document.getElementById('slogan').value = d.slogan || '';
        document.getElementById('whatsapp').value = d.whatsapp || '';
        document.getElementById('pix').value = d.pix || 0;
        document.getElementById('parcelas').value = d.parcelas || 1;
    });
}


// 🔥 SALVAR EMPRESA
function salvarEmpresa() {
    const data = {
        nome: document.getElementById('nome').value,
        slogan: document.getElementById('slogan').value,
        whatsapp: document.getElementById('whatsapp').value,
        pix: parseFloat(document.getElementById('pix').value) || 0,
        parcelas: parseInt(document.getElementById('parcelas').value) || 1
    };

    db.ref('settings/empresa').set(data)
    .then(() => {
        alert("✅ Dados salvos com sucesso!");
    })
    .catch(err => {
        console.error(err);
        alert("Erro ao salvar.");
    });
}


// 🔥 STATUS MANUTENÇÃO
function carregarStatusSite() {
    db.ref('settings').on('value', snap => {
        const s = snap.val() || {};
        const ativo = s.manutencao;

        document.getElementById('statusTexto').innerText =
            ativo ? "🚧 Site em manutenção" : "✅ Site online";
    });
}

function alternarManutencao() {
    db.ref('settings/manutencao').get().then(snap => {
        const atual = snap.val();
        db.ref('settings').update({ manutencao: !atual });
    });
}


// INIT
window.onload = () => {
    carregarEmpresa();
    carregarStatusSite();
};
</script>

</body>
</html>
