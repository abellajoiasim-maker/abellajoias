<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body class="bg-[#0b0b0b] min-h-screen flex flex-col">

    <header class="p-6 text-center border-b border-[#222] bg-black">
        <h1 class="text-[#caa85c] font-bold tracking-[0.2em] text-xl uppercase">Abella Joias Admin</h1>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6">
        
        <div class="card w-full max-w-2xl mb-8 flex flex-col md:flex-row items-center justify-between gap-4 border-dashed border-[#333]">
            <div>
                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Status do Sistema</p>
                <h3 id="statusTexto" class="text-white font-bold uppercase italic">Carregando...</h3>
            </div>
            <button id="btnManutencao" onclick="alternarManutencao()" class="btn px-6 font-bold transition-all">
                AGUARDE...
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
            <a href="pedidos.html" class="card group hover:border-[#caa85c] transition-all p-8 text-center flex flex-col items-center">
                <div class="w-16 h-16 bg-[#1a1a1a] rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <span class="text-3xl">📦</span>
                </div>
                <h2 class="text-[#caa85c] font-bold text-lg uppercase">Pedidos</h2>
                <p class="text-gray-500 text-xs mt-2">Gerenciar vendas e romaneios</p>
            </a>

            <a href="estoque.html" class="card group hover:border-[#caa85c] transition-all p-8 text-center flex flex-col items-center">
                <div class="w-16 h-16 bg-[#1a1a1a] rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <span class="text-3xl">💎</span>
                </div>
                <h2 class="text-[#caa85c] font-bold text-lg uppercase">Estoque</h2>
                <p class="text-gray-500 text-xs mt-2">Produtos e configurações da loja</p>
            </a>
            
            <a href="ofertas.html" class="card group hover:border-[#caa85c] transition-all p-8 text-center flex flex-col items-center">
                <div class="w-16 h-16 bg-[#1a1a1a] rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <span class="text-3xl">🔥</span>
                </div>
                <h2 class="text-[#caa85c] font-bold text-lg uppercase">Ofertas</h2>
                <p class="text-gray-500 text-xs mt-2">Marketing e Promoções</p>
            </a>

            <a href="../index.html" target="_blank" class="card group hover:border-[#caa85c] transition-all p-8 text-center flex flex-col items-center">
                <div class="w-16 h-16 bg-[#1a1a1a] rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <span class="text-3xl">🌐</span>
                </div>
                <h2 class="text-[#caa85c] font-bold text-lg uppercase">Ver Site</h2>
                <p class="text-gray-500 text-xs mt-2">Visualizar a loja como cliente</p>
            </a>
        </div>
    </main>

    <footer class="p-4 text-center text-gray-600 text-[10px] uppercase tracking-widest">
        Sistema de Gestão v2.0 • Abella Joias
    </footer>

    <script src="admin-logic.js"></script>
    <script>
        window.onload = () => carregarStatusSite();
    </script>
</body>
</html>
