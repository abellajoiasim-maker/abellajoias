<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        body { background:#0b0b0b; color:#eee; font-family:Inter,Arial; margin:0; }
        nav button.active { border-bottom:2px solid #caa85c; color:#caa85c; }
        section { display:none; min-height:300px; }
        section.active { display:block; }
        .card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:14px; }
        .btn { background:#222; border:1px solid #444; padding:8px 12px; border-radius:8px; font-size:11px; cursor:pointer; transition: 0.3s; }
        .btn:hover { background:#333; }
        .btn-gold { background:#caa85c; color:#000; font-weight:bold; }
        input, select, textarea { background:#1a1a1a; border:1px solid #333; padding:10px; border-radius:10px; color:#fff; width:100%; outline:none; font-size:12px; }
        
        @media print {
            body * { visibility: hidden; }
            #areaImpressao, #areaImpressao * { visibility: visible; }
            #areaImpressao { position: absolute; left: 0; top: 0; width: 100%; color: #000; background: #fff; padding: 20px; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <nav class="flex justify-around bg-black border-b border-[#222] sticky top-0 z-50">
        <button onclick="tab('pedidos')" class="p-4 text-[10px] font-bold uppercase active" id="btn-pedidos">Pedidos</button>
        <button onclick="tab('produtos')" class="p-4 text-[10px] font-bold uppercase" id="btn-produtos">Produtos</button>
        <button onclick="tab('categorias')" class="p-4 text-[10px] font-bold uppercase" id="btn-categorias">Categorias</button>
        <button onclick="tab('empresa')" class="p-4 text-[10px] font-bold uppercase" id="btn-empresa">Empresa</button>
        <button onclick="location.href='ofertas.html'" class="p-4 text-[10px] font-bold uppercase text-[#caa85c]">Marketing ⚡</button>
    </nav>

    <section id="pedidos" class="p-4 active">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-[#caa85c] font-bold uppercase tracking-tighter">Gestão de Vendas</h2>
            <button onclick="limparPedidos()" class="btn text-red-500 text-[9px]">Limpar Histórico</button>
        </div>
        <div id="lista-pedidos" class="space-y-3"></div>
    </section>

    <section id="produtos" class="p-4">
        <button onclick="abrirModalProduto()" class="btn-gold w-full p-3 rounded-xl text-[10px] uppercase mb-4">Novo Produto</button>
        <input type="text" id="buscaProduto" oninput="filtrarProdutos()" placeholder="Buscar produto..." class="mb-4">
        <div id="lista-produtos" class="space-y-2"></div>
    </section>

    <section id="categorias" class="p-4">
        <div class="card space-y-4">
            <h3 class="gold-text font-bold uppercase text-xs">Categorias do Catálogo</h3>
            <div class="flex gap-2">
                <input type="text" id="nova-categoria" placeholder="Nome da Categoria">
                <button onclick="adicionarCategoria()" class="btn-gold px-4 rounded-lg text-xs">Adicionar</button>
            </div>
            <div id="lista-categorias" class="space-y-2 mt-4"></div>
        </div>
    </section>

    <section id="empresa" class="p-4">
        <div class="card space-y-4">
            <h3 class="gold-text font-bold uppercase text-xs">Configurações da Loja</h3>
            <input type="text" id="conf-nome" placeholder="Nome da Marca">
            <input type="text" id="conf-whatsapp" placeholder="WhatsApp (Ex: 5519...)">
            <textarea id="conf-msg" placeholder="Mensagem de boas-vindas do WhatsApp" rows="3"></textarea>
            <button onclick="salvarConfigEmpresa()" class="btn-gold w-full p-3 rounded-xl uppercase text-[10px]">Salvar Dados</button>
        </div>
    </section>

    <div id="modalPedido" class="fixed inset-0 bg-black/95 z-[60] hidden overflow-y-auto p-4">
        <div class="max-w-3xl mx-auto bg-[#141414] border border-[#333] rounded-3xl p-6 shadow-2xl">
            <div id="areaImpressao">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="gold-text font-bold uppercase text-lg" id="det-nome-cliente"></h3>
                        <p class="text-xs text-gray-500" id="det-data"></p>
                    </div>
                    <button onclick="fecharPedido()" class="no-print text-gray-500 text-xl">✕</button>
                </div>
                <div id="det-corpo" class="text-xs space-y-4"></div>
            </div>
            <div class="flex gap-2 mt-8 no-print">
                <button onclick="window.print()" class="flex-1 bg-white text-black p-3 rounded-xl font-bold uppercase text-[9px]">Imprimir Romaneio</button>
            </div>
        </div>
    </div>

    <div id="modalProduto" class="fixed inset-0 bg-black/95 z-[60] hidden overflow-y-auto p-4">
        <div class="max-w-xl mx-auto bg-[#141414] border border-[#333] rounded-3xl p-6">
            <h3 class="gold-text font-bold mb-4 uppercase text-sm" id="prodModalTitle">Editar Produto</h3>
            <div class="space-y-3">
                <input type="text" id="p-name" placeholder="Nome do Produto">
                <input type="text" id="p-image" placeholder="URL da Imagem">
                <input type="number" id="p-price" placeholder="Preço (R$)">
                <input type="number" id="p-weight" placeholder="Peso em gramas (ex: 15.5)">
                <select id="p-category"></select>
                <textarea id="p-variations" placeholder="Variações separadas por vírgula (ex: 14, 16, 18 ou P, M, G)" rows="2"></textarea>
                <div class="flex gap-2 pt-4">
                    <button onclick="fecharModalProduto()" class="flex-1 btn">Cancelar</button>
                    <button onclick="salvarProduto()" class="flex-1 btn-gold">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let idEdicao = null;

function tab(name) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    document.getElementById('btn-'+name).classList.add('active');
    if(name === 'categorias') carregarCategorias();
    if(name === 'produtos') filtrarProdutos();
}

// --- PEDIDOS ---
db.ref('orders').on('value', snap => {
    const list = document.getElementById('lista-pedidos');
    list.innerHTML = '';
    snap.forEach(child => {
        const p = child.val();
        list.innerHTML += `
            <div class="card flex justify-between items-center mb-2" onclick="verPedido('${child.key}')">
                <div><p class="font-bold text-[11px] uppercase">${p.cliente.nome}</p><p class="text-[9px] text-gray-500">${p.data}</p></div>
                <p class="gold-text font-bold">R$ ${p.total.toFixed(2)}</p>
            </div>`;
    });
});

async function verPedido(id) {
    const snap = await db.ref('orders/'+id).once('value');
    const p = snap.val();
    document.getElementById('det-nome-cliente').innerText = p.cliente.nome;
    document.getElementById('det-data').innerText = `Pedido ID: ${id} | ${p.data}`;
    
    let itens = '';
    p.itens.forEach(i => {
        itens += `<div class="flex justify-between border-b border-[#222] py-2">
            <span>${i.quantidade}x ${i.name}</span>
            <span class="font-bold">R$ ${(i.price * i.quantidade).toFixed(2)}</span>
        </div>`;
    });

    document.getElementById('det-corpo').innerHTML = `
        <div class="bg-black/40 p-4 rounded-xl text-[10px] mb-4">
            <p><strong>Whats:</strong> ${p.cliente.telefone}</p>
            <p><strong>Cidade:</strong> ${p.entrega.cidade} - ${p.entrega.bairro}</p>
            <p><strong>Endereço:</strong> ${p.entrega.rua}</p>
        </div>
        ${itens}
        <div class="bg-black/60 p-4 rounded-xl mt-4 space-y-1">
            <div class="flex justify-between"><span>Subtotal</span><span>R$ ${p.subtotal.toFixed(2)}</span></div>
            <div class="flex justify-between text-green-500"><span>Descontos</span><span>- R$ ${(p.descontoPromo || 0).toFixed(2)}</span></div>
            <div class="flex justify-between gold-text font-bold text-sm pt-1 border-t border-[#333]"><span>TOTAL LÍQUIDO</span><span>R$ ${p.total.toFixed(2)}</span></div>
        </div>`;
    document.getElementById('modalPedido').classList.remove('hidden');
}

function fecharPedido() { document.getElementById('modalPedido').classList.add('hidden'); }
function limparPedidos() { if(confirm("Deseja apagar todos os pedidos?")) db.ref('orders').remove(); }

// --- CATEGORIAS ---
function carregarCategorias() {
    db.ref('categories').once('value', snap => {
        const list = document.getElementById('lista-categorias');
        list.innerHTML = '';
        snap.forEach(c => {
            list.innerHTML += `<div class="flex justify-between items-center bg-black p-3 rounded-lg border border-[#222]">
                <span class="text-xs uppercase">${c.val().name}</span>
                <button onclick="excluirCategoria('${c.key}')" class="text-red-500">Excluir</button>
            </div>`;
        });
    });
}

function adicionarCategoria() {
    const name = document.getElementById('nova-categoria').value;
    if(name) db.ref('categories').push({ name }).then(() => {
        document.getElementById('nova-categoria').value = '';
        carregarCategorias();
    });
}

function excluirCategoria(id) { if(confirm("Excluir esta categoria?")) db.ref('categories/'+id).remove().then(carregarCategorias); }

// --- PRODUTOS ---
function filtrarProdutos() {
    const termo = document.getElementById('buscaProduto').value.toLowerCase();
    db.ref('products').once('value', snap => {
        const list = document.getElementById('lista-produtos');
        list.innerHTML = '';
        snap.forEach(child => {
            const p = child.val();
            if(p.name.toLowerCase().includes(termo)) {
                list.innerHTML += `
                <div class="card flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img src="${p.image}" class="w-10 h-10 object-cover rounded">
                        <div><p class="text-[10px] font-bold uppercase">${p.name}</p><p class="gold-text text-[10px]">R$ ${p.price.toFixed(2)}</p></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editarProduto('${child.key}')" class="btn">✏️</button>
                        <button onclick="excluirProduto('${child.key}')" class="btn text-red-500">🗑️</button>
                    </div>
                </div>`;
            }
        });
    });
}

async function abrirModalProduto() {
    idEdicao = null;
    document.getElementById('prodModalTitle').innerText = "Novo Produto";
    document.querySelectorAll('#modalProduto input, #modalProduto textarea').forEach(i => i.value = '');
    await popularSelectCategorias();
    document.getElementById('modalProduto').classList.remove('hidden');
}

async function popularSelectCategorias() {
    const snap = await db.ref('categories').once('value');
    const sel = document.getElementById('p-category');
    sel.innerHTML = '';
    snap.forEach(c => { sel.innerHTML += `<option value="${c.key}">${c.val().name}</option>`; });
}

async function editarProduto(id) {
    idEdicao = id;
    const snap = await db.ref('products/'+id).once('value');
    const p = snap.val();
    await popularSelectCategorias();
    document.getElementById('p-name').value = p.name;
    document.getElementById('p-image').value = p.image;
    document.getElementById('p-price').value = p.price;
    document.getElementById('p-weight').value = p.weight || '';
    document.getElementById('p-category').value = p.category;
    document.getElementById('p-variations').value = p.variations || '';
    document.getElementById('modalProduto').classList.remove('hidden');
}

function salvarProduto() {
    const p = {
        name: document.getElementById('p-name').value,
        image: document.getElementById('p-image').value,
        price: parseFloat(document.getElementById('p-price').value),
        weight: parseFloat(document.getElementById('p-weight').value) || 0,
        category: document.getElementById('p-category').value,
        variations: document.getElementById('p-variations').value
    };
    const ref = idEdicao ? db.ref('products/'+idEdicao) : db.ref('products').push();
    ref.set(p).then(() => { fecharModalProduto(); filtrarProdutos(); });
}

function fecharModalProduto() { document.getElementById('modalProduto').classList.add('hidden'); }
function excluirProduto(id) { if(confirm("Excluir permanentemente?")) db.ref('products/'+id).remove().then(filtrarProdutos); }

// --- EMPRESA ---
function salvarConfigEmpresa() {
    const c = { 
        nome: document.getElementById('conf-nome').value, 
        whatsapp: document.getElementById('conf-whatsapp').value, 
        mensagem: document.getElementById('conf-msg').value 
    };
    db.ref('settings/empresa').set(c).then(() => alert("Dados da empresa atualizados!"));
}

window.onload = () => {
    tab('pedidos');
    db.ref('settings/empresa').once('value', snap => {
        const c = snap.val();
        if(c) {
            document.getElementById('conf-nome').value = c.nome || '';
            document.getElementById('conf-whatsapp').value = c.whatsapp || '';
            document.getElementById('conf-msg').value = c.mensagem || '';
        }
    });
};
</script>
</body>
</html>
