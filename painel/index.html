<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background:#0b0b0b; color:#eee; font-family:Inter,Arial; margin:0; }
        nav button.active { border-bottom:2px solid #caa85c; color:#caa85c; }
        section { display:none; min-height:300px; }
        section.active { display:block; }
        .card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:14px; }
        .btn-gold { background:#caa85c; color:#000; font-weight:bold; }
        .status-badge { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav class="flex justify-around bg-black border-b border-[#222] sticky top-0 z-50">
        <button onclick="tab('pedidos')" class="p-4 text-xs font-bold uppercase active" id="btn-pedidos">Pedidos</button>
        <button onclick="location.href='ofertas.html'" class="p-4 text-xs font-bold uppercase text-gray-500">Marketing</button>
        <button onclick="tab('config')" class="p-4 text-xs font-bold uppercase" id="btn-config">Config</button>
    </nav>

    <section id="pedidos" class="p-4 active">
        <h2 class="text-[#caa85c] font-bold mb-4 serif uppercase tracking-widest text-sm">Gestão de Vendas</h2>
        <div id="lista-pedidos" class="space-y-3">
            </div>
    </section>

    <div id="modalPedido" class="fixed inset-0 bg-black/95 z-[60] hidden overflow-y-auto p-4">
        <div class="max-w-2xl mx-auto bg-[#141414] border border-[#333] rounded-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="gold-text font-bold uppercase">Detalhes do Pedido</h3>
                <button onclick="fecharPedido()" class="text-gray-500 text-xl">✕</button>
            </div>
            <div id="conteudoPedido" class="text-xs space-y-4">
                </div>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function tab(name) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    document.getElementById('btn-'+name).classList.add('active');
}

// Escuta novos pedidos
db.ref('orders').on('value', snap => {
    const list = document.getElementById('lista-pedidos');
    list.innerHTML = '';
    snap.forEach(child => {
        const p = child.val();
        list.innerHTML += `
            <div class="card flex justify-between items-center" onclick="verPedido('${child.key}')">
                <div>
                    <p class="font-bold uppercase text-sm">${p.cliente.nome}</p>
                    <p class="text-[10px] text-gray-500">${p.data}</p>
                </div>
                <div class="text-right">
                    <p class="gold-text font-bold">R$ ${p.resumo.total.toFixed(2)}</p>
                    <span class="status-badge bg-blue-900/30 text-blue-400">${p.status || 'Novo'}</span>
                </div>
            </div>`;
    });
});

async function verPedido(id) {
    const snap = await db.ref('orders/'+id).once('value');
    const p = snap.val();
    const modal = document.getElementById('modalPedido');
    const box = document.getElementById('conteudoPedido');
    
    let itensHtml = '';
    p.itens.forEach(i => {
        itensHtml += `<div class="flex justify-between border-b border-[#222] py-2">
            <span>${i.quantidade}x ${i.name}</span>
            <span class="font-bold">R$ ${(i.price * i.quantidade).toFixed(2)}</span>
        </div>`;
    });

    box.innerHTML = `
        <div class="grid grid-cols-2 gap-4 bg-black/40 p-4 rounded-2xl">
            <div><p class="text-gray-500 uppercase text-[9px]">Cliente</p><p class="font-bold">${p.cliente.nome}</p></div>
            <div><p class="text-gray-500 uppercase text-[9px]">WhatsApp</p><p class="font-bold">${p.cliente.tel}</p></div>
            <div class="col-span-2"><p class="text-gray-500 uppercase text-[9px]">Endereço</p><p class="font-bold">${p.cliente.cidade}</p></div>
        </div>
        
        <div class="space-y-1">
            <p class="text-[#caa85c] font-black uppercase text-[10px] mb-2">Itens do Pedido</p>
            ${itensHtml}
        </div>

        <div class="bg-black/60 p-4 rounded-2xl space-y-2">
            <div class="flex justify-between"><span>Subtotal</span><span>R$ ${p.resumo.sub.toFixed(2)}</span></div>
            <div class="flex justify-between text-green-500"><span>Desconto Aplicado</span><span>- R$ ${p.resumo.desc.toFixed(2)}</span></div>
            <div class="flex justify-between text-lg font-black gold-text"><span>Total Final</span><span>R$ ${p.resumo.total.toFixed(2)}</span></div>
        </div>

        <div class="flex gap-2">
            <button onclick="alterarStatus('${id}', 'Em Produção')" class="flex-1 btn-gold p-3 rounded-xl uppercase font-bold text-[9px]">Em Produção</button>
            <button onclick="alterarStatus('${id}', 'Enviado')" class="flex-1 bg-green-700 p-3 rounded-xl uppercase font-bold text-[9px]">Enviado</button>
            <button onclick="excluirPedido('${id}')" class="bg-red-900/50 text-red-500 p-3 rounded-xl uppercase font-bold text-[9px]">Excluir</button>
        </div>
    `;
    modal.classList.remove('hidden');
}

function fecharPedido() { document.getElementById('modalPedido').classList.add('hidden'); }

function alterarStatus(id, status) {
    db.ref('orders/'+id).update({ status }).then(() => fecharPedido());
}

function excluirPedido(id) {
    if(confirm("Deseja apagar este pedido permanentemente?")) {
        db.ref('orders/'+id).remove().then(() => fecharPedido());
    }
}
</script>
</body>
</html>
