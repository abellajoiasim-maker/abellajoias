<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard • Abella Joias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
body { background:#0b0b0b; color:#eee; font-family: Arial; }
.card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:20px; transition:.3s; }
.card:hover { border-color:#caa85c; transform: translateY(-3px); }
.input { background:#0b0b0b; border:1px solid #333; padding:10px; border-radius:8px; width:100%; color:#fff; }
.btn { background:#caa85c; color:#000; font-weight:bold; padding:10px 20px; border-radius:8px; cursor:pointer; }
</style>
</head>

<body class="p-6">

<header class="mb-8 text-center">
    <h1 class="text-[#caa85c] text-xl font-bold uppercase">Abella Joias • Admin</h1>
</header>

<!-- STATUS -->
<div class="card mb-6 flex justify-between items-center">
    <div>
        <p class="text-xs text-gray-400 uppercase">Status do Sistema</p>
        <h3 id="statusTexto" class="font-bold">Carregando...</h3>
    </div>
    <button onclick="alternarManutencao()" class="btn">Alternar</button>
</div>

<!-- EMPRESA -->
<div class="card mb-8">
    <h2 class="text-[#caa85c] font-bold mb-4">Configurações da Empresa</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="nome" class="input" placeholder="Nome da Loja">
        <input id="slogan" class="input" placeholder="Slogan">
        <input id="whatsapp" class="input" placeholder="WhatsApp">
        <input id="pix" class="input" type="number" placeholder="Desconto PIX (%)">
        <input id="parcelas" class="input" type="number" placeholder="Parcelas no cartão">
    </div>

    <button onclick="salvarEmpresa()" class="btn mt-4">💾 Salvar Configurações</button>
</div>

<!-- NAVEGAÇÃO -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

    <a href="pedidos.html" class="card text-center">
        <div class="text-3xl mb-2">📦</div>
        <h2 class="text-[#caa85c] font-bold uppercase">Pedidos</h2>
        <p class="text-xs text-gray-500">Gerenciar vendas</p>
    </a>

    <a href="estoque.html" class="card text-center">
        <div class="text-3xl mb-2">💎</div>
        <h2 class="text-[#caa85c] font-bold uppercase">Estoque</h2>
        <p class="text-xs text-gray-500">Produtos</p>
    </a>

    <a href="ofertas.html" class="card text-center">
        <div class="text-3xl mb-2">🔥</div>
        <h2 class="text-[#caa85c] font-bold uppercase">Ofertas</h2>
        <p class="text-xs text-gray-500">Promoções</p>
    </a>

    <a href="../index.html" target="_blank" class="card text-center">
        <div class="text-3xl mb-2">🌐</div>
        <h2 class="text-[#caa85c] font-bold uppercase">Ver Loja</h2>
        <p class="text-xs text-gray-500">Abrir site</p>
    </a>

</div>

<script>
// 🔒 ANTI-ERRO GLOBAL
window.onerror = function(msg, src, line){
    console.error("Erro:", msg, "Linha:", line);
    return true;
};

const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

// 🔒 FIREBASE SEGURO
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔒 HELPERS
const safe = id => document.getElementById(id);
const val = (v,d='') => v ?? d;


// 🔥 CARREGAR EMPRESA
function carregarEmpresa() {
    db.ref('settings/empresa').once('value').then(snap => {
        const d = snap.val() || {};
        safe('nome').value = val(d.nome);
        safe('slogan').value = val(d.slogan);
        safe('whatsapp').value = val(d.whatsapp);
        safe('pix').value = val(d.pix,0);
        safe('parcelas').value = val(d.parcelas,1);
    }).catch(console.error);
}


// 🔥 SALVAR EMPRESA
function salvarEmpresa() {
    try{
        const data = {
            nome: safe('nome').value,
            slogan: safe('slogan').value,
            whatsapp: safe('whatsapp').value,
            pix: parseFloat(safe('pix').value) || 0,
            parcelas: parseInt(safe('parcelas').value) || 1
        };

        db.ref('settings/empresa').set(data)
        .then(() => alert("✅ Salvo com sucesso"))
        .catch(() => alert("Erro ao salvar"));

    }catch(e){
        console.error(e);
    }
}


// 🔥 STATUS
function carregarStatusSite() {
    db.ref('settings').on('value', snap => {
        const s = snap.val() || {};
        safe('statusTexto').innerText = s.manutencao ? "🚧 Em manutenção" : "✅ Online";
    });
}


// 🔥 BOTÃO MANUTENÇÃO (CORRIGIDO)
function alternarManutencao() {
    const ref = db.ref('settings/manutencao');

    ref.transaction(current => {
        return !current; // AJUSTE CIRÚRGICO: evita null + garante atomicidade
    })
    .catch(err => {
        console.error("Erro ao alternar manutenção:", err);
    });
}


// INIT
window.onload = () => {
    carregarEmpresa();
    carregarStatusSite();
};
</script>

</body>
</html>
