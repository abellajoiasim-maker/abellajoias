<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        body { background:#0b0b0b; color:#eee; font-family:Inter,Arial; margin:0; }
        nav button.active { border-bottom:2px solid #caa85c; color:#caa85c; }
        section { display:none; min-height:300px; }
        section.active { display:block; }
        .card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:14px; }
        .btn { background:#222; border:1px solid #444; padding:8px 12px; border-radius:8px; font-size:11px; cursor:pointer; transition: 0.3s; }
        .btn:hover { background:#333; }
        .btn-gold { background:#caa85c; color:#000; border:none; font-weight:700; }
        .btn-gold:hover { background:#b8964d; }
        input, select, textarea { background:#1a1a1a; border:1px solid #333; color:#fff; padding:8px; border-radius:8px; outline:none; font-size:13px; }
        input:focus { border-color:#caa85c; }
        .grid-admin { display:grid; grid-template-columns: 240px 1fr; min-height:100vh; }
        aside { background:#111; border-right:1px solid #222; padding:20px; }
        .status-badge { padding:2px 8px; border-radius:4px; font-size:10px; font-weight:bold; }
        
        /* Modal Styles */
        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background:#141414; width:100%; max-width:600px; border-radius:20px; border:1px solid #333; max-height:90vh; overflow-y:auto; }

        @media (max-width: 768px) {
            .grid-admin { grid-template-columns: 1fr; }
            aside { display:none; }
        }
    </style>
</head>
<body>

<div class="grid-admin">
    <aside>
        <div class="mb-10">
            <h1 class="text-[#caa85c] font-bold text-xl tracking-tighter">ABELLA JOIAS</h1>
            <p class="text-[10px] text-gray-500 uppercase font-bold">Painel de Gestão</p>
        </div>
        
        <nav class="flex flex-col gap-2">
            <button onclick="showSection('produtos')" class="nav-btn active flex items-center gap-3 p-3 rounded-xl hover:bg-[#1a1a1a] transition-all text-sm">
                <span>📦 Produtos</span>
            </button>
            <button onclick="showSection('categorias')" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-[#1a1a1a] transition-all text-sm">
                <span>📁 Categorias</span>
            </button>
            <button onclick="showSection('banners')" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-[#1a1a1a] transition-all text-sm">
                <span>🖼️ Banners</span>
            </button>
        </nav>
    </aside>

    <main class="p-6 md:p-10">
        <header class="flex justify-between items-center mb-8">
            <h2 id="sectionTitle" class="text-2xl font-bold italic">Produtos</h2>
            <div class="flex gap-3">
                <button onclick="abrirModalAdd()" class="btn btn-gold px-6">+ Novo Item</button>
            </div>
        </header>

        <section id="produtos" class="active">
            <div class="mb-6 flex gap-4">
                <input type="text" id="searchProd" placeholder="Buscar produto..." class="flex-1" onkeyup="filtrarProdutos()">
                <select id="filterCat" onchange="filtrarProdutos()">
                    <option value="">Todas Categorias</option>
                </select>
            </div>
            <div id="listaProdutos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </section>

        <section id="categorias">
            <div id="listaCategorias" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                </div>
        </section>

        <section id="banners">
            <div class="card p-6 border-dashed border-2 border-[#333]">
                <h3 class="font-bold mb-4">Gerenciar Banners Principais</h3>
                <div id="listaBanners" class="space-y-4">
                    </div>
            </div>
        </section>
    </main>
</div>

<div id="modal">
    <div class="modal-content">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h3 id="modalTitle" class="font-bold text-lg">Editar Item</h3>
            <button onclick="fecharModal()" class="text-gray-500 hover:text-white">✕</button>
        </div>
        <div id="modalBody" class="p-6">
            </div>
        <div class="p-6 border-t border-white/5 flex justify-end gap-3">
            <button onclick="fecharModal()" class="btn">Cancelar</button>
            <button id="btnSalvar" class="btn btn-gold px-8">Salvar Alterações</button>
        </div>
    </div>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyD62Yef2ggoAFSc-qKPlBTaRPRn20D91ug",
        databaseURL: "https://luary-shop-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dataCache = { produtos: {}, categorias: {}, banners: {} };

    // INICIALIZAÇÃO
    window.onload = () => {
        carregarDados();
    };

    function carregarDados() {
        db.ref().on('value', snapshot => {
            const data = snapshot.val() || {};
            dataCache.produtos = data.products || {};
            dataCache.categorias = data.categories || {};
            dataCache.banners = data.banners || {};
            
            renderizarProdutos();
            renderizarCategorias();
            renderizarBanners();
            atualizarSelects();
        });
    }

    function showSection(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('sectionTitle').innerText = id.charAt(0).toUpperCase() + id.slice(1);
    }

    // PRODUTOS
    function renderizarProdutos() {
        const container = document.getElementById('listaProdutos');
        const search = document.getElementById('searchProd').value.toLowerCase();
        const catFilter = document.getElementById('filterCat').value;
        
        container.innerHTML = '';
        
        Object.entries(dataCache.produtos).forEach(([id, p]) => {
            if(search && !p.name.toLowerCase().includes(search)) return;
            if(catFilter && p.category !== catFilter) return;

            const card = document.createElement('div');
            card.className = 'card flex gap-4 items-center';
            card.innerHTML = `
                <img src="${p.image}" class="w-16 h-16 rounded-lg object-cover bg-black">
                <div class="flex-1">
                    <h4 class="font-bold text-sm line-clamp-1">${p.name}</h4>
                    <p class="text-[#caa85c] font-bold text-xs">R$ ${parseFloat(p.price).toFixed(2)}</p>
                    <p class="text-[10px] text-gray-500">${p.category || 'Sem categoria'}</p>
                </div>
                <div class="flex flex-col gap-1">
                    <button onclick="editarProduto('${id}')" class="btn p-2">✏️</button>
                    <button onclick="excluirItem('products/${id}')" class="btn p-2 text-red-500">🗑️</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function filtrarProdutos() {
        renderizarProdutos();
    }

    function editarProduto(id) {
        const p = dataCache.produtos[id];
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `
            <div class="grid gap-4">
                <div><label class="text-[10px] uppercase font-bold text-gray-500">Nome do Produto</label>
                <input id="edit_name" value="${p.name}" class="w-full"></div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] uppercase font-bold text-gray-500">Preço (R$)</label>
                    <input type="number" step="0.01" id="edit_price" value="${p.price}" class="w-full"></div>
                    <div><label class="text-[10px] uppercase font-bold text-gray-500">Categoria</label>
                    <select id="edit_cat" class="w-full">${gerarOptionsCategorias(p.category)}</select></div>
                </div>

                <div><label class="text-[10px] uppercase font-bold text-gray-500">URL da Imagem</label>
                <input id="edit_img" value="${p.image}" class="w-full"></div>

                <div><label class="text-[10px] uppercase font-bold text-gray-500">Descrição</label>
                <textarea id="edit_desc" class="w-full h-24">${p.description || ''}</textarea></div>
            </div>
        `;
        
        document.getElementById('modalTitle').innerText = "Editar Produto";
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('btnSalvar').onclick = () => salvarProduto(id);
    }

    function salvarProduto(id) {
        const updates = {
            name: document.getElementById('edit_name').value,
            price: document.getElementById('edit_price').value,
            category: document.getElementById('edit_cat').value,
            image: document.getElementById('edit_img').value,
            description: document.getElementById('edit_desc').value
        };
        db.ref('products/' + id).update(updates).then(() => fecharModal());
    }

    // CATEGORIAS
    function renderizarCategorias() {
        const container = document.getElementById('listaCategorias');
        container.innerHTML = '';
        
        Object.entries(dataCache.categorias).forEach(([id, c]) => {
            const card = document.createElement('div');
            card.className = 'card text-center';
            card.innerHTML = `
                <div class="w-12 h-12 bg-[#222] rounded-full flex items-center justify-center mx-auto mb-3 text-xl">${c.icon || '📁'}</div>
                <h4 class="font-bold uppercase text-xs tracking-widest">${c.name}</h4>
                <div class="mt-4 flex justify-center gap-2">
                    <button onclick="editarCategoria('${id}')" class="btn px-4">Editar</button>
                    <button onclick="excluirItem('categories/${id}')" class="btn text-red-500">✕</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function editarCategoria(id) {
        const c = dataCache.categorias[id];
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `
            <div class="grid gap-4">
                <div><label>Nome da Categoria</label>
                <input id="cat_name" value="${c.name}" class="w-full"></div>
                <div><label>Emoji/Ícone</label>
                <input id="cat_icon" value="${c.icon || ''}" class="w-full" placeholder="Ex: 💍"></div>
            </div>
        `;
        document.getElementById('modalTitle').innerText = "Editar Categoria";
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('btnSalvar').onclick = () => {
            db.ref('categories/' + id).update({
                name: document.getElementById('cat_name').value,
                icon: document.getElementById('cat_icon').value
            }).then(() => fecharModal());
        };
    }

    // BANNERS
    function renderizarBanners() {
        const container = document.getElementById('listaBanners');
        container.innerHTML = '';
        
        Object.entries(dataCache.banners).forEach(([id, b]) => {
            const item = document.createElement('div');
            item.className = 'flex gap-4 items-center p-3 bg-black/30 rounded-lg';
            item.innerHTML = `
                <img src="${b.image}" class="w-32 h-12 object-cover rounded border border-[#333]">
                <input class="flex-1 text-xs" value="${b.image}" onchange="db.ref('banners/${id}/image').set(this.value)">
                <button onclick="excluirItem('banners/${id}')" class="text-red-500">✕</button>
            `;
            container.appendChild(item);
        });
    }

    // AUXILIARES
    function abrirModalAdd() {
        const section = document.querySelector('section.active').id;
        if(section === 'produtos') editarProduto(Date.now());
        else if(section === 'categorias') editarCategoria(Date.now());
        else if(section === 'banners') {
            const id = Date.now();
            db.ref('banners/' + id).set({ image: 'https://via.placeholder.com/1200x400' });
        }
    }

    function fecharModal() {
        document.getElementById('modal').style.display = 'none';
    }

    function excluirItem(path) {
        if(confirm("Deseja realmente excluir este item?")) {
            db.ref(path).remove();
        }
    }

    function gerarOptionsCategorias(selected) {
        let html = '<option value="">Sem Categoria</option>';
        Object.values(dataCache.categorias).forEach(c => {
            html += `<option value="${c.name}" ${selected === c.name ? 'selected' : ''}>${c.name}</option>`;
        });
        return html;
    }

    function atualizarSelects() {
        const filter = document.getElementById('filterCat');
        const current = filter.value;
        filter.innerHTML = '<option value="">Todas Categorias</option>' + gerarOptionsCategorias(current);
    }
</script>

</body>
</html>
