<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        body { background:#0b0b0b; color:#eee; font-family:Inter,Arial; margin:0; }
        nav button.active { border-bottom:2px solid #caa85c; color:#caa85c; }
        section { display:none; min-height:300px; }
        section.active { display:block; }
        .card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:14px; }
        .btn { background:#222; border:1px solid #444; padding:8px 12px; border-radius:8px; font-size:11px; cursor:pointer; transition: 0.3s; }
        .btn:hover { background:#333; }
        .btn-gold { background:#caa85c; color:#000; font-weight:700; padding:10px; border-radius:8px; cursor:pointer; }
        input, select { background:#111; border:1px solid #333; padding:8px; border-radius:8px; width:100%; margin-bottom:8px; color:#fff; outline:none; }
        #mainModal.active { display: flex; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #caa85c; border-radius: 10px; }
        
        #print-area { display: none; }

        @media print {
            @page { size: A4; margin: 10mm; }
            html, body { height: auto; overflow: visible !important; background: #fff !important; color: #000 !important; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                position: absolute; left: 0; top: 0; width: 100%; 
                display: block !important; background: #fff; 
                page-break-after: avoid !important;
            }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<header class="p-5 text-center text-xl font-bold bg-black border-b border-[#222] text-[#caa85c] tracking-widest uppercase">
    Abella Joias • Gestão Administrativa
</header>

<nav class="flex gap-2 p-2 bg-[#111] sticky top-0 z-50 overflow-x-auto">
    <button type="button" class="btn active" onclick="showTab('empresa', this)">Empresa</button>
    <button type="button" class="btn" onclick="showTab('categorias', this)">Categorias</button>
    <button type="button" class="btn" onclick="showTab('produtos', this)">Produtos</button>
    <button type="button" class="btn" onclick="showTab('promocoes', this)">Promoções</button>
    <button type="button" class="btn" onclick="showTab('pedidos', this)">Pedidos</button>
</nav>

<main class="p-6 max-w-4xl mx-auto">
    <section id="empresa" class="active">
        <div class="card space-y-3">
            <h2 class="text-[#caa85c] font-bold uppercase text-sm">Configuração da Loja</h2>
            <input id="empNome" placeholder="Nome da Empresa">
            <input id="empWhats" placeholder="WhatsApp (ex: 5511...)">
            <div class="grid grid-cols-2 gap-2">
                <div><label class="text-[10px] text-gray-400">DESC. PIX (%)</label><input id="empDesc" type="number"></div>
                <div><label class="text-[10px] text-gray-400">PARCELAS MÁX</label><input id="empParc" type="number"></div>
            </div>
            <button class="btn-gold w-full" onclick="salvarEmpresa()">SALVAR ALTERAÇÕES</button>
        </div>
    </section>

    <section id="categorias">
        <div class="card mb-4">
            <input id="newCatName" placeholder="Nome da Nova Categoria">
            <button class="btn-gold w-full" onclick="novaCategoria()">+ CADASTRAR CATEGORIA</button>
        </div>
        <div id="listaCategorias" class="grid gap-2"></div>
    </section>

    <section id="produtos">
        <div id="listaProdutos" class="grid gap-2 text-xs"></div>
    </section>

    <section id="promocoes">
        <div class="card text-center">
            <h2 class="text-[#caa85c] font-bold uppercase text-sm mb-4">Descontos Progressivos por Valor</h2>
            <p class="text-[10px] text-gray-500 mb-6 uppercase tracking-widest">Defina quanto o cliente ganha ao atingir certo valor</p>
            <button class="btn-gold w-full py-4 uppercase" onclick="abrirPainelPromocoes()">
                💰 Gerenciar Faixas de Desconto
            </button>
        </div>
    </section>

    <section id="pedidos">
        <div id="listaPedidos" class="grid gap-4"></div>
    </section>
</main>

<div id="mainModal" class="fixed inset-0 bg-black/90 z-[100] hidden items-center justify-center p-4">
    <div class="bg-[#141414] border border-[#2a2a2a] w-full max-w-lg rounded-2xl overflow-hidden shadow-2xl">
        <div class="p-4 border-b border-[#222] flex justify-between items-center">
            <h3 id="modalTitle" class="text-[#caa85c] font-bold uppercase text-sm">Título</h3>
            <button onclick="fecharModal()" class="text-gray-500 hover:text-white text-2xl">&times;</button>
        </div>
        <div id="modalBody" class="p-6 max-h-[60vh] overflow-y-auto custom-scroll"></div>
        <div class="p-4 border-t border-[#222] flex gap-3">
            <button onclick="fecharModal()" class="flex-1 py-3 text-xs uppercase font-bold text-gray-500">Cancelar</button>
            <button id="modalSaveBtn" class="flex-1 btn-gold py-3 text-xs uppercase font-bold">Salvar</button>
        </div>
    </div>
</div>

<div id="print-area"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const fMoeda = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

function showTab(id, btn) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if (id === 'pedidos') carregarPedidos();
    if (id === 'categorias') carregarCategorias();
    if (id === 'produtos') carregarProdutos();
}

// --- EMPRESA ---
function salvarEmpresa() {
    db.ref('settings/empresa').update({
        nome: document.getElementById('empNome').value,
        whats: document.getElementById('empWhats').value,
        descontoPix: Number(document.getElementById('empDesc').value),
        parcelas: Number(document.getElementById('empParc').value)
    }).then(() => alert('Configurações salvas!'));
}

// --- CATEGORIAS ---
function carregarCategorias() {
    db.ref('categories').on('value', s => {
        const lista = document.getElementById('listaCategorias');
        lista.innerHTML = '';
        s.forEach(c => {
            lista.innerHTML += `<div class="card flex justify-between items-center text-xs">
                <span>${c.val().name}</span>
                <button class="text-red-500" onclick="db.ref('categories/${c.key}').remove()">🗑</button>
            </div>`;
        });
    });
}
function novaCategoria() {
    const name = document.getElementById('newCatName').value;
    if(name) db.ref('categories').push({name}).then(() => document.getElementById('newCatName').value = '');
}

// --- PRODUTOS ---
function carregarProdutos() {
    db.ref('products').once('value', s => {
        const lista = document.getElementById('listaProdutos');
        lista.innerHTML = '';
        s.forEach(p => {
            const prod = p.val();
            lista.innerHTML += `<div class="card flex justify-between gap-2">
                <span><b>[${prod.sku || '---'}]</b> ${prod.name}</span>
                <span>${fMoeda(prod.price)}</span>
            </div>`;
        });
    });
}

// --- PROMOÇÕES (FAIXAS DE VALOR) ---
async function abrirPainelPromocoes() {
    const snap = await db.ref('settings/promocoes_valor').once('value');
    const regras = snap.val() || [];
    let html = `<div id="listaRegras" class="space-y-3">`;
    Object.values(regras).sort((a,b) => a.minimo - b.minimo).forEach(r => {
        html += `<div class="card bg-black/40 grid grid-cols-2 gap-2">
            <div><label class="text-[9px] text-gray-500">SE COMPRA > R$</label><input type="number" value="${r.minimo}"></div>
            <div><label class="text-[9px] text-gray-400">DESCONTO (% OU R$)</label><input type="number" value="${r.desconto}"></div>
            <button onclick="this.parentElement.remove()" class="text-red-500 text-[9px] col-span-2 text-left">× REMOVER FAIXA</button>
        </div>`;
    });
    html += `</div><button class="btn w-full mt-4 border-dashed" onclick="addRegraHTML()">+ NOVA FAIXA</button>`;
    
    document.getElementById('modalTitle').innerText = 'CONFIGURAR DESCONTOS';
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('mainModal').classList.add('active');
    document.getElementById('modalSaveBtn').onclick = () => {
        const novas = [];
        document.querySelectorAll('#listaRegras > div').forEach(div => {
            const ins = div.querySelectorAll('input');
            if(ins[0].value) novas.push({ minimo: Number(ins[0].value), desconto: Number(ins[1].value) });
        });
        db.ref('settings/promocoes_valor').set(novas).then(() => { alert("Salvo!"); fecharModal(); });
    };
}
function addRegraHTML() {
    const div = document.createElement('div');
    div.className = "card bg-black/40 grid grid-cols-2 gap-2 mt-2";
    div.innerHTML = `<div><label class="text-[9px]">VALOR MÍNIMO</label><input type="number"></div>
                     <div><label class="text-[9px]">DESCONTO</label><input type="number"></div>
                     <button onclick="this.parentElement.remove()" class="text-red-500 text-[9px] col-span-2">× REMOVER</button>`;
    document.getElementById('listaRegras').appendChild(div);
}

// --- PEDIDOS ---
function carregarPedidos() {
    db.ref('orders').on('value', s => {
        const lista = document.getElementById('listaPedidos');
        lista.innerHTML = '';
        s.forEach(ped => {
            const p = ped.val();
            lista.innerHTML += `<div class="card flex justify-between items-center text-xs">
                <div><b>${p.cliente?.nome || 'Cliente'}</b><br>${p.data}</div>
                <div class="text-right"><b>${fMoeda(p.total)}</b><br><button class="text-blue-400" onclick="imprimirPedido('${ped.key}')">🖨 Imprimir</button></div>
            </div>`;
        });
    });
}

function imprimirPedido(id) {
    db.ref('orders/'+id).once('value', s => {
        const p = s.val();
        let html = `<div style="padding:20px; font-family:Arial; color:#000;">
            <h2 style="text-align:center; border-bottom:2px solid #000;">ROMANEIO - ABELLA JOIAS</h2>
            <p><b>Cliente:</b> ${p.cliente?.nome}</p>
            <p><b>Data:</b> ${p.data}</p>
            <table style="width:100%; border-collapse:collapse; margin-top:10px;">
                <thead><tr style="background:#eee;"><th style="border:1px solid #000; padding:5px;">SKU</th><th style="border:1px solid #000; padding:5px;">Item</th><th style="border:1px solid #000; padding:5px;">Qtd</th><th style="border:1px solid #000; padding:5px;">Subtotal</th></tr></thead>
                <tbody>`;
        const itens = Array.isArray(p.itens) ? p.itens : Object.values(p.itens || {});
        itens.forEach(i => {
            html += `<tr><td style="border:1px solid #000; padding:5px;">${i.sku}</td><td style="border:1px solid #000; padding:5px;">${i.name}</td><td style="border:1px solid #000; padding:5px; text-align:center;">${i.quantidade || i.qtd}</td><td style="border:1px solid #000; padding:5px; text-align:right;">${fMoeda(i.price * (i.quantidade || i.qtd))}</td></tr>`;
        });
        html += `</tbody></table>
            <div style="text-align:right; margin-top:20px; font-size:18px;"><b>TOTAL FINAL: ${fMoeda(p.total)}</b></div>
        </div>`;
        document.getElementById('print-area').innerHTML = html;
        setTimeout(() => { window.print(); }, 500);
    });
}

function fecharModal() { document.getElementById('mainModal').classList.remove('active'); }

window.onload = () => {
    db.ref('settings/empresa').once('value', s => {
        const v = s.val() || {};
        document.getElementById('empNome').value = v.nome || '';
        document.getElementById('empWhats').value = v.whats || '';
        document.getElementById('empDesc').value = v.descontoPix || 0;
        document.getElementById('empParc').value = v.parcelas || 0;
    });
};
</script>
</body>
</html>
