<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pedidos • Abella Joias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background:#0b0b0b; color:#eee; font-family: sans-serif; }
        .card { background:#141414; border:1px solid #2a2a2a; border-radius:12px; }
    </style>
</head>
<body class="p-6">

<div class="max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold text-[#caa85c] mb-6">Pedidos Recebidos</h1>
    <div class="card p-6 overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="text-gray-500 text-xs uppercase border-b border-gray-800">
                    <th class="pb-3">Cliente</th>
                    <th class="pb-3">Total</th>
                    <th class="pb-3">Pagamento</th>
                    <th class="pb-3">Ação</th>
                </tr>
            </thead>
            <tbody id="listaPedidos">
                </tbody>
        </table>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// AJUSTE CIRÚRGICO: Monitoramento em tempo real na coleção 'orders'
function carregarPedidos() {
    const listaPedidos = document.getElementById('listaPedidos');
    
    // Ouve mudanças na coleção 'orders'
    db.ref('orders').on('value', (snapshot) => {
        listaPedidos.innerHTML = ''; // Limpa a tabela antes de atualizar
        const orders = snapshot.val();
        
        if (!orders) {
            listaPedidos.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-gray-500">Nenhum pedido encontrado.</td></tr>';
            return;
        }

        Object.entries(orders).forEach(([id, p]) => {
            const tr = document.createElement('tr');
            tr.className = "border-b border-gray-800 hover:bg-[#1a1a1a]";
            tr.innerHTML = `
                <td class="py-4">${p.nome || 'Sem nome'}</td>
                <td class="py-4 font-mono text-[#caa85c]">${p.total || 'R$ 0,00'}</td>
                <td class="py-4 text-sm">${p.metodo || 'N/A'}</td>
                <td class="py-4">
                    <button onclick="verDetalhes('${id}')" class="text-xs bg-[#caa85c] text-black px-3 py-1 rounded font-bold">VER</button>
                </td>
            `;
            listaPedidos.appendChild(tr);
        });
    });
}

function verDetalhes(id) {
    db.ref('orders/' + id).once('value').then(snap => {
        const p = snap.val();
        alert(`Pedido de: ${p.nome}\nValor: ${p.total}\nMetodo: ${p.metodo}\nCidade: ${p.cidade || 'Não informada'}`);
    });
}

window.onload = carregarPedidos;
</script>
</body>
</html>
