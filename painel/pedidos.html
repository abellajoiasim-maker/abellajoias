<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pedidos • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <header class="p-5 text-center text-xl font-bold bg-black border-b border-[#222] text-[#caa85c] uppercase">
        Abella Joias • Gestão de Pedidos
    </header>

    <nav class="flex gap-2 p-2 bg-[#111] sticky top-0 z-50">
        <a href="estoque.html" class="btn">❮ Estoque</a>
        <button class="btn active">Pedidos Recebidos</button>
    </nav>

    <main class="p-6 max-w-4xl mx-auto">
        <div id="listaPedidos" class="grid gap-4"></div>
    </main>

    <div id="editorPedido" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
        <div class="bg-[#111] w-full max-w-4xl rounded-2xl p-5 overflow-auto max-h-[95vh] border border-[#333] custom-scroll">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[#caa85c] font-bold uppercase">Editar Pedido</h2>
                <div id="totalPreview" class="text-[#caa85c] font-bold text-xl">R$ 0,00</div>
            </div>
            
            <div class="grid md:grid-cols-2 gap-4">
                <div class="card">
                    <input id="edClienteNome" placeholder="Cliente">
                    <input id="edClienteTel" placeholder="WhatsApp">
                </div>
                <div class="card">
                    <input id="edRua" placeholder="Endereço">
                    <input id="edCidade" placeholder="Cidade">
                </div>
            </div>

            <div id="edItens" class="mt-4"></div>
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-2 mt-6">
                <button class="btn bg-blue-900" onclick="imprimirRomaneio(pedidoEditando, 1)">CONFERÊNCIA</button>
                <button class="btn bg-blue-900" onclick="imprimirRomaneio(pedidoEditando, 2)">FINANCEIRO</button>
                <button class="btn-gold" onclick="salvarPedidoEditado()">SALVAR</button>
                <button class="btn text-red-500" onclick="fecharEditorPedido()">FECHAR</button>
            </div>
        </div>
    </div>

    <div id="print-area"></div>

    <script src="admin-logic.js"></script>
    <script>window.onload = () => carregarPedidos();</script>
</body>
</html>
