<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pedidos • Abella Joias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background:#0b0b0b; color:#eee; }
        .card { background:#141414; border:1px solid #2a2a2a; border-radius:12px; }
        @media print {
            body * { visibility: hidden; }
            #romaneioPrint, #romaneioPrint * { visibility: visible; }
            #romaneioPrint { position: absolute; left: 0; top: 0; width: 100%; color: #000; }
        }
    </style>
</head>
<body class="p-6">

<div class="max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold text-[#caa85c] mb-6">Pedidos Recebidos</h1>
    <div class="card p-6 overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="text-gray-500 text-xs uppercase border-b border-gray-800">
                    <th class="pb-3">Cliente</th>
                    <th class="pb-3">Total</th>
                    <th class="pb-3">Ação</th>
                </tr>
            </thead>
            <tbody id="listaPedidos"></tbody>
        </table>
    </div>
</div>

<div id="romaneioPrint" class="hidden p-8"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function carregarPedidos() {
    const lista = document.getElementById('listaPedidos');
    db.ref('orders').on('value', (snap) => {
        lista.innerHTML = '';
        const orders = snap.val();
        if(!orders) return;

        Object.entries(orders).forEach(([id, p]) => {
            lista.innerHTML += `
                <tr class="border-b border-gray-800">
                    <td class="py-4">${p.nome || 'Anônimo'}</td>
                    <td class="py-4 text-[#caa85c]">${p.total || '0.00'}</td>
                    <td class="py-4">
                        <button onclick="gerarRomaneio('${id}')" class="bg-[#caa85c] text-black px-3 py-1 rounded text-xs font-bold">IMPRIMIR</button>
                    </td>
                </tr>`;
        });
    });
}

function gerarRomaneio(id) {
    db.ref('orders/' + id).once('value').then(snap => {
        const p = snap.val();
        if (!p) return alert("Erro: Pedido não encontrado.");

        const romaneio = document.getElementById('romaneioPrint');
        
        // Verifica se itens existe, se não, cria array vazio para evitar erro
        const itens = p.itens || [];
        
        let itensHtml = itens.map(i => `
            <tr>
                <td style="border:1px solid #000; padding:8px;">${i.sku || '---'}</td>
                <td style="border:1px solid #000; padding:8px;">${i.nome || i.name || 'Sem nome'}</td>
                <td style="border:1px solid #000; padding:8px;">${i.qtd || i.quantidade || 1}</td>
                <td style="border:1px solid #000; padding:8px;">${i.subtotal || '0.00'}</td>
            </tr>`).join('');

        romaneio.innerHTML = `
            <h2 style="font-size:24px; font-weight:bold; border-bottom:2px solid #000;">Romaneio: ${p.nome}</h2>
            <div style="margin:20px 0;">
                <p><strong>Data:</strong> ${new Date().toLocaleDateString()}</p>
                <p><strong>Cidade:</strong> ${p.cidade || 'Não informada'}</p>
                <p><strong>Forma de Pagamento:</strong> ${p.metodo || 'Não informada'}</p>
            </div>
            <table style="width:100%; border-collapse:collapse; margin-top:20px;">
                <thead>
                    <tr style="background:#f0f0f0;">
                        <th style="border:1px solid #000; padding:8px;">SKU</th>
                        <th style="border:1px solid #000; padding:8px;">Produto</th>
                        <th style="border:1px solid #000; padding:8px;">Qtd</th>
                        <th style="border:1px solid #000; padding:8px;">Valor</th>
                    </tr>
                </thead>
                <tbody>${itensHtml}</tbody>
            </table>
            <div style="margin-top:20px; text-align:right; font-size:20px;">
                <strong>TOTAL: ${p.total}</strong>
            </div>
        `;
        
        // Pequeno atraso para garantir que o navegador desenhou o HTML antes de abrir a impressão
        setTimeout(() => window.print(), 500);
    });
}

window.onload = carregarPedidos;
</script>
</body>
</html>
