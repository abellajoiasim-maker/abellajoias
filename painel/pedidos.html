<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedidos • Abella Joias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
body { background:#0b0b0b; color:#fff; font-family: Arial; }
.card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:16px; }
.btn { background:#caa85c; color:#000; padding:6px 12px; border-radius:8px; font-size:12px; font-weight:bold; }
</style>
</head>

<body>

<header class="p-5 text-center text-xl font-bold bg-black border-b border-[#222] text-[#caa85c] uppercase">
Abella Joias • Gestão de Pedidos
</header>

<div class="p-4 max-w-4xl mx-auto">

<input id="buscaPedido" placeholder="🔍 Buscar por número ou cliente..."
class="w-full mb-4 p-3 bg-[#111] border border-[#333] rounded-lg text-white">

<div id="listaPedidos" class="grid gap-4"></div>

</div>

<!-- MODAL -->
<div id="editorPedido" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4">

<div class="bg-[#111] w-full max-w-2xl rounded-xl p-6">

<h2 class="text-[#caa85c] font-bold mb-4">Editar Pedido</h2>

<input id="edNome" class="w-full p-2 mb-2 bg-black border border-[#333]" placeholder="Nome">
<input id="edTel" class="w-full p-2 mb-4 bg-black border border-[#333]" placeholder="Telefone">

<div id="edItens" class="space-y-2 mb-4"></div>

<div class="flex gap-2">
<button onclick="salvar()" class="btn">Salvar</button>
<button onclick="excluir()" class="bg-red-600 px-4 py-2 rounded">Excluir</button>
<button onclick="fechar()" class="border px-4 py-2 rounded">Cancelar</button>
</div>

</div>
</div>

<script>

// 🔒 ANTI ERRO
window.onerror = e => { console.error(e); return true; };

// 🔥 FIREBASE
const firebaseConfig = {
apiKey:"AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
databaseURL:"https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔒 HELPERS
const safe = v => v ?? "";
const money = v => (parseFloat(v)||0).toFixed(2);

// 🔥 CACHE
let pedidos = {};
let atual = null;

// 🔥 CARREGAR
function carregarPedidos(){

const busca = (document.getElementById("buscaPedido").value||"").toLowerCase();

db.ref("orders").on("value", snap=>{

pedidos = snap.val() || {};
let html = '';

Object.entries(pedidos).reverse().forEach(([id,p])=>{

const numero = (p.numeroFormatado || "").toLowerCase();
const nome = (p.cliente?.nome || "").toLowerCase();

if(busca && !numero.includes(busca) && !nome.includes(busca)) return;

html += `
<div class="card">

<div class="flex justify-between items-center">

<div>
<h3 class="text-[#caa85c] font-bold">
#${p.numeroFormatado || "---"} • ${safe(p.cliente?.nome)}
</h3>
<p class="text-xs text-gray-400">${safe(p.cliente?.telefone)}</p>
<p class="text-[10px] text-gray-500">${p.status || "novo"}</p>
</div>

<div class="text-right">
<div class="text-[#caa85c] font-bold text-lg">
R$ ${money(p.total)}
</div>
<button class="btn mt-2" onclick="abrir('${id}')">Abrir</button>
</div>

</div>

<div class="flex gap-2 mt-3">
<button onclick="status('${id}','novo')" class="px-2 py-1 bg-gray-700 text-xs">Novo</button>
<button onclick="status('${id}','enviado')" class="px-2 py-1 bg-blue-700 text-xs">Enviado</button>
<button onclick="status('${id}','entregue')" class="px-2 py-1 bg-green-700 text-xs">Entregue</button>
<button onclick="copiar('${id}')" class="px-2 py-1 bg-[#caa85c] text-black text-xs">📲 Copiar</button>
</div>

</div>`;
});

document.getElementById("listaPedidos").innerHTML = html || "Nenhum pedido";

});
}

// 🔥 ABRIR
function abrir(id){

atual = id;
const p = pedidos[id];

document.getElementById("edNome").value = safe(p.cliente?.nome);
document.getElementById("edTel").value = safe(p.cliente?.telefone);

let html = '';

(p.itens||[]).forEach(i=>{
html += `<div class="flex justify-between text-sm">
<span>${i.nome} x${i.qtd}</span>
<span>R$ ${money(i.subtotal)}</span>
</div>`;
});

document.getElementById("edItens").innerHTML = html;

document.getElementById("editorPedido").classList.remove("hidden");

}

// 🔥 FECHAR
function fechar(){
document.getElementById("editorPedido").classList.add("hidden");
}

// 🔥 SALVAR
function salvar(){

db.ref("orders/"+atual+"/cliente").update({
nome: document.getElementById("edNome").value,
telefone: document.getElementById("edTel").value
});

alert("Salvo");
fechar();

}

// 🔥 EXCLUIR
function excluir(){

if(confirm("Excluir pedido?")){
db.ref("orders/"+atual).remove();
fechar();
}

}

// 🔥 STATUS
function status(id,s){
db.ref("orders/"+id+"/status").set(s);
}

// 🔥 COPIAR
function copiar(id){

const p = pedidos[id];

let txt = `Pedido #${p.numeroFormatado}\n\n`;

(p.itens||[]).forEach(i=>{
txt += `${i.nome} x${i.qtd} - R$ ${money(i.subtotal)}\n`;
});

txt += `\nTotal: R$ ${money(p.total)}`;

navigator.clipboard.writeText(txt);
alert("Copiado!");
}

// INIT
document.getElementById("buscaPedido").oninput = carregarPedidos;
carregarPedidos();

</script>

</body>
</html>
