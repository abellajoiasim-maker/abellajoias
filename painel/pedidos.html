<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Pedidos • Abella Joias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background:#0b0b0b; color:#eee; font-family: sans-serif; }
        .card { background:#141414; border:1px solid #2a2a2a; border-radius:12px; }
    </style>
</head>
<body class="p-6">

<div class="max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold text-[#caa85c] mb-6">Gestão de Pedidos</h1>
    <div class="card p-6 overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="text-gray-500 text-xs uppercase border-b border-gray-800">
                    <th class="pb-3">Cliente</th>
                    <th class="pb-3">Contato</th>
                    <th class="pb-3">Total</th>
                    <th class="pb-3">Ação</th>
                </tr>
            </thead>
            <tbody id="listaPedidos">
                <tr><td colspan="4" class="py-4 text-center">Carregando pedidos...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// AJUSTE CIRÚRGICO: Agora aponta para 'pedidos' conforme o seu Checkout
function carregarPedidos() {
    const listaPedidos = document.getElementById('listaPedidos');
    
    db.ref('pedidos').on('value', (snapshot) => {
        listaPedidos.innerHTML = ''; 
        const pedidos = snapshot.val();
        
        if (!pedidos) {
            listaPedidos.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-gray-500">Nenhum pedido recebido.</td></tr>';
            return;
        }

        Object.entries(pedidos).forEach(([id, p]) => {
            const tr = document.createElement('tr');
            tr.className = "border-b border-gray-800 hover:bg-[#1a1a1a]";
            tr.innerHTML = `
                <td class="py-4 font-bold">${p.cliente?.nome || 'Anônimo'}</td>
                <td class="py-4 text-sm text-gray-400">${p.cliente?.telefone || 'N/A'}</td>
                <td class="py-4 text-[#caa85c] font-mono">R$ ${parseFloat(p.total).toFixed(2)}</td>
                <td class="py-4">
                    <button onclick="verDetalhes('${id}')" class="text-xs bg-[#caa85c] text-black px-3 py-1 rounded font-bold uppercase">Detalhes</button>
                </td>
            `;
            listaPedidos.appendChild(tr);
        });
    });
}

function verDetalhes(id) {
    db.ref('pedidos/' + id).once('value').then(snap => {
        const p = snap.val();
        let itensMsg = p.itens.map(i => `${i.qtd}x ${i.nome}`).join('\n');
        alert(`CLIENTE: ${p.cliente.nome}\nENDEREÇO: ${p.cliente.endereco}\n\nITENS:\n${itensMsg}\n\nTOTAL: R$ ${p.total.toFixed(2)}`);
    });
}

window.onload = carregarPedidos;
</script>
</body>
</html>
