<script>

// 🔒 ANTI ERRO
window.onerror = (e)=>{ console.error(e); return true; };

const fMoeda = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);

let pedidosCache = {};
let pedidoEditando = null;

// 🔢 NUMERO COMPATÍVEL
function numeroPedido(p, id){
    if(p.numeroFormatado) return "#" + p.numeroFormatado;
    if(p.numero) return "#" + String(p.numero).padStart(5,'0');
    return "#LEG-" + id.slice(-5);
}

// 🔧 NORMALIZAR ITEM (ANTI-UNDEFINED)
function normalizarItem(i){
    return {
        nome: i.nome || i.name || i.produto || "Produto",
        qtd: i.qtd || i.quantidade || 1,
        preco: i.preco || i.price || i.valor || 0
    };
}

// 🔥 CALCULAR TOTAL (ANTIGO + NOVO)
function calcularTotal(p){

    if(p.total) return p.total;

    let total = 0;

    (p.itens || []).forEach(i=>{
        const item = normalizarItem(i);
        total += item.preco * item.qtd;
    });

    return total;
}

// 🔥 CARREGAR PEDIDOS (UPGRADE)
function carregarPedidos(){

    const busca = (document.getElementById("buscaPedido")?.value || "").toLowerCase();

    db.ref('orders').on('value', s => {

        pedidosCache = s.val() || {};
        const lista = document.getElementById('listaPedidos');

        lista.innerHTML = '';

        Object.entries(pedidosCache).reverse().forEach(([id,p]) => {

            const nome = (p.cliente?.nome || "").toLowerCase();
            const numero = numeroPedido(p,id).toLowerCase();

            if(busca && !nome.includes(busca) && !numero.includes(busca)) return;

            lista.innerHTML += `
            <div class="card border-l-4 border-[#caa85c] mb-2">

                <div class="flex justify-between items-start">

                    <div>
                        <b class="text-[#caa85c] uppercase text-sm">
                            ${numeroPedido(p,id)} • ${p.cliente?.nome || 'Cliente'}
                        </b><br>

                        <small class="text-gray-500">${p.cliente?.telefone || ''}</small><br>
                        <small class="text-[10px] text-gray-600">${p.status || 'novo'}</small>
                    </div>

                    <div class="text-right">
                        <div class="font-bold text-xs">
                            ${fMoeda(calcularTotal(p))}
                        </div>

                        <div class="flex gap-1 mt-2">
                            <button class="btn p-1" onclick="abrirEditorPedido('${id}')">EDITAR</button>
                            <button class="btn p-1 bg-red-900" onclick="excluirPedido('${id}')">🗑</button>
                        </div>
                    </div>

                </div>

                <div class="flex gap-2 mt-2">
                    <button onclick="mudarStatus('${id}','novo')" class="btn text-xs">Novo</button>
                    <button onclick="mudarStatus('${id}','enviado')" class="btn text-xs bg-blue-900">Enviado</button>
                    <button onclick="mudarStatus('${id}','entregue')" class="btn text-xs bg-green-900">Entregue</button>
                </div>

            </div>`;
        });

    });
}

// 🔥 STATUS
function mudarStatus(id, status){
    db.ref("orders/"+id+"/status").set(status);
}

// 🔥 EDITOR (AJUSTADO)
function abrirEditorPedido(id){

    pedidoEditando = id;

    db.ref('orders/'+id).once('value', s => {

        const p = s.val();

        document.getElementById('edClienteNome').value = p.cliente?.nome || '';
        document.getElementById('edClienteTel').value = p.cliente?.telefone || '';

        document.getElementById('edItens').innerHTML = '';

        const itens = Array.isArray(p.itens) ? p.itens : Object.values(p.itens || {});

        itens.forEach(i => {

            const item = normalizarItem(i);

            addItemEditor({
                name: item.nome,
                quantidade: item.qtd,
                price: item.preco
            });

        });

        recalcularTotalEd();

        document.getElementById('editorPedido').classList.remove('hidden');
    });
}

// 🔥 ADD ITEM (COMPATÍVEL)
function addItemEditor(i={}){

    const div = document.createElement('div');

    div.className = "card bg-black/40 border-[#222] mb-2 p-2";

    div.innerHTML = `
    <div class="grid grid-cols-3 gap-2">
        <input placeholder="Nome" value="${i.name||''}">
        <input type="number" placeholder="Preço" value="${i.price||0}" oninput="recalcularTotalEd()">
        <input type="number" placeholder="Qtd" value="${i.quantidade||1}" oninput="recalcularTotalEd()">
    </div>`;

    document.getElementById('edItens').appendChild(div);
}

// 🔥 RECALCULO
function recalcularTotalEd(){

    let total = 0;

    document.querySelectorAll('#edItens > div').forEach(div => {

        const inputs = div.querySelectorAll('input');

        const preco = Number(inputs[1].value);
        const qtd = Number(inputs[2].value);

        total += preco * qtd;
    });

    document.getElementById('totalPreview').innerText = fMoeda(total);
}

// 🔥 SALVAR
function salvarPedidoEditado(){

    const itens = [];

    document.querySelectorAll('#edItens > div').forEach(div => {

        const i = div.querySelectorAll('input');

        itens.push({
            name: i[0].value,
            price: +i[1].value,
            quantidade: +i[2].value
        });
    });

    db.ref('orders/'+pedidoEditando).update({
        cliente:{
            nome: document.getElementById('edClienteNome').value,
            telefone: document.getElementById('edClienteTel').value
        },
        itens,
        total: itens.reduce((t,i)=>t+(i.price*i.quantidade),0)
    }).then(()=>{
        alert("Pedido salvo!");
        fecharEditorPedido();
    });
}

// 🔥 EXCLUIR
function excluirPedido(id){
    if(confirm("Excluir pedido?")){
        db.ref('orders/'+id).remove();
    }
}

// 🔥 FECHAR
function fecharEditorPedido(){
    document.getElementById('editorPedido').classList.add('hidden');
}

// INIT
window.onload = carregarPedidos;

</script>
