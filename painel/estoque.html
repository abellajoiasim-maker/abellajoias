<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estoque • Abella Joias</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { background: #0b0b0b; color: #eee; font-family: 'Poppins', sans-serif; }
        .input-dark { background: #1a1a1a; border: 1px solid #333; color: white; padding: 6px; border-radius: 6px; width: 100%; font-size: 10px; transition: 0.3s; }
        .input-dark:focus { border-color: #caa85c; outline: none; background: #222; }
        .edit-sku { color: #caa85c; font-family: monospace; font-weight: bold; text-transform: uppercase; }
        tr.is-paused { opacity: 0.4; background: #2a1010 !important; }
        .btn-status { font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 4px; border-radius: 4px; cursor: pointer; width: 50px; text-align: center; }
        .status-on { background: #15803d; color: white; }
        .status-off { background: #b91c1c; color: white; }
        .sticky-header th { position: sticky; top: 0; background: #0b0b0b; z-index: 10; border-bottom: 2px solid #caa85c; padding: 10px; font-size: 9px; }
        .img-preview { width: 35px; height: 35px; object-fit: contain; background: #222; border-radius: 4px; border: 1px solid #444; margin-bottom: 2px; }
        .img-error { border-color: #ef4444; background: #451a1a; }
        .highlight-var { border: 1px solid #caa85c !important; background: #262116 !important; }
    </style>
</head>

<body class="p-2">

<!-- BOTÃO VOLTAR -->
<a href="index.html" style="font-size:11px;color:#caa85c;text-decoration:none;">← Voltar ao Dashboard</a>

<div class="max-w-[100%] mx-auto">

<header class="bg-[#141414] p-4 rounded-xl border border-[#2a2a2a] shadow-xl mb-4 flex flex-col xl:flex-row justify-between items-center gap-4">
    <div>
        <h1 class="text-xl font-bold text-[#caa85c]">Editor de Estoque</h1>
        <p class="text-[9px] text-gray-400 uppercase tracking-widest">Controle completo de produtos</p>
    </div>

    <div class="flex flex-wrap gap-2 justify-center">
    <button onclick="criarNovoProduto()" class="bg-white text-black font-black px-4 py-2 rounded-lg text-[10px]">+ NOVO</button>

    <select id="filtroCat" class="input-dark">
        <option value="">Categorias</option>
    </select>

    <input 
        id="filtroSku" 
        placeholder="SKU ou Nome..." 
        class="input-dark w-32"
        onkeypress="if(event.key === 'Enter') carregarProdutos()"
    >

    <button onclick="carregarProdutos()" class="bg-[#caa85c] text-black font-bold px-4 py-2 rounded-lg text-[10px]">
        BUSCAR
    </button>

    <button onclick="sincronizarFotosInteligente()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px]">
        AUTO-SYNC
    </button>
</div>
</header>

<div class="bg-[#141414] border border-[#2a2a2a] rounded-xl overflow-hidden">
<div class="overflow-x-auto" style="max-height: 75vh;">

<table class="w-full text-[10px]">
<thead class="sticky-header">
<tr class="text-[#caa85c] uppercase">
<th>Status</th>
<th>Imagem</th>
<th>SKU</th>
<th>Nome</th>
<th>Peso</th>
<th>Categoria</th>
<th>Variação</th>
<th>Opções</th>
<th>Preço</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaCorpo">
<tr><td colspan="10" class="p-10 text-center text-gray-500">Carregue produtos</td></tr>
</tbody>
</table>

</div>
</div>

<div class="mt-4 flex justify-between items-center bg-[#141414] p-4 rounded-xl border border-[#2a2a2a]">
<div id="statusInfo" class="text-[10px] text-gray-400">Pronto</div>

<button onclick="salvarAlteracoes()" class="bg-green-600 px-10 py-3 rounded-lg text-xs font-bold">
SALVAR TUDO
</button>
</div>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let categoriasCache = {};

async function carregarCategorias() {
    const snap = await db.ref('categories').once('value');
    categoriasCache = snap.val() || {};
    const el = document.getElementById('filtroCat');

    let html = '<option value="">Categorias</option>';
    Object.entries(categoriasCache).forEach(([id, c]) => {
        html += `<option value="${id}">${c.name}</option>`;
    });

    el.innerHTML = html;
}

function atualizarPreview(input) {
    const img = input.closest('td')?.querySelector('.row-img');
    if (!img) return;

    const url = input.value.trim();
    img.src = url || 'https://via.placeholder.com/40';
}

function criarLinhaHTML(id, p) {
    p = p || {};

    let catOptions = '';
    Object.entries(categoriasCache).forEach(([cid, cat]) => {
        catOptions += `<option value="${cid}" ${p.category === cid ? 'selected' : ''}>${cat.name}</option>`;
    });

    return `
<tr data-id="${id}" class="${p.paused ? 'is-paused' : ''}">
<td><button class="btn-status ${p.paused ? 'status-off':'status-on'}" onclick="toggleStatus(this)">${p.paused ? 'OFF':'ON'}</button></td>

<td>
<img src="${p.image || ''}" class="img-preview row-img">
<input class="input-dark edit-img" value="${p.image || ''}" onchange="atualizarPreview(this)">
</td>

<td><input class="input-dark edit-sku" value="${p.sku || ''}"></td>
<td><input class="input-dark edit-name" value="${p.name || ''}"></td>

<td><input class="input-dark edit-peso" value="${p.peso || 0}"></td>

<td><select class="input-dark edit-cat">${catOptions}</select></td>

<td>
<select class="input-dark edit-varTipo" onchange="liberarCampoLista(this)">
<option value="">Padrão</option>
<option value="Aro" ${p.variacaoTipo==='Aro'?'selected':''}>Aro</option>
<option value="Lista" ${p.variacaoTipo==='Lista'?'selected':''}>Lista</option>
</select>
</td>

<td><input class="input-dark edit-opcoes" value="${p.opcoesPersonalizadas || ''}"></td>

<td><input class="input-dark edit-precoFinal" type="number" value="${p.precoFinal || p.price || 0}"></td>

<td>
<button onclick="salvarLinhaUnica(this)">💾</button>
<button onclick="deletarProduto('${id}')">🗑️</button>
</td>
</tr>`;
}

function criarNovoProduto() {
    const ref = db.ref('products').push();
    const corpo = document.getElementById('tabelaCorpo');
    corpo.insertAdjacentHTML('afterbegin', criarLinhaHTML(ref.key, {}));
}

async function carregarProdutos() {
    const filtroTexto = document.getElementById('filtroSku').value.trim().toUpperCase();
    const filtroCat = document.getElementById('filtroCat').value;

    const corpo = document.getElementById('tabelaCorpo');
    corpo.innerHTML = '<tr><td colspan="10" class="p-10 text-center text-[#caa85c]">BUSCANDO...</td></tr>';

    db.ref('products').once('value', snapshot => {
        let html = '';
        let contador = 0;

        snapshot.forEach(child => {
            const p = child.val() || {};

            const sku = String(p.sku || "").toUpperCase();
            const nome = String(p.name || "").toUpperCase();

            if (
                (!filtroTexto || sku.includes(filtroTexto) || nome.includes(filtroTexto)) &&
                (!filtroCat || p.category === filtroCat)
            ) {
                contador++;
                html += criarLinhaHTML(child.key, p);
            }
        });

        corpo.innerHTML = html || '<tr><td colspan="10" class="p-10 text-center text-red-500">Nada encontrado</td></tr>';

        document.getElementById('statusInfo').innerText = `Total exibido: ${contador} produtos`;
    });
}

function salvarLinhaUnica(btn) {
    const tr = btn.closest('tr');
    const id = tr.dataset.id;

    const peso = tr.querySelector('.edit-peso').value.replace(',', '.');

    const data = {
        sku: tr.querySelector('.edit-sku').value.toUpperCase(),
        name: tr.querySelector('.edit-name').value,
        peso: peso,
        weight: parseFloat(peso) || 0,
        category: tr.querySelector('.edit-cat').value,
        variacaoTipo: tr.querySelector('.edit-varTipo').value,
        opcoesPersonalizadas: tr.querySelector('.edit-opcoes').value,
        precoFinal: parseFloat(tr.querySelector('.edit-precoFinal').value) || 0,
        price: parseFloat(tr.querySelector('.edit-precoFinal').value) || 0,
        image: tr.querySelector('.edit-img').value,
        paused: tr.querySelector('.btn-status').classList.contains('status-off')
    };

    db.ref('products/' + id).update(data);
}

function salvarAlteracoes() {
    document.querySelectorAll('#tabelaCorpo tr').forEach(tr => {
        const btn = tr.querySelector('button');
        if (btn) salvarLinhaUnica(btn);
    });
    alert("Salvo");
}

function toggleStatus(btn) {
    btn.classList.toggle('status-on');
    btn.classList.toggle('status-off');
    btn.innerText = btn.classList.contains('status-on') ? 'ON' : 'OFF';
}

function deletarProduto(id) {
    if (confirm("Excluir?")) {
        db.ref('products/' + id).remove();
    }
}

carregarCategorias();
</script>

</body>
</html>
