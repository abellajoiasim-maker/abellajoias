<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estoque • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <header class="p-5 text-center text-xl font-bold bg-black border-b border-[#222] text-[#caa85c] tracking-widest uppercase">
        Abella Joias • Gestão de Estoque
    </header>

    <nav class="flex gap-2 p-2 bg-[#111] sticky top-0 z-50 overflow-x-auto">
        <button class="btn active" onclick="showTab('empresa', this)">Empresa</button>
        <button class="btn" onclick="showTab('categorias', this)">Categorias</button>
        <button class="btn" onclick="showTab('produtos', this)">Produtos</button>
        <a href="pedidos.html" class="btn text-[#caa85c] ml-auto">Ver Pedidos ➔</a>
    </nav>

    <main class="p-6 max-w-4xl mx-auto">
        <section id="empresa" class="active">
            <div class="card space-y-3">
                <h2 class="text-[#caa85c] font-bold uppercase text-sm">Configuração da Loja</h2>
                <input id="empNome" placeholder="Nome da Empresa">
                <input id="empSub" placeholder="Slogan">
                <input id="empWhats" placeholder="WhatsApp">
                <div class="grid grid-cols-2 gap-2">
                    <input id="empDesc" type="number" placeholder="Desc Pix %">
                    <input id="empParc" type="number" placeholder="Parcelas Máx">
                </div>
                <button class="btn-gold w-full" onclick="salvarEmpresa()">SALVAR CONFIGURAÇÕES</button>
            </div>
        </section>

        <section id="categorias">
            <div class="card mb-4"><input id="newCatName" placeholder="Nova Categoria"><button class="btn-gold w-full" onclick="novaCategoria()">+ CADASTRAR</button></div>
            <div id="listaCategorias" class="grid gap-2"></div>
        </section>

        <section id="produtos"><div id="listaProdutos" class="grid gap-2"></div></section>
    </main>

    <script src="admin-logic.js"></script>
    <script>window.onload = () => carregarEmpresa();</script>
</body>
</html>
