<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estoque • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0b0b; color: #eee; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .btn { padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: bold; transition: 0.3s; background: #222; color: #888; text-transform: uppercase; }
        .btn.active { background: #caa85c; color: #000; }
        .btn-gold { background: #caa85c; color: #000; font-weight: 800; border-radius: 8px; padding: 12px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-gold:hover { opacity: 0.8; transform: scale(0.99); }
        input, select { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 8px !important; padding: 10px !important; width: 100%; outline: none; font-size: 13px; }
        input:focus { border-color: #caa85c !important; }
        section { display: none; }
        section.active { display: block; }
        label { font-size: 10px; color: #666; font-weight: bold; text-transform: uppercase; margin-top: 8px; display: block; }
    </style>
</head>
<body>

    <header class="p-5 text-center bg-black border-b border-[#222]">
        <h1 class="serif gold-text text-lg tracking-[4px] uppercase">Abella Joias • Gestão</h1>
    </header>

    <nav class="flex gap-2 p-2 bg-[#111] sticky top-0 z-50 overflow-x-auto border-b border-[#222]">
        <button class="btn active" onclick="showTab('empresa', this)">Empresa</button>
        <button class="btn" onclick="showTab('categorias', this)">Categorias</button>
        <button class="btn" onclick="showTab('produtos', this)">Produtos</button>
        <a href="pedidos.html" class="btn text-[#caa85c] ml-auto">Pedidos ➔</a>
    </nav>

    <main class="p-6 max-w-4xl mx-auto">
        
        <section id="empresa" class="active">
            <div class="card space-y-3">
                <h2 class="serif gold-text text-xs uppercase mb-4">Configuração da Loja</h2>
                <div><label>Nome da Marca</label><input id="empNome"></div>
                <div><label>Slogan / Subtítulo</label><input id="empSub"></div>
                <div><label>WhatsApp (Link Direto)</label><input id="empWhats"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label>Desconto Pix (%)</label><input id="empDesc" type="number"></div>
                    <div><label>Parcelas Máximas</label><input id="empParc" type="number"></div>
                </div>
                <button class="btn-gold w-full mt-4" onclick="salvarEmpresa()">SALVAR ALTERAÇÕES</button>
            </div>
        </section>

        <section id="categorias">
            <div class="card space-y-3">
                <h2 class="serif gold-text text-xs uppercase">Nova Categoria</h2>
                <div class="flex gap-2">
                    <input id="newCatName" placeholder="Nome da Categoria (Ex: Anéis)">
                    <button class="btn-gold px-6" onclick="novaCategoria()">+</button>
                </div>
            </div>
            <div id="listaCategorias" class="grid gap-2"></div>
        </section>

        <section id="produtos">
            <div class="card mb-6 border-l-4 border-[#caa85c]">
                <h2 class="serif gold-text text-xs uppercase mb-4">Cadastrar Novo Produto</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div><label>Nome do Produto</label><input id="pNome"></div>
                    <div><label>SKU / Referência</label><input id="pSKU"></div>
                    <div><label>URL da Imagem</label><input id="pFoto"></div>
                    <div><label>Categoria</label><select id="pCat"></select></div>
                    <div><label>Preço Cheio (R$)</label><input id="pPreco" type="number" step="0.01"></div>
                    <div><label>Peso (gramas)</label><input id="pPeso" type="number" step="0.01"></div>
                </div>
                <button class="btn-gold w-full mt-6" onclick="novoProduto()">ADICIONAR AO ESTOQUE</button>
            </div>
            
            <h3 class="serif text-[10px] gold-text mb-4 tracking-widest uppercase text-center">Produtos em Linha</h3>
            <div id="listaProdutos" class="grid gap-3"></div>
        </section>

    </main>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
            databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // NAVEGAÇÃO ENTRE ABAS
        function showTab(tabId, btn) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav .btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            if(tabId === 'produtos') carregarSelectCategorias();
        }

        // GESTÃO DA EMPRESA
        function carregarEmpresa() {
            db.ref('settings/empresa').on('value', snap => {
                const d = snap.val() || {};
                document.getElementById('empNome').value = d.nome || '';
                document.getElementById('empSub').value = d.sub || '';
                document.getElementById('empWhats').value = d.whats || '';
                document.getElementById('empDesc').value = d.pixDesc || 5;
                document.getElementById('empParc').value = d.parcelas || 3;
            });
            carregarCategorias();
            carregarProdutos();
        }

        function salvarEmpresa() {
            db.ref('settings/empresa').update({
                nome: document.getElementById('empNome').value,
                sub: document.getElementById('empSub').value,
                whats: document.getElementById('empWhats').value,
                pixDesc: document.getElementById('empDesc').value,
                parcelas: document.getElementById('empParc').value
            }).then(() => alert("Configurações salvas!"));
        }

        // GESTÃO DE CATEGORIAS
        function novaCategoria() {
            const nome = document.getElementById('newCatName').value;
            if(!nome) return;
            db.ref('categorias').push({ nome }).then(() => {
                document.getElementById('newCatName').value = '';
            });
        }

        function carregarCategorias() {
            db.ref('categorias').on('value', snap => {
                const list = document.getElementById('listaCategorias');
                list.innerHTML = '';
                snap.forEach(item => {
                    list.innerHTML += `
                        <div class="card flex justify-between items-center py-2">
                            <span class="font-bold text-sm uppercase">${item.val().nome}</span>
                            <button onclick="removerItem('categorias/${item.key}')" class="text-red-500 text-xs">Excluir</button>
                        </div>`;
                });
            });
        }

        // GESTÃO DE PRODUTOS
        function carregarSelectCategorias() {
            db.ref('categorias').once('value', snap => {
                const sel = document.getElementById('pCat');
                sel.innerHTML = '<option value="">Escolha...</option>';
                snap.forEach(item => {
                    sel.innerHTML += `<option value="${item.val().nome}">${item.val().nome}</option>`;
                });
            });
        }

        function novoProduto() {
            const dados = {
                name: document.getElementById('pNome').value,
                sku: document.getElementById('pSKU').value,
                foto: document.getElementById('pFoto').value,
                category: document.getElementById('pCat').value,
                price: parseFloat(document.getElementById('pPreco').value),
                weight: parseFloat(document.getElementById('pPeso').value)
            };
            if(!dados.name || !dados.price) return alert("Nome e Preço são obrigatórios!");
            db.ref('produtos').push(dados).then(() => {
                alert("Produto cadastrado!");
                document.querySelectorAll('#produtos input').forEach(i => i.value = '');
            });
        }

        function carregarProdutos() {
            db.ref('produtos').on('value', snap => {
                const list = document.getElementById('listaProdutos');
                list.innerHTML = '';
                snap.forEach(item => {
                    const p = item.val();
                    list.innerHTML += `
                        <div class="card flex gap-4 items-center">
                            <img src="${p.foto}" class="w-12 h-12 object-cover rounded bg-black">
                            <div class="flex-1">
                                <p class="text-[10px] gold-text font-bold uppercase">${p.sku || 'S/ SKU'}</p>
                                <h4 class="text-xs font-bold uppercase">${p.name}</h4>
                                <p class="text-[10px] text-gray-500">R$ ${p.price.toFixed(2)} | ${p.weight}g</p>
                            </div>
                            <button onclick="removerItem('produtos/${item.key}')" class="text-red-900 font-bold p-2 text-xs">✕</button>
                        </div>`;
                });
            });
        }

        function removerItem(path) {
            if(confirm("Deseja realmente excluir?")) db.ref(path).remove();
        }

        window.onload = carregarEmpresa;
    </script>
</body>
</html>
