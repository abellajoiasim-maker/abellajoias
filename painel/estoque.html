<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0b0b; color: #eee; margin:0; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .btn { padding: 10px 18px; border-radius: 8px; font-size: 11px; font-weight: bold; transition: 0.3s; background: #1a1a1a; color: #666; text-transform: uppercase; border: 1px solid #333; }
        .btn.active { background: #caa85c; color: #000; border-color: #caa85c; }
        .btn-gold { background: #caa85c; color: #000; font-weight: 800; border-radius: 8px; padding: 12px; text-transform: uppercase; width: 100%; transition: 0.3s; margin-top: 10px; }
        input, select { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 8px !important; padding: 10px !important; width: 100%; outline: none; font-size: 13px; margin-bottom: 10px; }
        section { display: none; padding: 20px; max-width: 800px; margin: auto; }
        section.active { display: block; }
        label { font-size: 10px; color: #555; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .loader { color: #caa85c; font-size: 11px; text-align: center; padding: 20px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header class="p-5 text-center bg-black border-b border-[#222]">
        <h1 class="serif gold-text text-sm tracking-[4px] uppercase">Abella Joias • Administração</h1>
    </header>

    <nav class="flex gap-2 p-2 bg-[#111] sticky top-0 z-50 overflow-x-auto border-b border-[#222] justify-center">
        <button class="btn active" onclick="showTab('tab-loja', this)">Loja</button>
        <button class="btn" onclick="showTab('tab-categorias', this)">Categorias</button>
        <button class="btn" onclick="showTab('tab-produtos', this)">Produtos</button>
    </nav>

    <section id="tab-loja" class="active">
        <div class="card">
            <h2 class="serif gold-text text-[10px] mb-4 uppercase tracking-widest">Configuração da Empresa</h2>
            <div id="formLoja">
                <label>Nome Comercial da Marca</label>
                <input id="confNome" placeholder="Ex: Abella Joias">
                
                <label>Slogan ou Subtítulo</label>
                <input id="confSub" placeholder="Ex: Joias em Ouro e Prata">
                
                <label>WhatsApp (Somente números)</label>
                <input id="confWhats" placeholder="5519988207658">
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label>Desconto Pix (%)</label>
                        <input id="confPix" type="number" placeholder="5">
                    </div>
                    <div>
                        <label>Parcelas Máximas</label>
                        <input id="confParc" type="number" placeholder="3">
                    </div>
                </div>
                <button class="btn-gold" onclick="saveLoja()">Atualizar Configurações</button>
            </div>
        </div>
    </section>

    <section id="tab-categorias">
        <div class="card">
            <h2 class="serif gold-text text-[10px] mb-4 uppercase tracking-widest">Cadastrar Categoria</h2>
            <input id="newCat" placeholder="Ex: Anéis, Pulseiras, Colares">
            <button class="btn-gold" onclick="addCategoria()">Salvar Nova Categoria</button>
        </div>
        <div id="listaCategorias" class="grid gap-2 mt-4">
            <p class="loader">Carregando categorias...</p>
        </div>
    </section>

    <section id="tab-produtos">
        <div class="card border-l-4 border-[#caa85c]">
            <h2 class="serif gold-text text-[10px] mb-4 uppercase tracking-widest">Novo Produto no Estoque</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                <div><label>Nome do Produto</label><input id="pNome"></div>
                <div><label>Referência (SKU)</label><input id="pSKU"></div>
                <div><label>Link da Imagem (URL)</label><input id="pFoto"></div>
                <div><label>Categoria</label><select id="pCat"></select></div>
                <div><label>Preço de Venda (R$)</label><input id="pPreco" type="number" step="0.01"></div>
                <div><label>Peso do Item (g)</label><input id="pPeso" type="number" step="0.01"></div>
            </div>
            <button class="btn-gold" onclick="addProduto()">Adicionar ao Catálogo</button>
        </div>
        <div id="listaProdutos" class="grid gap-3 mt-6">
            <p class="loader">Carregando estoque...</p>
        </div>
    </section>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
        databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Controle de Abas
    function showTab(id, btn) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav .btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        
        // Carregamento sob demanda para velocidade
        if(id === 'tab-categorias') renderCategorias();
        if(id === 'tab-produtos') renderProdutos();
    }

    // Inicialização
    function init() {
        // Carrega dados da loja
        db.ref('settings/empresa').once('value', snap => {
            const d = snap.val() || {};
            document.getElementById('confNome').value = d.nome || '';
            document.getElementById('confSub').value = d.sub || '';
            document.getElementById('confWhats').value = d.whats || '';
            document.getElementById('confPix').value = d.pixDesc || 5;
            document.getElementById('confParc').value = d.parcelas || 3;
        });
        // Prepara categorias para o select do produto
        updateSelectCategorias();
    }

    // --- LÓGICA DA LOJA ---
    function saveLoja() {
        db.ref('settings/empresa').update({
            nome: document.getElementById('confNome').value,
            sub: document.getElementById('confSub').value,
            whats: document.getElementById('confWhats').value,
            pixDesc: document.getElementById('confPix').value,
            parcelas: document.getElementById('confParc').value
        }).then(() => alert("Configurações da Loja atualizadas!"));
    }

    // --- LÓGICA DE CATEGORIAS ---
    function renderCategorias() {
        const list = document.getElementById('listaCategorias');
        db.ref('categories').once('value', snap => {
            list.innerHTML = '';
            if(!snap.exists()) { list.innerHTML = '<p class="text-center text-xs text-gray-600 uppercase">Nenhuma categoria.</p>'; return; }
            snap.forEach(item => {
                const c = item.val();
                const nome = typeof c === 'object' ? (c.name || c.nome) : c;
                list.innerHTML += `
                    <div class="card flex justify-between py-2 items-center">
                        <span class="text-xs font-bold uppercase tracking-wider">${nome}</span>
                        <button onclick="deleteItem('categories/${item.key}', 'cat')" class="text-red-500 text-[10px] font-bold">EXCLUIR</button>
                    </div>`;
            });
            updateSelectCategorias();
        });
    }

    function addCategoria() {
        const nome = document.getElementById('newCat').value;
        if(!nome) return;
        db.ref('categories').push({ name: nome }).then(() => {
            document.getElementById('newCat').value = '';
            renderCategorias();
        });
    }

    function updateSelectCategorias() {
        const select = document.getElementById('pCat');
        db.ref('categories').once('value', snap => {
            select.innerHTML = '<option value="">Selecione...</option>';
            snap.forEach(item => {
                const c = item.val();
                const nome = typeof c === 'object' ? (c.name || c.nome) : c;
                select.innerHTML += `<option value="${nome}">${nome}</option>`;
            });
        });
    }

    // --- LÓGICA DE PRODUTOS ---
    function renderProdutos() {
        const list = document.getElementById('listaProdutos');
        db.ref('products').once('value', snap => {
            list.innerHTML = '';
            if(!snap.exists()) { list.innerHTML = '<p class="text-center text-xs text-gray-600 uppercase">Estoque vazio.</p>'; return; }
            snap.forEach(item => {
                const p = item.val();
                const img = p.foto || p.image || 'https://via.placeholder.com/50';
                list.innerHTML += `
                    <div class="card flex gap-4 items-center">
                        <img src="${img}" class="w-12 h-12 object-cover rounded bg-black border border-[#222]" loading="lazy">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-[11px] font-bold uppercase truncate">${p.name || p.nome}</h4>
                            <p class="text-[9px] text-gray-500 uppercase tracking-tighter">
                                ${p.category} | R$ ${Number(p.price || 0).toFixed(2)} | ${p.weight || 0}g
                            </p>
                        </div>
                        <button onclick="deleteItem('products/${item.key}', 'prod')" class="text-red-900 font-bold p-2 text-xs">✕</button>
                    </div>`;
            });
        });
    }

    function addProduto() {
        const p = {
            name: document.getElementById('pNome').value,
            sku: document.getElementById('pSKU').value,
            foto: document.getElementById('pFoto').value,
            category: document.getElementById('pCat').value,
            price: parseFloat(document.getElementById('pPreco').value || 0),
            weight: parseFloat(document.getElementById('pPeso').value || 0)
        };
        if(!p.name || !p.price) return alert("Nome e Preço são obrigatórios!");
        db.ref('products').push(p).then(() => {
            alert("Produto cadastrado com sucesso!");
            renderProdutos();
            // Limpa campos
            document.querySelectorAll('#tab-produtos input').forEach(i => i.value = '');
        });
    }

    // --- UTILITÁRIOS ---
    function deleteItem(path, type) {
        if(confirm("Deseja apagar permanentemente?")) {
            db.ref(path).remove().then(() => {
                if(type === 'prod') renderProdutos();
                else renderCategorias();
            });
        }
    }

    window.onload = init;
</script>
</body>
</html>
