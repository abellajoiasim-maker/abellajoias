<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0b0b; color: #eee; margin:0; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .btn { padding: 10px 18px; border-radius: 8px; font-size: 11px; font-weight: bold; transition: 0.3s; background: #1a1a1a; color: #666; text-transform: uppercase; border: 1px solid #333; }
        .btn.active { background: #caa85c; color: #000; border-color: #caa85c; }
        .btn-gold { background: #caa85c; color: #000; font-weight: 800; border-radius: 8px; padding: 12px; text-transform: uppercase; width: 100%; transition: 0.3s; }
        input, select { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 8px !important; padding: 10px !important; width: 100%; outline: none; font-size: 13px; margin-bottom: 10px; }
        section { display: none; padding: 20px; max-width: 800px; margin: auto; }
        section.active { display: block; }
        label { font-size: 10px; color: #555; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <header class="p-5 text-center bg-black border-b border-[#222]">
        <h1 class="serif gold-text text-sm tracking-[4px] uppercase">Abella Joias • Painel de Controle</h1>
    </header>

    <nav class="flex gap-2 p-2 bg-[#111] sticky top-0 z-50 overflow-x-auto border-b border-[#222] justify-center">
        <button class="btn active" onclick="showTab('tab-produtos', this)">Produtos</button>
        <button class="btn" onclick="showTab('tab-categorias', this)">Categorias</button>
        <button class="btn" onclick="showTab('tab-empresa', this)">Loja</button>
    </nav>

    <section id="tab-produtos" class="active">
        <div class="card border-l-4 border-[#caa85c]">
            <h2 class="serif gold-text text-[10px] mb-4 uppercase">Novo Produto</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                <div><label>Nome</label><input id="pNome"></div>
                <div><label>Referência (SKU)</label><input id="pSKU"></div>
                <div><label>Imagem (URL)</label><input id="pFoto"></div>
                <div><label>Categoria</label><select id="pCat"></select></div>
                <div><label>Preço Cheio (R$)</label><input id="pPreco" type="number" step="0.01"></div>
                <div><label>Peso (g)</label><input id="pPeso" type="number" step="0.01"></div>
            </div>
            <button class="btn-gold" onclick="addProduto()">Cadastrar Produto</button>
        </div>
        <div id="listaProdutos" class="grid gap-3 mt-6"></div>
    </section>

    <section id="tab-categorias">
        <div class="card">
            <h2 class="serif gold-text text-[10px] mb-4 uppercase">Adicionar Categoria</h2>
            <input id="newCat" placeholder="Nome da Categoria">
            <button class="btn-gold" onclick="addCategoria()">Salvar Categoria</button>
        </div>
        <div id="listaCategorias" class="grid gap-2"></div>
    </section>

    <section id="tab-empresa">
        <div class="card">
            <h2 class="serif gold-text text-[10px] mb-4 uppercase">Dados da Empresa</h2>
            <div id="formEmpresa">
                <label>Nome Comercial</label><input id="confNome">
                <label>WhatsApp</label><input id="confWhats">
                <label>Pix Desconto (%)</label><input id="confPix" type="number">
                <button class="btn-gold" onclick="saveEmpresa()">Atualizar Empresa</button>
            </div>
        </div>
    </section>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
        databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Cache local para evitar múltiplas requisições
    let categoriasCache = [];

    function showTab(id, btn) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav .btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        
        // Só carrega os dados específicos da aba quando ela é clicada
        if(id === 'tab-produtos') renderProdutos();
        if(id === 'tab-categorias') renderCategorias();
    }

    async function init() {
        // Carrega o básico primeiro (Empresa e Categorias para o Select)
        renderCategorias();
        
        db.ref('settings/empresa').once('value', snap => {
            const d = snap.val() || {};
            document.getElementById('confNome').value = d.nome || '';
            document.getElementById('confWhats').value = d.whats || '';
            document.getElementById('confPix').value = d.pixDesc || 5;
        });

        // Carrega produtos por último para não travar o início
        renderProdutos();
    }

    function renderProdutos() {
        const list = document.getElementById('listaProdutos');
        list.innerHTML = '<p class="text-center text-xs gold-text animate-pulse">Carregando estoque...</p>';
        
        db.ref('products').once('value', snap => {
            list.innerHTML = '';
            if(!snap.exists()) {
                list.innerHTML = '<p class="text-center text-xs text-gray-500">Nenhum produto encontrado.</p>';
                return;
            }
            snap.forEach(item => {
                const p = item.val();
                const img = p.foto || p.image || 'https://via.placeholder.com/50';
                list.innerHTML += `
                    <div class="card flex gap-4 items-center">
                        <img src="${img}" class="w-12 h-12 object-cover rounded bg-black border border-[#222]" loading="lazy">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-[11px] font-bold uppercase truncate">${p.name || p.nome}</h4>
                            <p class="text-[9px] text-gray-500">${p.category || 'Sem Cat.'} | R$ ${Number(p.price || 0).toFixed(2)}</p>
                        </div>
                        <button onclick="deleteItem('products/${item.key}')" class="text-red-900 font-bold p-2 text-xs">✕</button>
                    </div>`;
            });
        });
    }

    function renderCategorias() {
        const list = document.getElementById('listaCategorias');
        const select = document.getElementById('pCat');
        
        db.ref('categories').once('value', snap => {
            list.innerHTML = '';
            select.innerHTML = '<option value="">Selecione...</option>';
            snap.forEach(item => {
                const raw = item.val();
                const catNome = (typeof raw === 'object') ? (raw.name || raw.nome) : raw;
                
                list.innerHTML += `
                    <div class="card flex justify-between py-2 items-center">
                        <span class="text-xs font-bold uppercase">${catNome}</span>
                        <button onclick="deleteItem('categories/${item.key}')" class="text-red-500 text-[10px]">Excluir</button>
                    </div>`;
                select.innerHTML += `<option value="${catNome}">${catNome}</option>`;
            });
        });
    }

    // Ações de Salvar e Deletar permanecem iguais (apenas mudei para recarregar a renderização após a ação)
    function addProduto() {
        const p = {
            name: document.getElementById('pNome').value,
            sku: document.getElementById('pSKU').value,
            foto: document.getElementById('pFoto').value,
            category: document.getElementById('pCat').value,
            price: parseFloat(document.getElementById('pPreco').value || 0),
            weight: parseFloat(document.getElementById('pPeso').value || 0)
        };
        if(!p.name) return alert("Nome é obrigatório");
        db.ref('products').push(p).then(() => {
            alert("Produto salvo!");
            renderProdutos();
        });
    }

    function addCategoria() {
        const nome = document.getElementById('newCat').value;
        if(!nome) return;
        db.ref('categories').push({ name: nome }).then(() => {
            document.getElementById('newCat').value = '';
            renderCategorias();
        });
    }

    function deleteItem(path) {
        if(confirm("Deseja apagar este item?")) {
            db.ref(path).remove().then(() => {
                if(path.includes('products')) renderProdutos();
                else renderCategorias();
            });
        }
    }

    window.onload = init;
</script>
</body>
</html>
