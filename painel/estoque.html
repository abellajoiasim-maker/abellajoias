<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estoque • Abella Joias</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body { background:#0b0b0b; color:#eee; font-family:'Poppins'; }
.input-dark { background:#1a1a1a;border:1px solid #333;color:white;padding:6px;border-radius:6px;width:100%;font-size:10px;}
.edit-sku { color:#caa85c;font-family:monospace;font-weight:bold;text-transform:uppercase;}
tr.is-paused { opacity:0.4;background:#2a1010!important;}
.btn-status { font-size:9px;font-weight:800;padding:4px;border-radius:4px;width:50px;}
.status-on { background:#15803d;color:white;}
.status-off { background:#b91c1c;color:white;}
.img-preview { width:35px;height:35px;object-fit:contain;background:#222;border-radius:4px;border:1px solid #444;}
</style>
</head>

<body class="p-2">

<a href="index.html" class="text-[11px] text-[#caa85c]">← Voltar</a>

<div class="max-w-full mx-auto">

<header class="bg-[#141414] p-4 rounded-xl border border-[#2a2a2a] mb-4 flex flex-wrap gap-2 justify-between items-center">

<div>
<h1 class="text-xl text-[#caa85c] font-bold">Editor de Estoque</h1>
<p class="text-[9px] text-gray-400 uppercase">Controle completo</p>
</div>

<div class="flex gap-2 flex-wrap">
<button onclick="criarNovoProduto()" class="bg-white text-black px-4 py-2 text-[10px] font-bold">+ NOVO</button>

<select id="filtroCat" class="input-dark"></select>

<input id="filtroSku" class="input-dark w-32" placeholder="SKU ou Nome..." 
onkeypress="if(event.key==='Enter')carregarProdutos()">

<button onclick="carregarProdutos()" class="bg-[#caa85c] px-4 py-2 text-[10px] font-bold">BUSCAR</button>

<button onclick="sincronizarFotosInteligente()" class="bg-blue-600 text-white px-4 py-2 text-[10px]">AUTO-SYNC</button>
</div>

</header>

<div class="bg-[#141414] rounded-xl border border-[#2a2a2a] overflow-hidden">
<div class="overflow-x-auto" style="max-height:75vh">

<table class="w-full text-[10px]">
<thead>
<tr class="text-[#caa85c] uppercase">
<th>Status</th><th>Imagem</th><th>SKU</th><th>Nome</th>
<th>Peso</th><th>Categoria</th><th>Variação</th><th>Opções</th>
<th>Preço</th><th>Ações</th>
</tr>
</thead>

<tbody id="tabelaCorpo"></tbody>
</table>

</div>
</div>

<div class="mt-4 flex justify-between bg-[#141414] p-4 rounded-xl border">
<div id="statusInfo" class="text-[10px] text-gray-400">Pronto</div>
<button onclick="salvarAlteracoes()" class="bg-green-600 px-10 py-3 text-xs font-bold">SALVAR TUDO</button>
</div>

</div>

<script>

// 🔒 ANTI-ERRO GLOBAL
window.onerror = function(msg){ console.error(msg); return true; };

const firebaseConfig={
apiKey:"AIzaSyDP...",
databaseURL:"https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

// 🔒 FIREBASE SEGURO
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// 🔒 HELPERS
const safe = el => el || {};
const num = v => parseFloat(v)||0;

let categoriasCache={};

// 🔥 CARREGAR CATEGORIAS
async function carregarCategorias(){
try{
const snap=await db.ref('categories').once('value');
categoriasCache=snap.val()||{};
let html='<option value="">Categorias</option>';
Object.entries(categoriasCache).forEach(([id,c])=>{
html+=`<option value="${id}">${c.name}</option>`;
});
document.getElementById('filtroCat').innerHTML=html;
}catch(e){ console.error(e); }
}

// 🔥 PREVIEW
function atualizarPreview(input){
const img=input.closest('td')?.querySelector('.row-img');
if(img) img.src=input.value||'https://via.placeholder.com/40';
}

// 🔥 CRIAR LINHA
function criarLinhaHTML(id,p={}){
const peso = num(p.peso ?? p.weight);

let catOptions='';
Object.entries(categoriasCache).forEach(([cid,cat])=>{
catOptions+=`<option value="${cid}" ${p.category===cid?'selected':''}>${cat.name}</option>`;
});

return `
<tr data-id="${id}" class="${p.paused?'is-paused':''}">
<td><button class="btn-status ${p.paused?'status-off':'status-on'}" onclick="toggleStatus(this)">${p.paused?'OFF':'ON'}</button></td>
<td>
<img src="${p.image||''}" class="img-preview row-img">
<input class="input-dark edit-img" value="${p.image||''}" onchange="atualizarPreview(this)">
</td>
<td><input class="input-dark edit-sku" value="${p.sku||''}"></td>
<td><input class="input-dark edit-name" value="${p.name||''}"></td>
<td><input class="input-dark edit-peso" value="${peso.toFixed(2)}"></td>
<td><select class="input-dark edit-cat">${catOptions}</select></td>
<td>
<select class="input-dark edit-varTipo" onchange="liberarCampoLista(this)">
<option value="">Padrão</option>
<option value="Aro" ${p.variacaoTipo==='Aro'?'selected':''}>Aro</option>
<option value="Lista" ${p.variacaoTipo==='Lista'?'selected':''}>Lista</option>
</select>
</td>
<td><input class="input-dark edit-opcoes" value="${p.opcoesPersonalizadas||''}"></td>
<td><input class="input-dark edit-precoFinal" type="number" value="${p.precoFinal||p.price||0}"></td>
<td>
<button onclick="salvarLinhaUnica(this)">💾</button>
<button onclick="deletarProduto('${id}')">🗑️</button>
</td>
</tr>`;
}

// 🔥 NOVO PRODUTO
function criarNovoProduto(){
const ref=db.ref('products').push();
document.getElementById('tabelaCorpo').insertAdjacentHTML('afterbegin',criarLinhaHTML(ref.key,{}));
}

// 🔥 CARREGAR PRODUTOS
function carregarProdutos(){
const filtroTexto=(document.getElementById('filtroSku').value||'').toUpperCase();
const filtroCatVal=document.getElementById('filtroCat').value;

const tabela=document.getElementById('tabelaCorpo');
tabela.innerHTML='<tr><td colspan="10">Carregando...</td></tr>';

db.ref('products').once('value',snap=>{
let html='',count=0;

snap.forEach(child=>{
const p=child.val()||{};
const sku=(p.sku||'').toUpperCase();
const nome=(p.name||'').toUpperCase();

if((!filtroTexto||sku.includes(filtroTexto)||nome.includes(filtroTexto)) &&
(!filtroCatVal||p.category===filtroCatVal)){
count++;
html+=criarLinhaHTML(child.key,p);
}
});

tabela.innerHTML=html||'<tr><td colspan="10">Nada encontrado</td></tr>';
document.getElementById('statusInfo').innerText=`${count} produtos`;
});
}

// 🔥 SALVAR LINHA
function salvarLinhaUnica(btn){
try{
const tr=btn.closest('tr');
const id=tr.dataset.id;

const peso=num(tr.querySelector('.edit-peso').value);
const preco=num(tr.querySelector('.edit-precoFinal').value);

const data={
sku:(tr.querySelector('.edit-sku').value||'').toUpperCase().trim(),
name:tr.querySelector('.edit-name').value.trim(),
peso:peso,
weight:peso,
category:tr.querySelector('.edit-cat').value,
variacaoTipo:tr.querySelector('.edit-varTipo').value,
opcoesPersonalizadas:tr.querySelector('.edit-opcoes').value,
precoFinal:preco,
price:preco,
image:tr.querySelector('.edit-img').value.trim(),
paused:tr.querySelector('.btn-status').classList.contains('status-off')
};

db.ref('products/'+id).update(data);

}catch(e){ console.error(e); }
}

// 🔥 SALVAR TUDO
function salvarAlteracoes(){
document.querySelectorAll('#tabelaCorpo tr').forEach(tr=>{
const btn=tr.querySelector('button');
if(btn) salvarLinhaUnica(btn);
});
alert("Salvo com sucesso");
}

// 🔥 STATUS
function toggleStatus(btn){
btn.classList.toggle('status-on');
btn.classList.toggle('status-off');
btn.innerText=btn.classList.contains('status-on')?'ON':'OFF';
btn.closest('tr').classList.toggle('is-paused');
}

// 🔥 DELETE
function deletarProduto(id){
if(confirm("Excluir produto?")) db.ref('products/'+id).remove().then(carregarProdutos);
}

// 🔥 FUNÇÃO QUE NÃO EXISTIA (BUG CRÍTICO)
function liberarCampoLista(select){
const tr = select.closest('tr');
if(!tr) return;

const input = tr.querySelector('.edit-opcoes');
if(!input) return;

if(select.value === "Lista"){
input.removeAttribute('disabled');
}else{
input.setAttribute('disabled', true);
input.value = '';
}
}

// 🔥 FUNÇÃO QUE NÃO EXISTIA (BUG CRÍTICO)
function sincronizarFotosInteligente(){
alert("Função em desenvolvimento");
}

// INIT
carregarCategorias();

</script>

</body>
</html>
