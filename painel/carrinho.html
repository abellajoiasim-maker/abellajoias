<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Carrinho • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; padding: 20px; }
        .card { background: #141414; border-radius: 15px; border: 1px solid #2a2a2a; padding: 15px; margin-bottom: 15px; }
        .gold-text { color: #caa85c; }
        .btn-pay { border: 1px solid #333; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; }
        .btn-pay.active { border-color: #caa85c; background: #caa85c22; }
    </style>
</head>
<body>

<h1 class="text-center gold-text font-bold uppercase mb-6 tracking-widest">Seu Carrinho</h1>

<div id="listaItens"></div>

<div class="card">
    <input type="text" id="nomeCliente" class="bg-black w-full p-3 rounded mb-2 border border-[#333]" placeholder="Seu Nome">
    <input type="text" id="telCliente" class="bg-black w-full p-3 rounded border border-[#333]" placeholder="WhatsApp">
</div>

<div class="card">
    <h3 class="text-xs font-bold gold-text mb-3 uppercase">Pagamento</h3>
    <div class="grid grid-cols-2 gap-2">
        <div id="pay-pix" onclick="setPag('pix')" class="btn-pay text-xs">PIX</div>
        <div id="pay-cart" onclick="setPag('cartao')" class="btn-pay text-xs">CARTÃO</div>
    </div>
</div>

<div class="card">
    <div class="flex justify-between text-xs mb-1"><span>Subtotal:</span><span id="subtotalTxt">R$ 0,00</span></div>
    <div id="boxDesc" class="flex justify-between text-xs text-green-500 hidden"><span>Desconto Atacado:</span><span id="descTxt">- R$ 0,00</span></div>
    <div class="flex justify-between font-bold text-lg mt-2 border-t border-[#333] pt-2"><span>Total:</span><span id="totalTxt" class="gold-text">R$ 0,00</span></div>
</div>

<button onclick="finalizar()" class="w-full bg-[#caa85c] text-black font-bold py-4 rounded-xl uppercase text-xs">Finalizar Pedido</button>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let pag = '', config = {}, promo = null;
const fM = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

window.onload = async () => {
    const sG = await db.ref('settings/general').once('value'); config = sG.val() || {};
    const sP = await db.ref('settings/promocoesValor').once('value'); promo = sP.val();
    render(); calc();
};

function render() {
    const list = document.getElementById('listaItens');
    list.innerHTML = carrinho.map((item, idx) => `
        <div class="card flex justify-between items-center">
            <div class="flex gap-3 items-center">
                <img src="${item.image}" class="w-12 h-12 rounded">
                <div>
                    <p class="text-[10px] font-bold uppercase">${item.name}</p>
                    <p class="gold-text text-xs">${fM(item.price)}</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="qtd(${idx},-1)">-</button>
                <span class="text-xs">${item.qnt}</span>
                <button onclick="qtd(${idx},1)">+</button>
            </div>
        </div>
    `).join('');
}

function qtd(idx, v) { 
    carrinho[idx].qnt = Math.max(1, carrinho[idx].qnt + v); 
    localStorage.setItem('carrinho', JSON.stringify(carrinho)); 
    render(); calc(); 
}

function setPag(t) { 
    pag = t; 
    document.querySelectorAll('.btn-pay').forEach(b => b.classList.remove('active')); 
    document.getElementById('pay-'+t).classList.add('active'); 
    calc(); 
}

function calc() {
    let bruto = carrinho.reduce((a, b) => a + (b.price * b.qnt), 0);
    let descAtacado = 0;
    if(promo && promo.ativa && promo.regras) {
        let regra = [...promo.regras].reverse().find(r => bruto >= r.min);
        if(regra) descAtacado = bruto * (regra.desc / 100);
    }
    let total = bruto - descAtacado;
    if(pag === 'pix' && config.descontoPix) total -= (total * (config.descontoPix / 100));

    document.getElementById('subtotalTxt').innerText = fM(bruto);
    document.getElementById('descTxt').innerText = '- ' + fM(descAtacado);
    document.getElementById('boxDesc').classList.toggle('hidden', descAtacado === 0);
    document.getElementById('totalTxt').innerText = fM(total);
    window.totalFinal = total;
}

async function finalizar() {
    const nome = document.getElementById('nomeCliente').value;
    if(!nome || !pag) return alert("Preencha Nome e Pagamento");
    const pedido = {
        cliente: { nome, tel: document.getElementById('telCliente').value },
        itens: carrinho,
        total: window.totalFinal,
        status: 'Novo',
        data: new Date().toLocaleString()
    };
    await db.ref('orders').push(pedido);
    localStorage.removeItem('carrinho');
    alert("Pedido Enviado!");
    window.location.href = "produtos.html";
}
</script>
</body>
</html>
